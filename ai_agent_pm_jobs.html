、好用、有惊喜感的功能体验；\n3、参与AI功能全生命周期，包括需求洞察、产品设计、效果评测、功能上线、持续迭代；\n4、持续关注AI Agent、LLM、多模态等技术演进方向，结合业务场景提出具备创新性且可落地的产品方案。\n1、本科及以上学历，2年及以上产品经理工作经验；具备完整AI功能上线经验，能独立完成功能定义、Demo搭建、效果评估和持续迭代；\n2、关注大模型技术和产品趋势，理解大模型能力边界，对AI+内容消费、AI+用户生活决策需求有独立思考；\n3、具备良好的用户洞察和产品判断能力，能够从复杂、模糊的生活场景中拆解用户需求，并转化为清晰、可落地的产品方案；\n4、具备较强的跨团队协作和项目推进能力，能够与算法、研发、设计、运营、增长等团队高效配合，做好多方需求权衡并推动复杂项目落地。"},{"id":"千问事业部-4d4c69103690","source":"千问事业部","title":"千问事业部-AI产品经理-审核 / 安全评测方向","keywords":["AI","Agent"],"location":"北京","publishedAt":"2026-07-03 16:20:01","url":"https://talent.quark.cn/off-campus/position-detail?positionId=100022020001","jd":"1、负责大模型内容安全审核与安全评测平台建设，包括审核平台、自动化评测平台、风险挖掘平台等能力设计与迭代；\n2、深入理解大模型业务场景（聊天、创作、生图、生视频、Agent等），结合安全策略与业务需求，设计安全治理与评测产品方案；\n3、推动AI Native工作流建设，结合 Agent、AI Coding等工具，设计并落地多Agent协同与自动化Workflow，推动平台模块化与可扩展能力建设，持续提升安全审核与评测效率、风险发现能力及平台自动化水平；\n4、联动研发等其他团队，推进安全能力工程化与平台化落地；\n5、持续跟进大模型技术在内容安全领域的应用趋势，结合业务实际场景迭代系统、Agent。\n1、本科及以上学历，3年以上产品经理经验，有AI产品、安全产品、内容审核平台经验优先；\n2、熟悉大模型产品形态与原理，对LLM、Agent、RAG、AI Workflow有理解和实践经验，熟悉MCP、CLI工具链及主流AI Coding工具（如Cursor、Claude Code等）优先；\n3、对内容安全、审核、风控、安全评测有理解；\n4、具备较强的数据分析与系统抽象能力，有较强跨团队推动能力，能够协调研发、安全运营共同推进项目，拥有很强的自驱和学习能力，能够快速学习复杂业务、AI新变化。"},{"id":"阿里云-d97607781b4c","source":"阿里云","title":"ATH事业群-AI 产品经理 （MaaS网站方向）-杭州/北京","keywords":["AI"],"location":"北京 / 杭州","publishedAt":"2026-07-03 14:15:16","url":"https://careers.aliyun.com/off-campus/position-detail?positionId=100015623017","jd":"团队介绍：\nMaaS（Model as a Service）网站产品团队致力于打造行业领先的模型即服务平台，为开发者和企业客户提供模型发现、部署、调用、评测及管理的一站式体验。我们相信大模型将重塑软件开发与业务创新的方式，而一个优秀的 MaaS 平台是连接模型能力与用户应用价值的核心桥梁。\n\n1. 竞争分析与行业洞察：持续跟踪国内外 MaaS 平台的产品动态与竞争策略关注大模型技术前沿，输出竞品分析与产品洞察，将技术趋势转化为平台产品机会\n2. 平台产品规划与设计：负责 MaaS 网站平台的整体产品规划与路线制定，产品设计与持续迭代，设计平台化的产品架构与交互方案，构建模型发现 → 评估 → 部署 → 调用 → 监控的完整用户旅程。\n3. 模型生态与开发者体验：从个人和企业开发者视角出发，规划并优化各类模型接入和服务，支撑开源模型、自研模型、三方模型等多元模型生态的高效运转；持续优化 API 文档、SDK 、Playground 、Skills 等开发者工具使用体验。\n4. 商业化与增长：参与 MaaS 平台的商业化策略制定，设计模型计费、资源套餐、用量计量等商业化产品能力。建立产品核心指标体系，通过数据分析驱动产品决策与增长。\n5. 跨团队协作：建立与横向团队紧密协同，并与工程、算法、设计、运营、解决方案等团队纵向协作，推动产品从设计到上线应用的全流程闭环。\n1、3 年以上互联网产品经理工作经验，其中至少 1 年 AI 相关产品经验；\n2、有平台型产品的规划与落地经验，理解平台型产品的设计逻辑与生态运营思路；\n3、实际大量使用主流 AI 推理云平台或AI产品/工具，对主流模型和主流AI产品使用有深度的实战理解；\n4、具备良好的数据思维，能够通过数据分析驱动产品决策，有搭建指标体系的经验；\n5、具备良好的跨团队沟通协作能力，能推动多方协同的复杂项目顺利落地；\n\n加分项\n1、有过开发者平台、API 产品、控制台等技术产品的产品经理经验；\n2、有计算机或相关技术背景，曾有研发类工作经历或开发能力；\n3、有对于新范式 AI 产品的实践或思考心得；\n4、有独立个人或协同小团队闭环开发产品项目的经验；\n5、有 Ownership 意识，抗压能力强，能在快速变化的业务环境中找到突破点；\n6、英文读写能力优秀，能独立撰写英文产品文档，能和海外开发者进行沟通交流；\n7、有海外工作生活或国际化产品相关的经历。"},{"id":"快手-d6485d1dabb7","source":"快手","title":"B端产品经理（AI方向）-【生活服务】","keywords":["AI","Agent"],"location":"Beijing","publishedAt":"2026-07-02 18:19:57","url":"https://zhaopin.kuaishou.cn/recruit/e/#/official/social/job-info/30895","jd":"1、负责B端核心产品的整体规划与迭代，深入理解行业痛点，设计满足企业客户需求的解决方案；主导产品全链路的AI能力嵌入规划，包括但不限于智能需求分析、AI辅助原型生成、智能决策支持等场景；\n2、设计自然、高效的人机交互方式，降低B端产品的学习成本；探索并落地LLM驱动的智能助手、对话式交互、智能表单填充、自然语言指令执行等创新交互模式；\n3、构建数据驱动的产研闭环，通过用户行为分析优化产品体验；设计智能数据分析能力，支持自然语言查询生成可视化报表；推动业务流程自动化，实现AI驱动的智能审批、智能预警、智能推荐；基于用户行为数据，构建个性化功能推荐与工作流优化建议；\n4、与算法团队紧密合作，将AI能力（NLP、CV、预测模型等）产品化，形成可复用的AI组件；设计低代码/无代码的AI能力编排平台，让业务人员可快速搭建智能化业务流程；\n5、推动产品团队自身的AI工具落地，包括AI辅助PRD撰写、智能用户调研分析、竞品AI化监控；探索AI辅助测试、AI辅助客服训练、AI辅助培训内容生成等内部提效场景。\n1、本科及以上学历，3年以上B端产品经理经验，有SaaS、企业服务、ERP/CRM等领域经验优先，有AI产品落地经验者优先；\n2、完整负责过至少1个B端产品的0-1或重大版本迭代；对LLM、RAG、Agent等AI技术有深入理解，有AI产品落地经验优先；具备优秀的需求分析、产品架构设计、项目管理能力；\n3、具有一定的项目管理经验，沟通和协调能力较强，能够高效推动多部门协作；具备与算法、工程团队协同落地的经验，理解AI项目交付特点；\n4、对AI新技术保持好奇心，心态开放，自驱力强，有创业精神。"},{"id":"快手-0e1d92099e74","source":"快手","title":"智能客服产品经理（AI方向）-【生活服务】","keywords":["AI","Agent"],"location":"Beijing","publishedAt":"2026-07-02 18:19:55","url":"https://zhaopin.kuaishou.cn/recruit/e/#/official/social/job-info/28344","jd":"1.核心产品负责：负责磁力青松、企微带户等AI智能服务产品，覆盖AI问答、意图识别、效果Agent等核心功能模块，完成产品设计与落地，为客户渗透与解决率指标负责；\n2.AI能力落地：结合优化师/投手在投放过程中的真实场景，设计智能化交互流程与意图识别方案，推动大模型能力与业务场景深度结合，参与模型评测与调优方向定义，持续提升问题解决率与用户采纳率；\n3.产品迭代驱动：基于数据分析与一线业务调研，建立可量化的产品评估指标体系，定期归因问题、推动迭代，持续输出可落地的优化方案。\n1.有商业化AI智能问答、智能客服类产品0-1孵化经验优先；有模型训练与评测、Agent搭建经验优先；有可量化的对客营销/投放策略输出经验优先；\n2.深度了解大模型能力边界与应用场景，对AI智能服务产品有较强的判断力，能独立推动跨团队落地；\n3.熟悉商业广告产品或ToB营销产品，理解优化师/投手的工作流程，有快手/字节/腾讯广告平台使用经验优先；\n4.数据敏感度高，能独立搭建评估指标体系，通过数据归因问题、驱动决策；\n5.本科及以上学历，计算机相关专业优先。"},{"id":"快手-5e0127d0edd7","source":"快手","title":"AI产品经理（诊断任务）—【生活服务】","keywords":["AI","Agent"],"location":"Beijing","publishedAt":"2026-07-02 18:19:54","url":"https://zhaopin.kuaishou.cn/recruit/e/#/official/social/job-info/30864","jd":"1.核心产品负责：负责面向投手的智能诊断与任务体系建设，包括任务下发策略、激励金机制、预警/指导类任务分层、大客诊断迭代等，完成需求调研、规划、设计与推进落地；\n2.策略设计与优化：结合投手在投放过程中的问题场景与大模型能力，设计精准的任务触发规则与个性化诊断方案，提升任务下发完成率与账户优化达成率；\n3.效果度量与迭代：建立诊断任务核心度量指标体系，主导AB实验设计与效果归因，通过数据驱动的策略优化推动产品持续迭代，对任务完成率与账户优化达成率负责。\n1.有策略类/任务类/推荐系统相关产品经验优先；有AB实验设计与分析经验优先；有大模型/Agent相关产品落地经验优先；\n2.理解广告投放优化链路，能从投手视角定义诊断场景与任务触发逻辑，熟悉快手/字节/腾讯广告平台优先；\n3.数据敏感度高，能独立设计实验方案、搭建评估指标体系，擅长通过数据归因复杂业务问题；\n4.逻辑清晰，推动力强，能在多方协作中高效落地复杂策略产品；\n5.本科及以上学历，计算机相关专业优先。"},{"id":"快手-eaffa1309c5c","source":"快手","title":"AI产品经理（AI外呼）—【生活服务】","keywords":["AI","Agent"],"location":"Beijing","publishedAt":"2026-07-02 18:19:53","url":"https://zhaopin.kuaishou.cn/recruit/e/#/official/social/job-info/30863","jd":"1.核心产品负责：负责AI外呼产品的全链路建设，包括AI外呼话术Skill、老客召回策略、多渠道触达链路等，完成需求调研、规划、设计与推进落地；\n2.转化链路优化：负责外呼话术的策略设计与成交逻辑优化，结合大模型能力提升话术个性化与场景适配能力，持续提升客户召回转化率与企微建联成功率；\n3.效果度量与迭代：建立AI外呼产品核心度量指标（接通率、转化率、建联率等），通过数据分析与AB实验驱动策略持续优化，推动产品迭代闭环。\n1.有AI外呼或对客触达类产品经验优先；有话术策略设计或转化漏斗优化经验优先；有大模型/Agent相关产品落地经验优先；\n2.理解外呼/电销业务流程，熟悉客户召回与留存场景，能从业务视角定义产品需求；\n3.熟悉商业广告或ToB营销产品，了解快手/字节/腾讯广告平台投放流程优先；\n4.数据敏感度高，能独立设计AB实验方案，通过数据归因问题、驱动转化提升；\n5.本科及以上学历，计算机相关专业优先。"},{"id":"快手-e347d7b48ebb","source":"快手","title":"AIGC产品经理（号生态方向）-【生活服务】","keywords":["AI"],"location":"Beijing","publishedAt":"2026-07-02 18:19:42","url":"https://zhaopin.kuaishou.cn/recruit/e/#/official/social/job-info/28798","jd":"1、负责快手生服线索经营工具以及商业生态相关产品功能迭代，包括生活号线索经营组件提效，AIGC内容生产赋能，为线索商家活跃指标负责，助力团队账号营收目标达成；\n2、作为方向主R，具备业务中长期规划能力，具备良好的对外沟通和资源协调能力，指标意识强。能联动多团队达成业务目标；\n3、具备用户视角，能从平台、商家和用户多方视角，全链路的思考线索经营商业生态机制设计。关注行业趋势，了解业界最佳实践，并能结合业务当前阶段制定解决方案。\n1、本科及以上学历，3年以上工作经验，有号生态产品、AIGC经验者优先考虑；\n2、数据敏感度高，逻辑思维缜密，善于分析、抽象和解决问题；\n3、具备高度责任心，有良好的跨团队沟通能力，较强的学习能力和抗压能力。"},{"id":"快手-36565f668152","source":"快手","title":"广告投放AI Agent产品经理-【生活服务】","keywords":["AI","Agent"],"location":"Beijing","publishedAt":"2026-07-02 18:19:40","url":"https://zhaopin.kuaishou.cn/recruit/e/#/official/social/job-info/30688","jd":"1、主导线索行业AI广告投放产品的全生命周期管理，包括需求挖掘、产品规划、原型设计、PRD撰写、上线推进及效果迭代，核心围绕AI Agent技术的落地应用，解决广告深度转化中的核心痛点；\n2、结合广告行业特性（如信息流广告、搜索广告、效果广告等），设计AI Agent广告投放引导相关产品方案，推动技术与业务深度融合，实现广告转化效率与ROI的双重提升；\n3、联动算法、研发、运营、销售等跨部门团队，明确AI模型需求与技术落地路径，协调资源推进产品落地，解决落地过程中的技术与业务难点，确保产品按时高质量上线，具备从Demo到生产环境的全流程落地能力，规避AI Agent项目常见的落地鸿沟问题；\n4、深入分析广告投放数据、用户转化数据，基于数据洞察优化产品功能与AI策略，持续提升产品的转化效果与用户体验，建立完善的产品效果评估体系；\n5、跟踪AI Agent、广告转化领域的行业趋势、竞品动态，结合业务需求提出创新产品思路，主动探索新技术、新场景的应用，推动产品持续迭代升级，同时梳理广告业务流程，围绕AI Agent重构优化工作流，实现业务效率提升；\n6、承担产品商业化相关职责，配合销售、客户成功团队，输出产品解决方案，助力客户实现广告深度转化，收集客户反馈并转化为产品优化需求，平衡技术可行性、用户体验与商业价值。\n1、本科及以上学历，3年以上广告or推荐相关经验，1年以上AI产品经理相关工作经验，有完整的AI产品从规划到落地的全流程经验，具备深度转化或广告相关产品经验者优先；\n2、具备扎实的AI Agent相关落地经验，深入理解AI Agent的核心逻辑（自主规划、工具调用、RAG知识库、多智能体协作等），有AI Agent在广告、营销或转化场景的落地案例，熟悉AI Agent从知识冷启动到生产环境部署的完整路径，能独立解决落地过程中的核心问题；\n3、具备广告行业相关经验，熟悉广告投放全流程（曝光、点击、转化、复盘），了解信息流、搜索、效果广告等主流广告形式，清楚广告主核心需求（转化、ROI、成本控制），能结合广告业务场景设计贴合需求的AI产品方案；\n4、聪明敏锐，具备极强的逻辑思维能力、问题解决能力和学习能力，能快速理解复杂业务场景与AI技术边界，精准捕捉用户痛点与产品优化方向，能在复杂需求中快速找到核心优先级；\n5、自驱力强，目标导向明确，具备独立负责产品的能力，能主动推进工作、承担责任，面对技术或业务难点不退缩，有强烈的创新意识和结果导向，无需过多督促即可完成核心工作，能主动探索AI与广告转化的结合点；\n6、具备良好的沟通协调能力、文档撰写能力和跨部门协作能力，能清晰传递产品需求与规划，协调算法、研发等团队推进落地；了解机器学习、大模型相关基础原理，能与算法工程师高效协作。"},{"id":"快手-22391a05ec6f","source":"快手","title":"AIGC产品经理（短视频方向）-【生活服务】","keywords":["AI"],"location":"Beijing","publishedAt":"2026-07-02 18:19:37","url":"https://zhaopin.kuaishou.cn/recruit/e/#/official/social/job-info/23556","jd":"1、负责广告素材AIGC产品全生命周期管理，包括但不限于脚本生成、文生图片、图生视频、文生视频等方向；\n\n2、设计和实施创新的AIGC解决方案，以支持数字人业务发展，包括数字人口型驱动、表情驱动、动作驱动，以及文生音频、文生图片、数字人互动等功能；\n\n3、与研发团队紧密合作，确保产品从概念到市场落地过程中的需求准确无误地实现，进行市场调研，收集用户反馈，分析竞争对手，以指导产品优化和迭代；\n\n4、探索和评估新兴的人工智能技术，以识别新的应用场景，并提高现有产品的性能和用户体验，关注行业趋势，确保我们的AIGC解决方案始终保持行业领先。\n1、计算机科学、人工智能或相关领域的专业背景优先，希望你深入理解NLP、深度学习等技术框架和算法原理；\n2、至少3年互联网经验，有3年以上产品或广告素材相关领域从业经验优先；\n3、具备出色的市场分析和产品规划能力，能根据市场需求制定有效的商业策略；\n4、优秀的团队协作和项目管理能力，能够在多部门间有效沟通并推动项目进度，优先考虑成功实施前沿技术产品或商业化AIGC产品的经验者。"},{"id":"快手-a6a57290d2b8","source":"快手","title":"AIGC产品经理（直播方向）-【生活服务】","keywords":["AI"],"location":"Beijing","publishedAt":"2026-07-02 18:19:35","url":"https://zhaopin.kuaishou.cn/recruit/e/#/official/social/job-info/31052","jd":"1、负责 AI 直播及数字人直播产品的全生命周期管理，涵盖数字人形象生成、LLM驱动的智能交互、实时互动策略及商业化增长等方向。与算法、工程、运营、商业化团队深度协同，推动 AIGC 技术在直播场景中的规模化落地，持续提升直播间广告消耗、用户留存及转化效率；\n2、负责 AI 直播 / 数字人直播产品的需求分析、功能规划与版本迭代，制定产品路线图（Roadmap），对齐业务目标与技术可行性并推动能力落地和业务收益；\n3、深入研究数字人形象生成、语音合成（TTS）、口型驱动、实时渲染等核心技术方向，将技术能力转化为可落地的产品方案；\n4、基于 LLM 大模型，设计数字人在直播间的智能话术生成（商品卖点自动提炼、动态脚本）与实时互动（弹幕问答、观众情绪感知、自动引导购买）功能方案；\n5、负责直播间核心业务场景设计：数字人上下播流程、直播间搭建工具、商品讲解模块、活动玩法配置等，输出高质量 PRD / 交互原型；\n6、通过用户行为数据分析（漏斗模型、A/B 测试、留存分析），识别产品瓶颈，驱动转化率与 ARPU 提升。\n1、3年左右产品经理工作经验，有直播产品、电商产品或 AIGC 产品经验者优先；\n2、具备较强的逻辑思维与结构化表达能力，能独立撰写完整 PRD，清晰定义功能边界与验收标准；\n3、具备基本数据分析能力，能独立使用 SQL 进行数据查询，熟悉 A/B 测试方法论；\n4、有良好的跨团队协同能力，推动项目落地的执行力强，抗压能力强；\n5、了解大模型（LLM）基本原理及应用边界，理解 NLP、TTS、ASR、视频生成等 AI 技术方向。"},{"id":"快手-ae3cf0665324","source":"快手","title":"AIGC产品经理-【生活服务】","keywords":["AI","Agent"],"location":"Beijing","publishedAt":"2026-07-02 18:19:35","url":"https://zhaopin.kuaishou.cn/recruit/e/#/official/social/job-info/31053","jd":"1、负责 AIGC 视频在快手本地生活交易团购场景的内容生产与分发产品体系，通过 AI 视频、数字人等内容形态规模化驱动商品曝光与交易转化，直接带动团购 GMV 增长。覆盖从素材生产、内容编排到投放分发的完整链路，将生成式 AI 能力转化为可规模化的商业增长引擎；\n2、负责 AIGC 内容生产产品的规划与落地，包括从素材生产、内容编排到投放分发的完整链路设计；\n3、主导 AI 视频 / AI数字人等内容形态的产品定义，推动生成质量与商业化效果的持续提升；\n4、搭建素材生产与分发的策略体系，包括产能分配、素材汰换、效果回流、AB 实验等机制；\n5、与算法、研发、设计、运营紧密协同，把模型能力转化为可规模化、可衡量的产品交付；\n6、跟踪行业前沿（多模态生成、Agent、端到端等），把技术演进转化为产品机会。\n1、3年以上互联网产品经验，有内容生产、广告投放、推荐分发等任一方向的深度落地经历；\n2、有 AIGC 产品的一线落地经验，熟悉文本 / 图像 / 视频 / 数字人 / Agent 中至少一类生成式产品的完整研发流程；理解生成质量评估方法（人评、机评、AB 实验）、模型能力边界与生产成本结构；只做过 demo 不算；\n3、对生成式 AI 技术有体系化认知，了解主流大模型、多模态、Agent 等技术栈的能力与局限，能与算法同学就模型选型、效果迭代展开有效讨论；\n4、具备扎实的数据分析能力，能从复杂指标体系中拆解问题、定义优化路径，对结果负责；\n5、跨职能协同能力强，能与算法、研发、业务方共同推进复杂项目，沟通能力优秀，方案表达清晰；\n6、加分项：有大平台广告 / 内容工具产品经验；熟悉 Sora、Veo、可灵、即梦等前沿生成模型并有独立判断；具备数据分析、原型搭建等自助验证能力。"},{"id":"快手-4e2901d2f22d","source":"快手","title":"AI产品经理-【生活服务】","keywords":["AI","Agent"],"location":"Beijing","publishedAt":"2026-07-02 18:19:34","url":"https://zhaopin.kuaishou.cn/recruit/e/#/official/social/job-info/30717","jd":"1、负责生活服务事业部的 OpenClaw 平台的产品规划与落地，深入挖掘 AI 时代下企业办公效率及组织协同模式，提升事业部各业务的工作效率；\n2、规划平台架构与能力，定义 Agent 平台的核心能力矩阵，制定中长期产品路线图；\n3、深入各业务线，挖掘高价值的 AI 应用场景，设计最小可行产品（MVP）并推动快速验证；\n4、建立技能生态机制，设计技能发现、创建、评估与迭代的闭环流程，降低内部用户使用门槛，推动技能供给从“集中开发”向“全民共建”转变；\n5、关注产品的体验与用户 Adoption，通过数据驱动优化，提升使用率、活跃度及任务完成率，推动产品从“可用”到“好用”再到“不可或缺”；\n6、协调算法、工程、设计及各业务方资源，推动平台能力接入与业务场景落地，建立高效的内部反馈机制，持续优化产品方向。\n1、本科及以上学历，2年以上产品经理经验，有 AI/Agent 相关产品经验者优先；\n2、熟悉大模型的能力边界及典型应用模式（如对话、工具调用、Agent 编排等），对 AI 技术有一定的理解和热情；\n3、具备较强的执行力和跨团队沟通能力，能够在多利益方环境中高效推进共识并落实行动；\n4、数据敏感，能够通过用户使用数据分析问题并验证假设，驱动产品迭代；\n5、责任心强，学习能力优秀，具备良好的适应能力和抗压能力，能快速融入高节奏的工作环境。"},{"id":"快手-7365a231972c","source":"快手","title":"商业私信产品经理（AI方向）-【生活服务】","keywords":["AI"],"location":"Beijing","publishedAt":"2026-07-02 18:19:24","url":"https://zhaopin.kuaishou.cn/recruit/e/#/official/social/job-info/30143","jd":"1、负责快手商业私信链路投广体验和效果优化，包含广告点击→私信进线→留资转化的漏斗效率，对SCVR和私信消耗指标负责；\n2、主导AI能力在线索广告的落地应用，包括不限于商家知识库搭建及应用，咨询意图识别理解等；\n3、联动业务团队定位客户问题，针对不同垂直行业预算特点设计差异化产品解决方案；\n4、具备用户视角，能从平台、商家和用户多方视角。关注行业趋势，了解业界最佳实践，并能结合业务当前阶段制定解决方案。\n1、本科及以上学历，3-5年产品经理经验，有线索广告、IM广告等相关产品经验；\n2、有AI项目落地经验：主导或深度参与过AI能力在实际业务场景的产品化落地；\n3、具备高度责任心，有良好的跨团队沟通能力，较强的学习能力和抗压能力。"},{"id":"快手-981f8871bbb7","source":"快手","title":"KwaiClaw 高级产品经理-【生活服务】","keywords":["AI","Agent"],"location":"Beijing","publishedAt":"2026-07-02 15:22:05","url":"https://zhaopin.kuaishou.cn/recruit/e/#/official/social/job-info/31085","jd":"1. 平台战略与产品规划：定义 KwaiClaw 平台的核心能力矩阵与竞争壁垒，制定中长期产品路线图。会用vibe coding优先；\n2. 场景挖掘与价值验证：深入各业务线，识别高 ROI 的 AI Agent 应用场景，主导 MVP 设计与快速验证；\n3. 技能生态与开放体系：设计技能发现、创建、评审、分发与迭代的完整闭环机制，推动技能供给从\"平台集中开发\"走向\"业务自助共建\"，降低创建门槛，提升供给质量；\n4. 增长与 Adoption：负责平台渗透率、活跃度、任务完成率等北极星指标，数据驱动产品优化，打通从\"可用→好用→离不开\"的完整路径；\n5. 跨团队协作与资源拉通：协调算法、工程、设计及各业务方资源，推动平台能力接入与场景落地， 1902211071872155648&language=zh-cn","jd":"1.负责面向AI推理场景的异构计算产品定义和规划，制定AI推理场景下的模型调优和业务部署应用平台规划，助力业务推理效率提升；\n2.负责高性能训练集群产品规划工作，提升大规模AI分布式训练场景的平台加速、易用性和可观测性等产品能力；\n3.持续跟踪人工智能市场发展及行业技术趋势，制定产品的长期规划；\n4.指导或协助客户解决AI业务使用异构计算产品遇到的各种问题，发掘客户使用产品的潜力，输出产品解决方案。\n1.本科以上学历，计算机、人工智能、数学等相关专业；\n2.5年以上B端产品经理经验，有AI项目及云计算领域经验者优先；\n3.熟悉数据中心GPU产品，对AI框架（Pytorch, TensorFlow等）有基本了解或使用经验，了解各类组件和库在推荐系统/CV/NLP/ASR等应用场景中的使用特点和优劣，能指导客户完成业务部署，初步分析性能瓶颈，解决各种业务层面的问题；\n4.有云厂商AI产品经理经验者优先；\n5.有一定的管理能力，具备丰富的产品规划和设计经验，对AI技术及行业有前瞻性战略思考；\n6.清晰的逻辑分析和表达能力，乐观积极，具有较强的责任心和执行力。"},{"id":"腾讯-5af602e05e2d","source":"腾讯","title":"智能体-策划产品经理-CodeBuddy/WorkBuddy","keywords":["AI","Agent"],"location":"深圳","publishedAt":"2026年07月02日","url":"https://careers.tencent.com/jobdesc.html?postId=1949322741660385280&language=zh-cn","jd":"1.负责CodeBuddy IDE产品的整体规划与战略制定，明确AI功能迭代方向；\n\n2.持续跟踪AI开发者工具竞品的动态，为产品决策提供有力依据，同时精准提炼垂直行业的核心痛点，如合规代码生成等；\n\n3.主导产品的全生命周期管理，负责编写需求文档（PRD），清晰定义AI功能的交互逻辑；\n\n4.积极推动腾讯云生态与CodeBuddy IDE的深度集成，包括CloudBase部署、微信小程序兼容等方面，设计有效的技术解决方案；\n\n5.构建完善的产品指标体系，如代码生成准确率、任务耗时等，通过漏斗分析精准定位用户体验断点；\n\n6.备注：base地可选深圳/北京/上海。\n1.本科及以上学历，计算机科学、AI或产品设计相关专业优先，熟悉AI开发生态，包括大模型技术栈、Agentic Workflow等，以及主流IDE工具链；\n\n2.具备3年以上AI/开发者工具产品策划经验，有主导代码生成、低代码平台或智能助手类产品的成功案例，熟悉GitHub、VS Code生态以及企业级服务落地的相关要求，如金融、医疗行业的合规需求；\n\n3.拥有敏锐的技术趋势洞察力，能够及时捕捉如L5级自组织AI团队等技术发展趋势，熟练运用用户研究方法，如焦点小组、Kano模型等，精准转化开发者需求为产品特性；\n\n4.具备高效的跨职能协同能力，能够与技术（算法/工程）、市场（GTM策略）、销售（企业客户拓展）等团队进行良好的沟通与协作，推动资源整合与策略的有效落地；\n\n5.熟练使用产品管理工具，如Jira、Confluence等，以及数据分析平台，如QuickSight、Tableau等，英语读写流利，具备较强的抗压能力和创新意识。"},{"id":"腾讯-2c83272a1b2b","source":"腾讯","title":"微信输入法-AI产品经理","keywords":["AI","Agent"],"location":"广州","publishedAt":"2026年07月02日","url":"https://careers.tencent.com/jobdesc.html?postId=1978467627152072704&language=zh-cn","jd":"1.负责微信输入法 AI 方向的产品策划，围绕大语言模型（LLM）、Agent、多模态交互、语音识别与合成（ASR）等前沿技术，探索 AI 在文字输入、智能表达、语音交互、内容创作等核心场景的创新落地方案；\n\n2.深度挖掘用户在输入全链路中对 AI 的真实需求和使用场景，设计端到端的产品解决方案并推动落地，持续提升输入效率与表达体验；\n\n3.结合业务目标定义模型效果标准和评测体系，协同算法、工程、设计团队进行模型迭代优化与数据飞轮建设；\n\n4.持续跟踪大模型与 AI 交互领域的前沿趋势及竞品动态，提出 n2. 具备抗压能力，有能力独立面对多家合作方并行沟通，乐于接受高强度工作挑战，始终保持积极乐观的心态；\n3. 对AI技术（如大语言模型）在金融领域的应用有一定了解者优先。"},{"id":"快手-53b90b543128","source":"快手","title":"AI数据产品经理-【电商】","keywords":["AI","Agent"],"location":"Hangzhou","publishedAt":"2026-06-30 13:06:09","url":"https://zhaopin.kuaishou.cn/recruit/e/#/official/social/job-info/30395","jd":"1、定义电商场景垂直模型的评估基准，让“模型好不好”从主观判断变成可量化、可回溯、可对比的工程问题；\n2、数据飞轮的闭环设计：从线上真实流量→问题挖掘→标注/合成→训练反馈→效果回归，全链路的产品化设计。核心是飞轮的转速——每一轮迭代从发现问题到上线修复的周期；\n3、数据基础设施的产品定义：与工程团队共同定义数据平台能力（标注工具、数据版本管理、质量监控、合成数据pipeline等），让算法同学专注于建模本身，而不是在数据工程上消耗精力；\n4、跨方向的数据策略协同：在天目电商垂直方向和LangBridge Studio通用基础设施之间，沉淀可复用的数据方法论，避免重复造轮子。\n1、3-5年产品经理经验，其中至少1-2年在AI/LLM相关方向（大模型预训练/后训练/RAG/Agent任一方向均可）；\n2、对LLM的能力边界、典型失败模式、评估方法论有真实的一手理解，不是只看过论文摘要；\n3、对数据质量、标注体系、评估基准的设计有过端到端的操盘经验；\n4、算法sense：能和算法同学在badcase分析、数据分布、训练效果归因上平等对话，听得懂也问得出关键问题；\n5、工程sense：能定义清晰的数据pipeline、标注工具需求、质量监控指标，理解工程同学在意的抽象边界与交付契约；\n6、业务sense：能从电商业务的真实场景反推数据需求优先级，而不是只做通用的“好数据”；\n7、有“飞轮意识”：理解一次性做对很难，但让系统每一轮都比上一轮好很重要。\n\n加分项\n1、有电商、内容理解、多模态相关业务经验；\n2、参与过大模型从0到1的数据体系搭建；\n3、对Anthropic、OpenAI等前沿团队的评估方法论（如HELM、MT-Bench、Constitutional AI的偏好数据等）有研究和观点。"},{"id":"快手-df4850a71cbc","source":"快手","title":"AI智能客服产品经理 - 【用户体验】","keywords":["AI","Agent"],"location":"Beijing","publishedAt":"2026-06-30 12:04:54","url":"https://zhaopin.kuaishou.cn/recruit/e/#/official/social/job-info/30831","jd":"1、负责垂直业务线的客服系统产品设计与迭代，推动业务流程重构与效率提升；\n2、抽象业务流程，定义Agent、所需Skill和工具，推动落地；\n3、与运营、研发协同，完成从需求到上线的全流程工作，对产品效果负责。\n1、本科及以上学历，1-3年B端产品经验；\n2、具备大模型应用能力，能独立调优Prompt，理解Agent实现逻辑；\n3、学习能力强、执行力强，具备良好的跨团队协同与自驱力；\n加分项：\n1、有客服系统、工单系统、风控或安全舆情相关产品或业务背景优先；\n2、有抽象复杂业务场景、设计服务工具或服务流程的经验优先。"},{"id":"蚂蚁集团-20a7d105099e","source":"蚂蚁集团","title":"蚂蚁数字科技-数字科技线-ZAN SaaS 产品经理(Web3 + AI 方向)","keywords":["AI","Agent"],"location":"北京","publishedAt":"2026-06-30T09:17:47.000+00:00","url":"https://talent.antgroup.com/off-campus-position/260624010615585","jd":"1. 负责海外 ZAN SaaS 产品从需求洞察、路线图规划到上线交付与持续迭代；\n2. 设计产品的商业化模式:定价与套餐、计费与配额、试用与转化路径,持续优化付费转化与留存；\n3. 与市场、BD、运营、合作伙伴协同,制定并落地产品 GTM 策略,把握海外开发者 / 企业客户的获取与增长；\n4. 持续监控用户反馈与核心产品指标(转化、留存、ARR、活跃等),识别优化与增长机会并驱动落地；\n5. 与工程、设计紧密配合,交付高质量、对开发者友好的产品与文档；\n6. 针对目标生态与重点客户,发展并维护长期合作关系,帮助产品在全球开发者生态中成长。\n1. 3年及以上工作经验,其中2年以上产品经理经验；\n2. 有商业化 SaaS 产品经验:熟悉订阅 / 按量计费、定价套餐、转化漏斗、增长指标等商业化要素；\n3. 有从 0 到 1 或独立负责产品模块 / 子产品线、推动上线的完整经验；\n4. 本科及以上学历，计算机、软件、信息工程等相关专业,具备一定技术理解力(能读懂 API / 技术文档,与工程高效协作)；\n5. 优秀的跨团队协作、问题分析与解决能力,执行力强、能在快节奏下推进。\n\n加分项：\n1. 有 Web3 / 区块链从业经验(节点 / RPC、数据、零知识证明、EVM 生态、合规 KYT/KYC 等任一方向)；\n2. 有 AI 相关产品经验(LLM、Agent 等），熟悉主流AI产品框架（Claude Code、Codex、OpenClaw、OpenRouter等)；\n3. 有面向海外市场开发者产品的经验；\n4. 有创业公司经验，或活跃于开发者 / Web3 社区；\n5. 具备全英语工作能力(读写说)，能直接面向海外用户与合作方沟通。"},{"id":"百度-f19d34a002c2","source":"百度","title":"AI产品经理（海外AIGC平台功能方向）（J101288）","keywords":["AI"],"location":"北京市","publishedAt":"2026-06-30","url":"https://talent.baidu.com/jobs/detail/SOCIAL/7521ad0e-0eb7-4822-86e4-52ebe51e53eb","jd":"- 负责海外AIGC平台功能模块的产品规划、需求分析及功能设计，确保产品符合海外市场需求和用户体验标准\n- 负责AI视频创作工具的产品规划与迭代，将AI模型能力转化为易用、高效的创作功能与交互体验\n- 分析海外竞品动态及用户反馈，持续优化产品功能，提升用户活跃度和留存率\n- 与算法、研发、设计等团队紧密协作，推动产品高质量落地\n- 监控产品功能上线后的数据表现，通过数据分析提出迭代优化方案，提升产品核心指标\n- 本科及以上学历，2年以上互联网产品经验，有海外互联网产品或AIGC相关产品经验优先\n- 具备良好的数据分析能力和用户需求洞察力，能通过数据驱动产品决策\n- 具备良好的产品思维、逻辑分析能力，能够独立负责产品模块并推动项目落地\n- 具备良好的沟通协作能力和Owner意识，能够高效推动跨团队合作"},{"id":"理想-a0e4611ceefb","source":"理想","title":"购车交易产品经理","keywords":["AI"],"location":"北京顺义区","publishedAt":"2026-06-29 23:18:55","url":"https://www.lixiang.com/employ/detail/19250.html","jd":"岗位职责：\n1. 负责选车、下单、支付、交付等核心交易链路的产品设计与迭代，对购车转化率和用户体验负责。\n2. 负责官方线上渠道（官网/App/小程序等）的留资、线索分配及转化链路设计，提升线索获取效率和到店转化。\n3. 深入理解用户购车决策流程，设计高效流畅的交易工具与流程，推动产品方案落地。\n4. 搭建交易与线索环节的数据监控，通过数据分析和用户洞察持续优化产品，提升全链路漏斗转化。\n5. 协同增长、销售、技术、设计、交付团队，高效推进项目，保障线索流转与交易体验稳定顺畅。\n任职要求：\n1. 本科及以上学历，3-4年互联网产品经验，有交易、电商、增长产品经验优先\n2. 逻辑清晰，数据敏感，能从数据中发现问题和机会，推动产品迭代。\n3. 结果导向，学习能力强，具备良好的跨团队沟通与项目推动能力。\n4. 有新能源汽车行业交易经验优先，有AI产品经验或AI应用落地经验者优先。"},{"id":"理想-4537a0bb5b36","source":"理想","title":"PDT整车产品经理","keywords":["AI"],"location":"北京顺义区","publishedAt":"2026-06-29 23:18:55","url":"https://www.lixiang.com/employ/detail/18562.html","jd":"1. 产品价值守护与交付：负责整车新产品从定义到落地的全链路管理，与研发、设计、供应链等团队协同，确保产品力达成；守护在售产品的用户体验、成本与口碑；重点在于智能汽车产品定义和产品验收，过程中与研发共同探讨优秀产品力的实现方案。\n2. 用户需求本质识别：透过用户表面表达，挖掘真实未被满足的需求，判断需求的真伪与优先级，基于用户的痛点和痒点，并结合技术可行性，将抽象能力转化为具体的符合产品定位的产品方案；\n3. 具身智能在整车的应用定义：基于具身智能技术在整车场景的主动服务应用，界定服务边界，在安全可控的前提下设计有用户价值的主动服务；\n4. 技术边界判断与方案验证：理解智能技术的当前边界，评估技术承诺的可信度，提出验证方法；在技术乐观与过度保守之间找到平衡点，推动合理方案落地；\n5. 产品价值沟通：向内对外准确传达产品价值与技术边界，支持对内一线产品专家、培训和对外媒体的理解与传播，能基于对技术与用户的同理心，将复杂能力翻译成用户易懂的语言。\n1. 学历与背景\n  - 本科及以上学历，专业不限；\n  - 优先考虑头部新媒体、新势力汽车科技产品经验、豪华汽车品牌产品管理经验的人才，或者具有机器人/自动化/CS/交互设计背景；\n  - 具备汽车企业多部门轮岗综合管理经验更佳。\n \n2. 工作经验\n  - 至少5年及以上产品管理相关经验（不必局限于汽车行业）；\n  - 有从0到1定义新产品或复杂功能的经验者、有成功上市产品者优先；\n  - 有跨领域整合经历者（机器人、智能硬件、智能座舱等）优先。\n \n3. 能力要求\n  - 对于行业、跨域的机会有自己的判断，对于未来趋势有一定的洞察；\n  - 具有同理心、独立思考和坚韧的性格，对打造优秀的产品有强烈的热爱和兴趣；\n  - 有用户场景的洞察能力，能识别用户需求真伪，不被表面表达迷惑；\n  - 理解AI/具身智能技术的基础逻辑，了解什么能做与不能做，在资源有限、场景模糊时能做出清晰的优先级取舍；\n  - 有跨域学习能力和沟通能力，能与算法、硬件、工程等团队协作；\n  - 有产品落地意识，理解工程约束和成本权衡。\n4. 人才特质\n  - 解决客户关键问题\n    - 能够穿透用户表面的表达，识别真正关键且未被满足的痛点和痒点；\n    - 在众多需求中辨别轻重缓急，聚焦最影响用户体验的\"关键问题\"。\n  - 创造高频用户价值\n    - 重点关注产品使用过程中高频场景，不只是追求\"新奇\"，确保功能有持续的使用价值；\n    - 能够通过整合跨域级优势进行创新性的产品定义，寻找出具有本公司产品定位的独特创新点者优先「基础型：通过行业竞品情况制定产品定义；进阶型：能够解决用户未被满足的痛点和痒点，制定产品定义；高阶型：能够通过全局思考，拥有跨行业、跨领域的思维视角，发现一些独具特色且对用户有价值的产品创新定义，具备高阶的整合能力和洞察潜在发展趋势机会」。\n  - 改善客户成本效率\n    - 有投入产出意识，在设计阶段就考虑ROI，做出商业层面可持续发展的产品；\n    - 懂得在资源有限时做取舍，聚焦做\"小投入大收益\"的产品定义。"},{"id":"理想-dbc4e2aecb9c","source":"理想","title":"销售系统产品经理","keywords":["AI"],"location":"北京顺义区","publishedAt":"2026-06-29 23:15:08","url":"https://www.lixiang.com/employ/detail/17186.html","jd":"统筹销售领域数字化规划和系统管理需求，对销售领域系统投资、业务价值和ROI负责，支撑战略与变革落地。\n1. 与公司系统团队一起规划销售领域IT/AI系统路标，对标行业最佳时间，并将业务目标与需求解码成重点工作；\n2. 通过简历需求排序模型和RAMT组织运营，收集，分析并管理销售的IT需求；\n3. 通过管理重点IT自研/外采项目，推动销售领域信息/数字/智能化建设的落地。\n1.本科及以上学历，具有汽车行业，销服领域，咨询公司工作经验者优先；\n2.较强的结构思维、学习能力、协作能力，对支撑销售业务一线高效协作，有热情；\n3.在To C CRM和交易系统领域深耕3年以上，有5人以上团队管理经验者优先"},{"id":"理想-8c01dfd40429","source":"理想","title":"空间AI产品经理","keywords":["AI"],"location":"北京顺义区","publishedAt":"2026-06-29 23:15:08","url":"https://www.lixiang.com/employ/detail/18923.html","jd":"职位描述 \n负责基于理想同学的座舱内AI产品规划，包括但不限于生成式应用、任务型对话产品\n拉通相关团队，负责产品体验端到端全流程。包括从市场/用户/场景分析、功能定义、产品体验设计、研发落地、效果评测、产品上线全流程。\n拉通品牌/传播团队，做好产品价值整合用于对外传递。 \n职位要求\n5年以上工作经验，有c端AI产品落地的优秀案例\n了解AI 技术，懂用户需求也懂技术边界，能最大化需求和技术的交集，把技术能力产品化\n保持对AI前沿创新的关注和敏锐度，主动发现其中产品机会\n沟通能力强，逻辑和结构化思维好\n好奇心、自驱力、责任心强"},{"id":"理想-a35530728d6b","source":"理想","title":"影像高级产品经理 (Imaging Product Manager)","keywords":["AI"],"location":"北京顺义区","publishedAt":"2026-06-29 23:15:08","url":"https://www.lixiang.com/employ/detail/18654.html","jd":"核心定位： 确保眼镜成为用户便捷的第一人称视角（POV）记录设备。\n岗位职责：\n1. 端到端画质： 定义摄像头选型标准，负责ISP调试风格把控，主导客观测试与主观评价（3A、色彩、清晰度）。\n2. 场景优化： 针对眼镜特有的第一人称视角（POV），优化防抖（EIS/OIS）、水平校正及暗光拍摄体验。\n3. 功能定义： 设计抓拍、录像、直播、回看及AI精彩时刻剪辑等功能体验。\n4. 算法协同： 对接视觉算法团队，提升SLAM辅助成像或AI画质增强的效果。\n1. 5年以上手机、运动相机或无人机影像产品经验。\n2. 熟悉Camera模组技术路径、ISP调试流程及DXOMARK评分标准。\n3. 具备极佳的审美能力，对“第一人称叙事”影像有独到见解。"},{"id":"通义-0375cea63cbe","source":"通义","title":"AI创新事业部-AIGC产品经理 / 高级产品专家（多模态方向）-未来生活实验室","keywords":["AI"],"location":"北京 / 杭州","publishedAt":"2026-06-29 17:04:21","url":"https://careers-tongyi.alibaba.com/off-campus/position-detail?positionId=100007080003","jd":"1. 多模态产品规划与落地：负责多模态 AIGC 产品的整体规划、产品架构与能力设计，主导从 0→1 或 1→N 的产品建设与迭代，推动多模态生成技术在真实业务场景中的规模化落地。\n2. 技术能力与业务场景融合：深入理解多模态大模型的能力边界与演进方向，持续挖掘高价值应用场景，将前沿算法能力转化为具备用户价值与商业价值的产品能力。\n3. 跨团队协同与项目推动：作为算法、工程与业务团队之间的核心协同角色，承担“技术翻译”与“方向推动”职责。深度参与模型效果评估、能力定义与迭代策略制定，推动项目高效完成从需求、验证到上线的完整闭环。\n4. 行业洞察与战略判断：持续关注全球多模态 AIGC 领域的技术趋势、产品创新与行业变化，对未来 1-2 年的技术演进与产业机会具备独立判断能力，为产品方向与战略决策提供前瞻性输入。\n\n岗位方向\n● 视频生成模型与产品 HappyHorse\n● 世界模型与交互式产品 HappyOyster\n● 其他创新探索产品......\n1. 经验背景:3 年以上互联网或 AI 产品经验，具备多模态 AIGC 产品的完整落地经历；有视频生成、多模态模型平台、模型工具链或底层模型相关经验者优先。\n2. 技术理解能力:对多模态 AI 技术具备较强理解力，能够与算法围绕模型生成效果、推理成本、数据质量、能力边界等问题进行深入且专业的讨论。\n3. 前瞻性与行业判断:对多模态大模型及相关前沿方向保持高度敏感，对未来技术演进路线具备独立思考与判断能力；能够穿透技术 hype，理解长期真正有价值的能力与机会。\n4. 综合能力:具备强烈的 Owner 意识与结果导向，能够主动发现问题并推动复杂项目落地；逻辑清晰、沟通高效，具备优秀的判断力与协同能力，能够在算法、产品与用户之间承担关键“翻译层”与“决策层”角色。"},{"id":"阿里云-541bb91dbdfe","source":"阿里云","title":"阿里云智能-AI Native 应用产品经理 - AI Coding / Agent 方向-专有云（北京&杭州）","keywords":["AI","Agent"],"location":"北京 / 杭州","publishedAt":"2026-06-29 15:29:26","url":"https://careers.aliyun.com/off-campus/position-detail?positionId=100015463012","jd":"岗位职责\n1. 产品规划与方向定义\n● 负责 AI Native 应用方向的产品规划，重点围绕 AI Coding、Code Agent、研发智能体、企业知识管理智能体 等场景，定义产品定位、目标用户、核心场景、版本路线图和商业化路径。\n● 面向专有云客户的真实业务环境，识别高价值、高频、可验证的 AI 应用场景，判断哪些能力适合标准产品化，哪些能力适合行业模板化，哪些能力适合项目定制化。\n● 跟踪国内外 AI Coding、Code Agent、Developer Tools、Agent Infra、LLMOps、Agent-Eval 等方向的发展趋势，形成产品洞察和竞争分析。\n2. AI Coding / Code Agent 产品设计\n● 负责 AI Coding 类产品的核心能力设计，包括但不限于：代码库理解、研发知识问答、需求到任务拆解、代码生成、代码重构、单测生成、缺陷修复、变更解释、迁移改造、运维排障等。\n● 设计 Code Agent 的完整任务链路，包括用户意图识别、上下文构建、工具调用、计划生成、代码修改、测试验证、结果解释、人工确认、权限控制与回滚机制。\n● 围绕企业级研发流程，打通代码仓库、制品库、CI/CD、缺陷管理、需求管理、文档知识库、权限系统、审计系统等工具链。\n3. Agent 工程能力产品化\n● 将大模型、RAG、Function Calling / Tool Use、Workflow、Memory、Multi-Agent、评测系统、可观测性、安全护栏等技术能力，转化为可被业务用户和研发团队使用的产品能力。\n● 定义 Agent 的运行机制和产品边界，包括任务规划、工具编排、上下文管理、权限模式、人机协同、失败恢复、日志追踪、结果验收等。\n● 与相关团队协同，推动从 Demo / PoC 到生产级产品的演进。\n4. 专有云场景落地\n● 深入理解专有云、私有化部署、数据不出域、权限隔离、信创适配、安全合规、离线环境、客户侧交付等场景约束。\n● 面向政企客户、行业客户、内部研发团队开展需求调研、场景共创、PoC 验证和产品化沉淀。\n● 将项目交付过程中的共性需求抽象为标准能力、行业模板、最佳实践和产品包，提升复制效率。\n5. 评测、指标与闭环\n● 建立 AI Coding / Agent 产品的效果评估体系，包括任务完成率、代码采纳率、一次通过率、测试通过率、缺陷修复率、节省工时、用户留存、客户满意度等指标。\n● 设计离线 Benchmark、真实任务集、客户验收标准、灰度评估机制和反馈闭环，解决 Agent 产品“能跑”到“可靠、可控、可交付”的问题。\n● 联动算法和工程团队，基于真实用户反馈、失败样本、日志数据，持续优化模型效果、工具链设计和产品体验。\n6. 商业化与解决方案包装\n● 参与 AI Native 应用的产品包装、版本规划、定价策略、解决方案材料、标杆案例和客户汇报。\n● 将 AI Coding / Agent 能力从单点工具，升级为面向行业客户的“研发提效、软件现代化、知识资产沉淀、工程能力升级”解决方案。\n任职要求\n基础要求\n● 本科及以上学历，计算机、软件工程、人工智能、信息管理、自动化等相关专业优先。\n● P7：5 年以上产品经验，具备独立负责复杂产品模块或 0-1 产品落地经验。\n● P8：8 年以上产品经验，具备复杂产品线、平台型产品、ToB 商业化或跨团队产品负责人经验。\n● 有云计算、开发者工具、DevOps、低代码/平台工程、AI 产品、大模型应用、企业软件、研发效能平台等相关经验之一。\n技术理解要求\n● 理解软件研发流程和工程工具链，熟悉需求、代码、测试、构建、发布、运维、缺陷管理等 SDLC 环节。\n● 熟悉大模型应用基本原理，理解 Prompt / Context Engineering、RAG、Tool Use、Function Calling、Workflow、Memory、Agent、模型评测等概念。\n● 对 AI Coding 产品有实际使用或设计经验，熟悉 Cursor、Claude Code、Codex、GitHub Copilot等产品者优先。\n● 能够与算法、工程、架构团队进行有效技术讨论，能把复杂技术能力转化为清晰的产品方案、验收标准和用户价值。\n产品能力要求\n● 具备强需求洞察和抽象能力，能够从客户项目中提炼共性能力，并沉淀为标准化产品。\n● 具备较强的结构化表达能力，能够输出高质量 PRD、产品路线图、指标体系、竞品分析、解决方案材料和客户汇报材料。\n● 具备数据驱动意识，能够围绕非确定性 AI 产品建立效果评估、反馈闭环和持续迭代机制。\n● 具备强 Owner 意识，能在高度不确定的新产品方向中推动跨团队协作和结果落地。\nToB / 专有云要求\n● 有企业级产品、云产品、私有化部署、政企客户、金融/能源/运营商/政府等行业客户经验优先。\n● 理解企业客户对安全、权限、审计、稳定性、可运维、可交付、可验收的要求。\n● 能适应从客户共创、POC、交付落地到产品化沉淀的完整 ToB 产品节奏。"},{"id":"快手-5a9b181f9c7b","source":"快手","title":"社区产品经理（可灵AI专项）","keywords":["AI"],"location":"Beijing","publishedAt":"2026-06-29 15:25:20","url":"https://zhaopin.kuaishou.cn/recruit/e/#/official/social/job-info/26848","jd":"1、负责可灵app/web端的内容推荐，通过内容策略和分发效率的优化，提升用户体验并带动创作者创作和活跃；\n2、深入理解AIGC内容和国内外行业趋势，具备在AI内容场景下的内容选择和判断力，以及对创作者行为和动机的洞察；\n3、针对国内、海外的差异化创作者和内容生态，进行策略的适配及本地化；\n4、与相关技术团队、社区运营团队、创作工具团队等高效合作，共同推动社区规模和创作规模增长，并可以反向梳理创作趋势并输出；\n5、搭建创作者激励与成长体系，打通从新手到优质创作者的成长路径，持续为平台培养和沉淀更多优质创作者。\n1、本科及以上学历，3年以上社区推荐/创作者生态相关产品经验，有AI相关经历优先；\n2、对AI和大模型有充分的兴趣和爱好，愿意投身其中和持续学习；\n3、具备较强的逻辑思维与沟通表达能力，善于协调资源，具备良好的推动能力和总结复盘能力；\n4、积极乐观，具备创业精神与探索意识，愿意与团队及业务共同成长。"},{"id":"淘天集团-6fef6aa3902e","source":"淘天集团","title":"淘宝平台事业部-AI产品经理-虚拟商品行业","keywords":["AI","Agent"],"location":"杭州","publishedAt":"2026-06-29 10:56:28","url":"https://talent.taotian.com/off-campus/position-detail?positionId=100013600002","jd":"1. 深度参与探索AI Agent在数字生活（虚拟）行业的创新与落地，聚焦核心业务场景，定义并构建具备自主规划与执行能力的下一代智能化工作流；\n2. 利用AI技术进行业务方案的快速发散与收敛，开展Prompt工程、RAG架构及Agent工作流设计，通过代码能力快速搭建MVP进行前置可用性与效果评估；\n3. 与算法团队紧密协作，深度参与AI模型的效果调优与迭代，从用户与业务双视角定义模型输出的评估标准，持续打磨确保Agent在复杂场景下的稳定性与准确性；\n4. 持续进行用户研究与市场行业分析，跟踪AI Agent与电商垂直领域的行业和技术趋势，识别和挖掘在具体业务痛点下的应用机会。\n1. 本科及以上学历，计算机、人工智能、电子通信、数学、心理学、统计学等相关专业优先；\n2. 希望你发自内心的热爱技术与创新，对AI Agent有极大的热情和信心，对大模型、多模态、对话式交互等有敏锐的感知力，享受通过技术手段解决复杂问题的过程；\n3. 对AI有浓厚的兴趣和好奇心，熟悉LLM、Agent、RAG等产品形态，具备提示工程、工作流编排等实战经验，热衷于思考如何将AI能力转化为具体的业务价值；\n4. 具备“懂技术”的产品特质：拥有计算机相关背景或扎实的编程基础（如Python/JS），能够理解技术边界，具备独立编写脚本、搭建Demo或进行数据验证的能力，能与研发团队高效同频；\n5. 优秀的用户同理心和洞察力，懂数据、善思考，善于发现本质问题，并提出创造性的解决方案，具备从0到1主导AI产品落地的成功经验。"},{"id":"淘天集团-9ba879f9f267","source":"淘天集团","title":"天猫事业部-AI导购产品经理-杭州","keywords":["AI","Agent"],"location":"杭州","publishedAt":"2026-06-29 10:16:43","url":"https://talent.taotian.com/off-campus/position-detail?positionId=100013280001","jd":"1、负责天猫APP端内的AI导购产品，参与导购Bot的0到1设计，包含Agent框架设计、模型调控、知识库搭建和C端体验等，落地AI导购的流程体验；\n2、负责部分AI产品设计，包含商品库、知识库、用户意图推理引擎等，联动生态角色完成导购知识库构建，将非标行业经验（怎么选、怎么避坑）转化为数字资产；\n3、探索天猫APP端内图文、卡片、流式交互的组合，设计从“推荐种草”到“下单”的C端体验。\n1、 3年以上互联网产品经验，有电商导购、内容社区（小红书/抖音）或搜索推荐策略相关经验者优先；\n2、对AI有实操理解或者希望学习，理解LLM边界，会使用常见的AI工具，懂基本的 Prompt Engineering（提示词工程）逻辑；\n3、懂用户需求，能敏锐捕捉到“小白怕什么”、“老手挑什么”，并以此为乐，并能结合用户导购场景的痛点，提出解决方案；\n4、加分项（有其一即可）：有评测、模型后训练经验，做过 C端对话式产品或Agent 智能体落地项目。"},{"id":"淘天集团-af2cca6098d5","source":"淘天集团","title":"营销平台及市场部-营销导购产品经理（AI方向）-杭州","keywords":["AI","Agent"],"location":"杭州","publishedAt":"2026-06-29 10:15:44","url":"https://talent.taotian.com/off-campus/position-detail?positionId=100013020009","jd":"1、深入理解电商业务全链路与用户核心需求，以 AI 技术为引擎，设计前瞻性电商解决方案，全面提升用户购物体验与运营效率，推动电商业务向智能化纵深发展。\n2、主导淘宝 & 天猫营销 IP、营销会场的产品规划与创意设计，围绕明星营销、事件营销、内容营销等核心业务定位，打造具备强出圈势能与广泛传播力的互动营销玩法。\n3、结合营销周期节点，深耕日销与大促场景，持续迭代前台导购形式与用户触达路径；联动上下游及横向产品域，多维度探索业务增量空间。\n4、持续关注行业动态与市场营销趋势，跟踪前沿科技发展，充分释放想象力与创造力，积极探索内容营销与 AI 营销的全新范式与可能性。\n1、对 AI 技术底层原理有深入理解，持续跟进 AI 新技术迭代动态；至少具备一个 ToC 场景 AI 产品的完整落地经验（工作或个人项目均可），清晰把握技术能力边界，能够结合具体业务场景提出切实可行的解决方案。\n2、熟悉主流 AI Agent 架构在策略场景中的应用逻辑，具备独立完成 Agent 搭建的能力；能与算法团队协同定义模型优化路径与评估指标体系。\n3、拥有敏锐的用户洞察力与高效的提炼抽象能力，善于完成「用户需求 → AI 方案」的精准转译；对新鲜事物充满好奇心，具备强烈责任心、出色的沟通表达能力与团队协作精神。\n4、具备从零搭建产品或核心模块的完整实践经验，动手能力强，能够独立驱动方案设计至落地全过程；有代表性成果或实践项目者优先考虑。"},{"id":"淘天集团-533bb45505f7","source":"淘天集团","title":"淘宝平台事业部-AI产品经理-业务风控部","keywords":["AI"],"location":"杭州","publishedAt":"2026-06-29 10:01:49","url":"https://talent.taotian.com/off-campus/position-detail?positionId=100007800013","jd":"1. 负责业务风控产品体系中客户侧产品的设计、规划与落地实施；  \n2. 结合大模型技术，打造风控体系对客AI解决方案，以提升风控治理效率，兼顾客户体验；  \n3. 联动技术、运营等团队，制定跨部门协作流程与治理方案，确保高效执行和运行；  \n4. 结合业务目标与用户需求，通过数据驱动、能力迭代持续优化产品策略及链路，提升关键性指标。\n1. 本科及以上学历，计算机、人工智能或相关专业；\n2. 3年以上互联网产品经验，具备AI产品经验及成功产品案例，熟悉电商、金融科技等风控逻辑优先；\n3. 熟悉大模型的技术原理、训练过程及应用场景，对AI技术有较深理解；\n4. 能通过数据挖掘与建模分析业务问题，有通过数据优化产品核心指标的实战项目；\n5. 对业务结果敏感，能平衡用户体验与风控目标，具备快速学习新技术新能力持续优化方案的韧性；\n6. 具备跨团队资源整合与项目管理能力，善于推动技术、运营等多角色协作。"},{"id":"腾讯-e6d9ec4186a1","source":"腾讯","title":"营销与交易产品部-云Mall 高级产品经理（电商交易平台方向）","keywords":["AI","Agent"],"location":"深圳","publishedAt":"2026年06月29日","url":"https://careers.tencent.com/jobdesc.html?postId=2043480582519947264&language=zh-cn","jd":"1.负责云Mall产品线的整体产品规划，包括版本路线图、优先级决策，从电商交易全链路（商品发现→决策转化→交易履约→售后服务）出发定义产品核心能力和差异化打法；\n2.主导交易核心模块的产品架构设计，包括商品管理、订单管理、结算引擎、库存管理、营销活动、售后服务等，设计可复用的产品化底座，支撑私有化部署与SaaS双模式交付；\n3.从AI原生视角重新定义交易平台的产品形态，思考当AI Agent成为交易参与者时，交易平台的产品架构、交互模式、数据开放方式需要发生怎样的根本性变化，而非在现有产品上叠加AI功能；\n4.前瞻性规划面向AI Agent时代的交易基建，定义交易平台如何适配\"人+Agent\"混合交易场景——商品如何被机器理解、交易流程如何被协议化调用、履约能力如何对外开放；\n5.深度洞察品牌客户需求，区分大品牌与中腰部客户的差异化诉求，将客户需求转化为可落地的产品方案；\n6.持续跟踪行业趋势与竞品动态（如业内头部标杆产品的AI化演进，AI Agent/MCP等新范式对电商交易场的重塑），转化为产品策略输入。\n1.5年以上电商交易平台/电商SaaS产品经验，对交易全链路（商品、订单、库存、结算、营销、售后）有系统性理解，做过或深度参与过电商建站平台/交易平台型产品（如同类电商SaaS/PaaS）；\n2.深刻理解交易场的核心指标和优化逻辑，熟悉转化漏斗、加购率、结算转化率、客单价、复购率等关键指标，有实际的交易转化率优化经验；\n3.有大客户/品牌客户的产品服务经验，理解大品牌的定制化、数据安全、私有化部署需求，能在产品化和项目化之间找到平衡；\n4.具备AI原生的产品思维：能跳出\"在现有电商产品上加AI功能\"的惯性，从交易形态变革的角度思考产品——当交易的发起者从人变成Agent，产品该长什么样；\n5.对AI Agent时代的电商变革有独立思考，理解AI Agent、MCP协议、自然语言交互等新范式对电商交易场的潜在冲击，能提出面向未来的产品架构储备方案；\n6.务实且有前瞻性，能把在产品基础优化的过程中，同时保持对AI和行业趋势的敏感度，为产品下一个阶段做准备。"},{"id":"腾讯-6d40bd270445","source":"腾讯","title":"腾讯安全-AI代码安全产品经理","keywords":["AI"],"location":"深圳","publishedAt":"2026年06月29日","url":"https://careers.tencent.com/jobdesc.html?postId=2070679023687745536&language=zh-cn","jd":"1.负责 CodeBuddy Security（企业级AI代码安全扫描产品）的产品规划与路线图制定，对标业界领先产品，构建差异化竞争力；\n\n2.主导产品功能设计与迭代，将大模型能力与 SAST 代码安全技术深度融合，设计高准确率、低误报的智能化代码安全检测与自动修复方案；\n\n3.持续跟踪AI代码安全领域的行业趋势与竞品动态，深入研究大模型在漏洞检测、安全审计等场景的前沿应用，输出竞品分析报告为产品演进提供决策依据；\n\n4.深入调研企业客户安全需求与开发流程，确保安全检测能力无缝融入 IDE、CI/CD、代码评审等开发者日常工作流，做到安全能力无感植入、风险预警精准触达；\n\n5.建立产品效果度量体系（漏洞检出率、误报率、修复采纳率等），配合GTM团队推动产品商业化落地与客户拓展。\n1.本科及以上学历，计算机科学、信息安全、软件工程等相关专业，3年以上产品经理工作经验；\n\n2.熟悉软件安全开发生命周期（SSDLC），了解常见漏洞类型（OWASP Top 10、CWE）及代码安全检测技术（SAST/SCA/DAST）；\n\n3.熟悉主流编程语言（Java/Python/Go/JavaScript等）及开发框架，理解CI/CD流水线、代码托管平台（GitLab/GitHub）的工作机制；\n\n4.了解大语言模型（LLM）的基本原理与应用范式，对AI在安全领域的应用有独立思考；\n\n5.具备优秀的需求分析、产品设计和文档撰写能力，能独立完成PRD、产品原型和路线图规划；\n\n6.具备出色的跨团队沟通协调能力与严密的逻辑思维，能在复杂技术环境中推动多方共识。"},{"id":"百度-7e81d0713790","source":"百度","title":"文心助手策略产品经理（J101139）","keywords":["AI"],"location":"北京市","publishedAt":"2026-06-29","url":"https://talent.baidu.com/jobs/detail/SOCIAL/c692bea7-fbd9-43ba-aa0e-5d7b2144966b","jd":"-负责文心助手策略设计及效果评估，为策略体验负责\n-深入分析用户需求，能够捕捉到用户需求，并优化产品策略\n-监控产品数据，通过数据分析，挖掘问题，指导策略设计\n-通过体验评估及实验机制，验证策略有效性，并持续迭代\n-本科及以上学历，2年以上策略产品工作经验，有AI产品经验者优先\n-具备出色的逻辑分析能力\n-对数据敏感，能够通过数据分析指导策略迭代\n-优秀的沟通表达能力，能够协同团队完成项目的推进"},{"id":"腾讯-a0ba9f0d8b3b","source":"腾讯","title":"微信读书产品部-AI产品经理","keywords":["AI","Agent"],"location":"广州","publishedAt":"2026年06月29日","url":"https://careers.tencent.com/jobdesc.html?postId=2068897868235849728&language=zh-cn","jd":"1.负责读书产品部新应用的产品策划工作，涵盖 IM 群聊、AI Agent、实时协同等；\n\n2.结合前沿技术发展趋势，探索AI在办公协作/项目管理等场景的创新落地方案；\n\n3.洞察挖掘用户对AI的真实需求和具体场景，设计解决方案并落地；\n\n4.跟进并理解大模型等相关技术发展，深刻理解模型进化带来的改变，在产品的设计中充分应用模型能力。\n1.具备极客精神，能通过低代码平台或代码进行原型验证，自己动手搭建过各种AI Agent/工具项目优先；\n\n2.有B端或C端AI 相关产品经验，对AI行业趋势和大模型技术有深刻理解和热情；\n\n3.超强的学习能力，强烈的好奇心和探索欲，不做好不罢休的胜负欲；\n\n4.具备极强的用户思维和数据分析能力，能精准理解用户需求并利用数据驱动决策。"},{"id":"理想-f7b57eaafb42","source":"理想","title":"车载控制器产品经理（自动驾驶/AI方向）","keywords":["AI"],"location":"上海","publishedAt":"2026-06-28 11:14:22","url":"https://www.lixiang.com/employ/detail/19003.html","jd":"1. 产品定义与规划\n- 理解自动驾驶控制器、AI BOX 的技术架构与能力边界，提炼产品化方案\n- 负责产品线的需求分析、功能定义、规格制定，输出 PRD 及产品文档\n- 跟踪行业趋势与竞品，为产品路线图提供输入\n- 负责前沿方向的早期产品探索和可行性评估，包含机会挖掘、用户画像、产品价值、产品战略分析\n2. 跨部门协同与项目管理\n- 协同硬件、软件、算法、测试、制造等团队，推动产品从方案到量产全流程落地\n- 参与架构评审，确保产品需求与技术架构一致\n- 跟踪开发进度，识别风险，确保产品的形态与体验符合预期\n- 作为产品接口人协调内外部资源\n3. 客户与市场支持\n- 配合销售与商务团队，提供技术交流、Demo 演示、方案定制等支持\n- 收集客户反馈与市场需求，转化为产品改进建议\n- 参与产品发布、展会演示、技术白皮书等工作\n必备条件：\n- 本科及以上学历，电子工程、自动化、计算机、通信、机械电子等相关专业\n- 3 年以上产品工程/产品管理相关经验，有自动驾驶、人工智能或智能硬件行业经验优先\n- 具备硬件架构和软件系统基础知识，能与工程师高效沟通\n- 能将技术语言翻译为产品语言，具备用户需求分析和产品定义能力\n- 熟练使用各种AI工具&SKILL，如Claude Code、OpenClaw、Gemini、NotebookLM等\n- 熟练使用 PRD、竞品分析、产品方案等专业文档\n- 优秀的跨部门协作能力和项目管理意识\n加分项：\n- 拥有AI技术的行业认知，关注国内外AI行业的进展\n- 有自动驾驶域控制器、AI 推理加速平台、边缘计算设备等产品经验\n- 熟悉嵌入式 Linux、ROS、AI 推理框架（TensorRT / ONNX Runtime 等）\n- 英语可作为工作语言"},{"id":"理想-0964efc21471","source":"理想","title":"空间AI产品经理（AI Operator）","keywords":["AI"],"location":"北京顺义区","publishedAt":"2026-06-28 11:14:22","url":"https://www.lixiang.com/employ/detail/18922.html","jd":"职位描述 \n负责基于理想同学的座舱内AI产品规划，包括但不限于生成式应用、任务型对话产品\n拉通相关团队，负责产品体验端到端全流程。包括从市场/用户/场景分析、功能定义、产品体验设计、研发落地、效果评测、产品上线全流程。\n拉通品牌/传播团队，做好产品价值整合用于对外传递。 \n职位要求\n5年以上工作经验，有c端AI产品落地的优秀案例\n了解AI 技术，懂用户需求也懂技术边界，能最大化需求和技术的交集，把技术能力产品化\n保持对AI前沿创新的关注和敏锐度，主动发现其中产品机会\n沟通能力强，逻辑和结构化思维好\n好奇心、自驱力、责任心强"},{"id":"理想-d7d707200bd3","source":"理想","title":"理想汽车App车控产品经理","keywords":["AI","Agent"],"location":"北京顺义区","publishedAt":"2026-06-28 11:14:22","url":"https://www.lixiang.com/employ/detail/18817.html","jd":"1. 基础车控与体验基建：负责公司全系车型APP端车控产品（如远控、车况、遥控器、眼镜车控等）的规划与设计，对整体用户体验、功能可用性及产品竞争力负责。\n2. AI Agent创新与落地（核心）：结合大模型与AI Agent技术，打造APP端“智能车控管家”。通过多模态交互、用户习惯学习与环境感知（如日程、天气、位置），实现场景化的主动推荐与自动化车控（如通勤前的智能备车工作流）。\n3. 全场景生态拓展：探索并落地远程车控的生态合作，包括但不限于主流手机厂商（OS级融合）、智能穿戴、车家互联（IoT），并引入AI能力实现跨端场景的无缝流转。\n4. 软硬+AI融合创新：联动车端舱内/舱外感知能力、底层硬件接口与云端算力，挖掘“硬件+AI”的特色车控玩法，打造具差异化的产品体验。\n5. 数据驱动与AI自学习：建立完善的数据指标体系与可用性测试机制，通过数据分析评估产品效果；利用数据反哺AI模型，形成“数据驱动+AI自学习”的产品迭代闭环。\n6. 方法论沉淀：提炼AI时代下的车控产品设计准则（如Agent交互规范、主动服务边界），在团队内推行并赋能他人，沉淀有价值的个人见解。\n任职要求\n1. 经验背景：5年以上互联网或智能硬件产品经验，其中3年以上汽车/车联网行业经验，有成熟的APP端车控或车联网产品从0到1落地经验。\n2. AI/Agent认知（加分项/关键项）：对AI新时代有极高的热情，熟悉大模型（LLM）、AI Agent、自然语言交互（NUI）等前沿技术；有AI类产品（如智能助手、自动化工作流、大模型应用）落地经验者优先。\n3. 业务与分析能力：具备极强的业务学习能力和敏锐度，能快速掌握AI新技术并转化为实际业务价值；擅长将复杂的业务问题量化，具备优秀的数据分析能力。\n4. 综合素质：具备极强的用户同理心与需求洞察力；优秀的跨部门沟通协调能力（需频繁对接研发、硬件、AI算法及外部生态伙伴），逻辑严密，抗压能力强。\n加分项\n1. 有车控产品经验的优先，有AI Agent实践经验的优先；\n2. 驾驶经验：持有C1/C2驾照，3年以上实际驾龄，热爱汽车与科技，是智能汽车的深度体验者。"},{"id":"理想-e8b2de108c3c","source":"理想","title":"智能驾驶AI高级产品经理","keywords":["AI"],"location":"北京顺义区","publishedAt":"2026-06-28 11:14:22","url":"https://www.lixiang.com/employ/detail/15783.html","jd":"完成下一代自动驾驶产品设计和交付，负责模型能力训练、人机交互方案设计、功能体验提升等。\n与研发团队紧密合作制定自动驾驶产品的训练策略，包括但不限于数据准备、模型微调、强化学习等，确保模型在各应用场景下的性能和效率。\n负责自动驾驶产品的评测和对标，指导自动驾驶能力的提升和迭代。\n跟踪最新的人工智能技术和行业趋势，评估其对产品的影响，并提出相应的产品改进建议。\n了解大模型基本知识，包括LLM、E2E、VLA等大模型基础架构，并熟悉架构演化的趋势、关键差异\n有参与过模型预训练、强化训练的实践经验，有在后训练、数据管理和模型评测方面的实践经验\n至少3年在大模型产品/自动驾驶产品管理或相关领域的工作经验\n计算机科学、人工智能、数据科学或相关领域的学士或硕士学位。\n具备出色的项目管理能力和跨团队协作能力。\n具备良好的数据分析能力和问题解决能力。"},{"id":"理想-bfb67723717a","source":"理想","title":"具身Agent安全产品经理 (Safety PM)","keywords":["AI","Agent"],"location":"北京顺义区","publishedAt":"2026-06-28 11:14:22","url":"https://www.lixiang.com/employ/detail/18788.html","jd":"岗位定位：【我们的战场】AI正从“数字对话”走向“物理控制”。你的任务是为栖身在车机、眼镜等终端的具身Agent制定“安全度量衡”。我们需要精通硬件领域的Agent安全专家，不仅关注2D数字安全，更需要关注3D物理交互安全。\n【核心职责】\n1. 定义标准： 搭建横跨端云的安全评估矩阵，将模糊的“安全感”转化为硬核的量化指标（如：本体执行安全率等）。\n2. 边界仲裁： 设计端云协同的安全博弈机制，牵引上下游落地安全策略，在指令冲突或环境突变时，确保系统能“优雅降级”。\n3. 全域风险管控： 统筹Agent在“3D物理交互”与“多模态数据流转”中的双重风险。既要保障驾驶安全与车辆控制底线，也要构建端侧传感器（视觉/语音等）的隐私保护机制，确保产品符合行业严苛的数据安全合规标准。\n【我们寻找的你】\n1. 硬核背景： 1年以上具身Agent安全实战经验，深谙 OpenCLAW 及 Agent底层逻辑，技术审美在线。\n2. 边界思维： 能一眼看穿“安全成功率”与“任务完成率”的本质区别（前者是生死线，后者是及格线）。\n3. 具身与合规基因： 对物理世界有敬畏心，对数据隐私有敏感度。不仅追求不出事，更追求Agent业务上限、物理风险控制与数据合规的完美平衡。\n4. 收敛能力： 能够把上下游对于风险的模糊顾虑（包括安全漏洞与合规红线），收敛成一套可执行的规划、方案和策略。\n【加分项】\n1. 擅长在混沌中建模，有定义行业级“具身智能安全准则”的野心。\n2. 精通车、懂行驶类终端。"},{"id":"理想-b4759d2134c6","source":"理想","title":"充电体验产品经理","keywords":["AI"],"location":"北京顺义区","publishedAt":"2026-06-28 11:14:22","url":"https://www.lixiang.com/employ/detail/19251.html","jd":"职位描述\n- 负责充电体验方向的需求分析、方案设计和迭代落地；\n- 负责 App、小程序等 C 端产品能力建设，优化用户在充电全流程中的关键体验。结合业务场景，探索 AI 能力在充电体验中的应用，推动相关方案设计与落地；\n- 参与或主导支撑前台体验落地的后台系统建设，包括配置能力、规则逻辑、状态流转、运营支撑等；\n- 协同研发、设计、测试、运营、数据等团队，推动复杂业务场景下的产品方案落地；\n- 基于用户反馈、数据分析和场景走查，持续发现问题并推动体验优化。\n任职要求\n- 本科及以上学历，3 年以上产品经理工作经验，有移动端经验，同时参与过中后台系统建设；\n- 有较强的产品方案设计能力，能够独立完成需求分析、流程设计、原型输出和项目推进；\n- 有良好的用户体验意识和场景洞察能力，能够从用户角度发现问题并提出解决方案；\n- 具备基础数据分析能力，能够结合数据和用户反馈进行产品判断与迭代；\n- 具备良好的跨团队沟通协同能力和结果导向意识；\n- 有新能源汽车使用经验、AI项目经验优先。"},{"id":"理想-1b0c40db495e","source":"理想","title":"【人形机器人】商业化产品经理","keywords":["AI"],"location":"北京顺义区","publishedAt":"2026-06-28 11:14:22","url":"https://www.lixiang.com/employ/detail/19219.html","jd":"【人形机器人】商业化产品经理\n【岗位职责】\n1. 场景洞察与需求挖掘：深耕对应赛道，开展人形机器人行业趋势、竞品动态、客户/用户需求的深度调研，输出场景分析与痛点洞察报告，挖掘产品创新机会。打造具备行业竞争力的软件系统，支撑双足人形机器人商业场景下的解决方案开发及市场拓展；\n2. 体系化的产品规划与定义：结合公司战略制定产品中长期发展路线图，完成商业可行性分析、成本测算与商业模式设计；输出标准化PRD与产品原型，明确功能定义、技术指标、交互逻辑与体验标准；\n3. 数据驱动与产品迭代：负责跟进项目中的需求，设计相关功能（包括不限于wms、rms、操作UI、机器人软件功能等相关功能需求），出具需求文档，搭建产品性能与体验评估体系，出具测试用例，跟进功能测试验收，跟进项目实施过程中的问题和闭环；通过场景测试、用户/客户反馈、运行数据分析驱动产品持续优化，提升产品场景适配性与可靠性；\n4. 技术跟进与合规管控：跟踪对应领域前沿技术与行业标准，探索技术落地场景；在产品设计阶段前置规避合规、安全与认证风险。\n【任职要求】\n1. 学历背景：本科及以上学历，自动化、计算机、机械工程、人工智能、产品设计、电子信息等相关专业；\n2. 经验要求：５年以上人形机器人、工业机器人、智能硬件、AI产品或相关领域产品经理经验，有产品从0到1落地案例优先；\n3. 专业能力：\n(1)熟悉智能硬件/机器人产品全生命周期管理，掌握标准化产品品设计方法论，能独立完成需求拆解、PRD撰写与原型设计；\n(2)了解机器人相关技术原理（运动控制、SLAM、计算机视觉、大模型、硬件结构等至少一类），能与研发团队高效沟通，独立评估技术可行性与落地成本；\n(3)具备良好的项目管理能力，能统筹多团队协同推进项目，识别并管控项目风险；\n(4)具有出色的洞察力和逻辑思维能力，思维敏捷，并能承受较强的工作压力；\n4. 综合素质：逻辑清晰，结果导向，具备较强的问题解决能力、跨部门沟通能力与抗压能力，能适配创业公司快速迭代的工作节奏；\n5. 有良好的审美设计能力，优先考虑。"},{"id":"理想-81c635487183","source":"理想","title":"AI应用主交互产品经理","keywords":["AI","Agent"],"location":"北京顺义区","publishedAt":"2026-06-28 11:14:22","url":"https://www.lixiang.com/employ/detail/18741.html","jd":"核心定位： 打造智能眼镜在手机端的“指挥中心”与“记忆外脑”，确保软硬连接的流畅性与AI交互的连续性。\n岗位职责：\n1. AI Agent交互： 将“理想同学”在App端实体化，设计多模态交互界面（文字/语音/图片输入），用于查看眼镜端的对话历史、管理AI记忆、以及处理眼镜无法展示的富媒体回复（如地图卡片、购物链接）。\n2. 连接与设备管理： 定义眼镜与App的首次配对、重连及多设备切换流程，确保连接的稳定性与无感体验；负责电量显示、固件升级提醒及隐私权限管理。\n3. 媒体流转中心： 设计眼镜拍摄内容（照片/视频）导入手机的体验，优化传输速度（Wi-Fi Aware/蓝牙协同）与自动同步策略；提供基于AI的快速剪辑、美化及一键分享到主流社交平台的功能。\n4. 互联互通 ： 定义眼镜与智能设备之间的任务流转机制。\n1. 本科及以上学历，3年以上移动端App（iOS/Android）产品经理经验，有IoT配套App或工具类App经验者优先。\n2. 懂硬件通信： 理解蓝牙（BLE/Classic）与Wi-Fi直连的技术原理与限制，能与嵌入式开发团队协作解决连接不稳定、传输慢等痛点。\n3. AI交互设计感： 熟悉CUI（对话式交互）设计规范，对大模型App（如ChatGPT、豆包、千问）的交互形态有深入研究。\n4. 具备极强的用户同理心，能平衡“工具属性（用完即走）”与“内容属性（相册回顾/AI对话）”的关系。"},{"id":"快手-e549047e20a5","source":"快手","title":"海外商业产品经理（AIGC）-【KSIB】","keywords":["AI"],"location":"Beijing","publishedAt":"2026-06-26 15:56:05","url":"https://zhaopin.kuaishou.cn/recruit/e/#/official/social/job-info/31336","jd":"1、负责海外商业化内容AIGC的规划和设计，从内容理解、内容生产、流量匹配等多个方向探索和做功，包括但不限于脚本生成、文生图片、图生视频、文生视频等方向；\n2、对AIGC技术及 AIGC领域保持浓厚兴趣，积极探索将其融入产品的可能性，设计和实施创新的AIGC解决方案；\n3、与研发团队紧密合作，拆解复杂设计需求，梳理目标、路径与优先级，能独立推进项目从立项到交付的完整流程。\n1、计算机科学、人工智能或相关领域的专业背景优先，希望你深入理解NLP、深度学习等技术框架和算法原理；\n\n2、2年以上互联网经验，有产品或广告素材相关领域从业经验优先；\n\n3、具备出色的市场分析和产品规划能力，能根据市场需求制定有效的商业策略；\n\n4、优秀的团队协作和项目管理能力，能够利用AI工具提效，在多部门间有效沟通并推动项目进度，优先考虑成功实施前沿技术产品或商业化AIGC产品的经验者。"},{"id":"蚂蚁集团-e0392a1e970d","source":"蚂蚁集团","title":"网商银行-AI评测产品经理-杭州","keywords":["AI","Agent"],"location":"杭州","publishedAt":"2026-06-26T03:47:52.000+00:00","url":"https://talent.antgroup.com/off-campus-position/260626010639761","jd":"1、理解、研究用户和业务：深度理解小微企业的金融需求、经营痛点及风险特征，结合AI技术发展趋势，设计并优化AI智能客户经理-百灵。\n2、Agent评测：负责AI智能客户经理的评估体系设计、评估结论产出，提出有针对Agent各个环节的改进建议，提升大模型能力与应用效果；\n3、搭建评测体系：设计大模型能力及应用效果的评估体系，搭建评测流程和功能；调研大模型行业最新评测研究和报告，结合实际应用场景，更新内部评测技术方案。\n1、理工科背景，计算机或算法专业优先；\n2、具备1-2年产品相关经验，包括AI、评测；\n3、对LLM、AI Agent以及评测方法论有较好的理解；熟悉Benchmark、数据集以及标注相关流程；\n3、学习能力强，好奇心强，具备优秀的跨团队协作与沟通能力。"},{"id":"阿里云-933dcba9c759","source":"阿里云","title":"阿里云智能-AI原生数据库产品经理-北京/杭州","keywords":["AI","Agent"],"location":"北京 / 杭州","publishedAt":"2026-06-26 00:00:00","url":"https://careers.aliyun.com/off-campus/position-detail?positionId=100014403005","jd":"● 面向Agent，负责AI原生数据库的产品需求分析、功能规划，输出PRD、原型设计及定价策略等；\n● 负责数据库重大项目的项目管理，制定项目计划、里程碑和交付节奏，跟踪并解决项目阻塞问题，确保按时高质量交付；\n● 以AI原生的方式（团队内部同时有Agent和人），协调研发、测试、运维、安全等多团队资源，推动跨团队协作与风险管控。\n● 3-5年产品与项目管理经验，有数据库、云计算或企业级B端产品背景；有Agent相关产品经验者优先；\n● 具备较强的项目管理能力，能独立推进中型项目落地，熟悉敏捷开发流程逻辑清晰、沟通能力强，具备跨团队协作和复杂问题拆解能力；\n● 对云计算产品（AWS、Azure或GCP）和云原生技术如K8s、容器等技术有深入的理解；\n● 了解主流国产芯片/操作系统/中间件生态产品；\n● 熟悉数据库技术（MySQL\\Redis\\PostgreSQL），以及Agent Runtime、Context Engineering、Harness Engineering等技术者优先；有过Data Agent规划、开发、应用经验者优先。"},{"id":"腾讯-512d2367b355","source":"腾讯","title":"腾讯视频-AI 产品经理","keywords":["AI","Agent"],"location":"北京","publishedAt":"2026年06月26日","url":"https://careers.tencent.com/jobdesc.html?postId=2046845261342470144&language=zh-cn","jd":"1.参与腾讯视频worksolo等产品工作，包括AI Agent、skill、AI交互体验等核心模块的产品设计与迭代；\n2.深入理解AI视频生成、Agent、多模态大模型等技术能力边界，将前沿AI能力产品化为普通创作者可用的功能；\n3.持续关注AI行业趋势，规划核心功能，快速运用AI工具推动产品落地与版本迭代，协同算法、工程、设计、运营团队，定义产品目标与里程碑，保障产品按期高质量交付；\n4.建立数据驱动的产品迭代机制，基于用户反馈与核心指标持续优化产品体验，提升AI工具的易用性与留存。\n1.本科及以上学历，计算机、人工智能、数据科学等相关背景，3年以上产品经理经验，有AI/AIGC产品从业经历，AI创作工具（视频/图像/Agent/数字人等）项目经验优先；\n2.具备基础的AI产品素养，熟悉LLM、Diffusion、Agent框架、多模态模型、RAG等技术原理，能与算法及工程团队高效对话；\n3.有优秀的产品设计与交互能力，对用户体验有深刻理解，对C端产品细节有极高要求；\n4.具备从0到1的产品冷启动经验，能接受早期阶段高强度迭代节奏，有AI创作工具背景或个人是AI工具重度使用者优先。"},{"id":"腾讯-ce1a084e88c6","source":"腾讯","title":"腾讯混元大模型数据产品经理","keywords":["AI","Agent"],"location":"北京","publishedAt":"2026年06月26日","url":"https://careers.tencent.com/jobdesc.html?postId=2064244091922853888&language=zh-cn","jd":"1.负责腾讯混元大模型数据飞轮整体规划与落地，设计自动化、可自生长的数据迭代闭环，形成模型数据正向增长飞轮；\n\n2.负责大模型数据平台、智能采样、难例挖掘、数据质检、正负样本管理等数据基建产品的需求设计与迭代落地；\n\n3.联动算法、训练、评测、业务团队，针对推理、代码、长文本、Agent调用等核心场景，制定数据迭代策略，定向产出高质量增量数据，驱动模型效果迭代升级；\n\n4.建立统一的大模型数据质量标准、流程规范与效率指标体系，优化数据清洗、蒸馏、精标全链路，提升模型迭代效率、降低迭代成本；\n\n5.搭建模型幻觉、事实错误、逻辑偏差、安全风险等负样本数据闭环，持续优化模型对齐效果、稳定性与安全性；\n\n6.结合腾讯元宝、行业解决方案等业务场景，沉淀垂类数据迭代方案，支撑大模型规模化落地与商业化；\n\n7.跟进行业前沿数据迭代技术，结合混元模型架构特性持续优化数据飞轮体系，沉淀可复用的模型数据迭代方法论。\n1.本科及以上学历，2-3年及以上大模型AI产品经验，有大模型数据飞轮、RLHF/DPO模型对齐、模型迭代闭环相关落地经验；\n\n2.熟悉LLM预训练、微调、对齐全链路逻辑，了解大模型推理、代码、长文本、Agent等核心场景的数据迭代逻辑；\n\n3.具备独立的数据产品规划、方案设计、项目推进能力，数据敏感度高，能够通过数据分析定位模型短板并输出优化策略；\n\n4.逻辑清晰、执行力强，具备优秀的跨团队协同能力，可独立负责核心专项迭代；\n\n5.有大厂基座大模型、MoE模型迭代经验者优先。"},{"id":"腾讯-8a8de109ba7c","source":"腾讯","title":"混元大模型平台产品经理（北京/深圳）","keywords":["AI"],"location":"北京","publishedAt":"2026年06月26日","url":"https://careers.tencent.com/jobdesc.html?postId=2070472100677857280&language=zh-cn","jd":"1.一站式AI Infra底座体系建设：围绕混元大模型全链路研发流程，统筹设计模型训练、效果评测、服务部署、底层调度、版本迭代的一站式平台产品能力，构建标准化、可复用、高效率的模型研发基础设施，支撑内部模型规模化、常态化迭代交付；\n\n2.大模型评测体系产品化落地：负责AI评测平台核心能力搭建与体系升级，深度对齐通用/专业Benchmark评测标准、评测数据集管理、评测任务编排、多版本模型对照、效果归因分析等全流程产品设计，搭建标准化、自动化、可追溯的模型质量评估闭环，保障混元模型迭代精度与效果稳定性；\n\n3.跨团队技术需求治理与项目落地：深度对接算法研发、AI工程、框架团队、算力平台等核心角色，拆解复杂技术诉求、沉淀通用产品能力、输出完整方案与PRD，持续推进平台能力落地、流程提效、体验升级与技 具改进个人与团队的工作效率者优先；\n5.目标导向，能够在不确定中承担责任，有清晰的目标和结果意识，善于借助AI加速决策与交付，在不确定中推动结果落地，具备良好的沟通与跨团队协作能力，适应快速迭代的工作节奏。"},{"id":"腾讯-0ac7054d49bb","source":"腾讯","title":"元宝- AI策略产品经理","keywords":["AI","Agent"],"location":"深圳","publishedAt":"2026年06月25日","url":"https://careers.tencent.com/jobdesc.html?postId=1925398818564710400&language=zh-cn","jd":"1.优化Agent能力，通过包括不限于RAG、Tools、Memory等方式，不断提升用户体验；\n\n2.了解行业最新动态，并总结产品创新路径，探索行业最佳实践；\n\n3.抽象沉淀通用组建和能力，完善Agent平台能力，提升业务迭代效率。\n1.本科及以上学历，1年以上C端产品经验，有创新用户体验或用户增长经验优先；\n2.逻辑思维能力，沟通协作能力强，能跨团队高效协作，推动目标达成；\n3.有Agent实操经验，或大模型创新产品经验优先。"},{"id":"快手-8d0d0e4f51c1","source":"快手","title":"高级数据产品经理-【可灵AI专项】","keywords":["AI","Agent"],"location":"Beijing","publishedAt":"2026-06-24 16:03:38","url":"https://zhaopin.kuaishou.cn/recruit/e/#/official/social/job-info/30556","jd":"1、负责可灵AI业务面向分析、实验、训练的数据产品工作，对影响数据结果产出的全链路提出规划性建设意见和检验标准，构建指标体系、埋点、监控看板，建设数据工具和流程，提升可灵在分析、实验、训练的用数效率；\n2、对接埋点需求，跟进埋点全流程，交付结果，推进埋点质量相关建设，辅助优化数据采集和埋点方案；\n3、将数据需求抽象为库表需求，与数据开发进行数据仓库模型设计、库表验收，并进行数据字典建设与维护；\n4、负责收集和挖掘具有AIGC行业解决方案的数据需求，协调数据分析师和数据开发团队完成需求，根据业务需要协助制定数据运营策略，规划和完善数据平台；\n5、抽象数据分析需求，形成数据产品，通过数据描绘出整个业务流程、用户行为和重点环节的转化，帮助业务方更深刻的理解、使用和运营数据。\n1、硕士学历，3年以上数据产品、分析工作经验，统计、数学、计算机相关专业优先；\n2、熟悉海量数据的埋点、表设计、看板制作，有AI相关经验者优先；\n3、熟练使用SQL，熟悉数据仓库，能够从业务需求抽象库表，熟悉业内埋点方案的使用场景，参与制定过产品埋点方案及规范设计；\n4、良好的数据敏感度，了解大数据相关基础知识，熟悉常见的数据分析和处理方法，善于沉淀通用方案并推进产品化落地，日常善于利用AI工具为数据工作提效，有Agent落地经验的同学优先；\n5、自我驱动，有Owner意识，交付能力强，面对复杂情况能够独立工作，结果导向，跨团队与部门的沟通能力强，有较强的团队协作意识和能力。"},{"id":"快手-344b06c2bdd9","source":"快手","title":"AI Infra 成本运营产品经理-【可灵AI专项】","keywords":["AI"],"location":"Beijing / Shanghai","publishedAt":"2026-06-24 14:20:28","url":"https://zhaopin.kuaishou.cn/recruit/e/#/official/social/job-info/30981","jd":"1、理解业务模式与技术架构，制定成本采集方案，执行滚动预测与异动归因分析，识别成本风险并提前预警；\n2、监控 GPU 算力、存储、网络等基础设施资源的利用率与水位，持续关注研发提效策略，针对性调整运营手段和优化策略；\n3、基于业务发展预期和现有资源水位，制定中长期资源规划方案（容量预测、扩缩容节奏、采购策略）；\n4、评估采购需求，统筹云资源、硬件采购方案，从成本、供应稳定性、技术适配性等多维度为架构决策和资源规划提供数据支撑；\n5、定期与业务部门、财务、采购等部门对接，评估资源容量需求并进行合理规划；\n6、与各部门高频对接，收集使用反馈，持续优化产品体验和数据可视化。\n1、本科及以上学历，计算机、软件工程、信息管理等相关专业优先；\n2、1-3年工作经验，有数据分析、产品运营、技术运营、或采购管理相关背景；\n3、对基础设施到上层模型的链路成本有一定认知——理解物理机折旧、机房电力带宽、云资源弹性计费如何传导为算力成本，算力成本如何传导为训练/推理成本，识别链路中每一层的成本驱动因素与效率杠杆点；\n4、数据处理与分析能力扎实，熟练使用 BI 工具和 SQL 进行数据提取、分析与可视化呈现；\n5、逻辑清晰，善于从复杂数据中提炼规律和结论；\n6、跨部门沟通协调能力强，能推动多方协作落地；\n7、有以下经验者优先：\n1）有研发成本预算编制、资源运营、或采购项目管理实操经验；\n2）了解 GPU 算力调度、存储容量规划、或供应商管理的基本原理。"},{"id":"阿里云-eb1fb0d0a723","source":"阿里云","title":"ATH事业群-产品经理-AI应用（杭州/北京）","keywords":["AI","Agent"],"location":"北京 / 杭州","publishedAt":"2026-06-24 11:42:20","url":"https://careers.aliyun.com/off-campus/position-detail?positionId=100015523014","jd":"产品规划\n•通过市场分析，洞察市场机会和技术发展趋势、市场容量和竞争格局，定义细分市场。\n•通过竞对分析，识别产品、架构、技术和价格等方面优劣势，制定竞争策略。\n•通过调研，洞察用户和客户场景、需求。\n•负责产品生命周期和发展路线、商业化策略规划。\n•盘点研发人力，判断产品需求优先级，制定产品路标。\n产品设计\n•理解和抽象客户需求，分析客户场景，负责产品定义、功能和用户体验设计，输出PRD。\n•协调研发团队完成产品的开发和测试，完成产品功能上线。\n•基于对产品价值和成本的理解，参与价格策略制定和产品定价建议。\n产品经营支持\n•制定业务拓展策略，制定关键GTM指标，和PdSA共同制定拓展计划，跟踪产品市场表现和竞品情况，通过数据化经营分析提出产品经营改进建议。\n•制定生态发展规划，结合产品力、产品优势场景及伙伴能力图谱，为产品设计基于生态的规模化增长及生态各参与者的健康发展策略。\n产品上市\n•制定产品上架策略，实现产品上架。\n•主导产品GTM材料编写，协助PdSA完成赋能、参与产品营销推广。\n•标杆建设，负责新产品、新能力的新客户建设，沉淀为可复制材料。\n•产品商机挖掘，负责产品的目标市场分析，商机盘点，输出情报。\n产品持续改进\n•关注客户对产品的使用，合理安排产品需求优先级，推动产品改进、新产品或功能孵化，提升产品易用性，优化产品稳定性、安全性、性能和成本。\n产品信息架构设计（仅PD leader）\n•规划官网产品线页面内容架构和品类动线，细化产品线产品内容标准、信息架构标准和内容规范。\n•根据官网内容标准，建立产品线技术解决方案的整体信息架构，牵引各子产品官方PGC的生产和维护。\n•推动各子产品PD，生产和维护高质量的产品线技术内容，面向开发者和决策者组织各子产品全面升级文档、详情页、技术解决方案等技术内容。\n• 5年以上商业化AI应用产品经理经验，在至少一个行业有深度落地：金融、教育、电商、汽车、消费、制造、互联网等\n• LLM、Agent相关产品研发或技术架构经验优先\n• 多个小规模产品的市场、规划、设计、管理等生命周期管理相关经验\n• 有负责过成功产品、项目的经验，管理的产品存续超过3年为加分项\n• 深入理解业务运营及推动盈利增长的机制，放大成功机会和规避不利风险。\n• 基于市场供需情况，测算客户商业化价值，以及产品固定和浮动成本，为产品商业化提供输入。\n• 针对客户体验痛点，挖掘产品的体验优化空间，定义小规模产品的领域模型、产品架构，处理多产品、多角色间的关系。\n• 针对客户完整链路，主导产品功能设计及持续迭代。\n• 识别产品所处状态，合理运用资源，清晰定义产品推进过程中的关键里程碑，及时调整资源投入。\n• 能洞察客户需求和痛点，提出产品改进建议，推动产品缺陷修复、功能完善、迭代升级。\n• 理解技术原理，能参与产品设计过程中相关技术问题讨论，协调关键技术问题解决。 \n• 监督工程研发项目关键环节，及时识别潜在风险，做出相应管理动作，确保工程项目有序推进。"},{"id":"阿里云-5928fc0b2440","source":"阿里云","title":"ATH事业群-产品经理-AI解决方案（北京/杭州/深圳）","keywords":["AI","Agent"],"location":"北京 / 深圳 / 杭州","publishedAt":"2026-06-24 10:26:15","url":"https://careers.aliyun.com/off-campus/position-detail?positionId=100015463013","jd":"产品规划\n1. 负责 AI 产品的中长期规划与版本路线设计，持续跟踪大模型、Agent、多模态等技术演进趋势，评估其对产品方向、功能边界、商业模式及竞争格局的影响，动态调整产品策略与优先级，确保产品方向与技术可行性、市场窗口和商业价值保持一致。\n2. 深入理解用户任务、业务流程和使用场景中的痛点，抽象出高价值、可标准化、可规模化的 AI 应用场景，形成清晰的产品定义、场景边界和优先级判断。\n3. 持续跟踪 AI 领域竞品、基础模型能力变化及生态格局，分析市场机会、潜在替代风险和能力空心化风险，识别新的增长机会，并为产品定位、竞争策略和能力布局提供输入。\n4. 规划产品从0-1 到 1-N 的演进路线，结合市场验证、客户反馈和商业化目标，推动产品能力持续完善与规模化复制。\nAI能力产品化\n1. 深入分析客户任务链路和业务流程，识别适合被 AI 重构与优化的关键环节，设计 AI 原生的产品形态、交互模式、配置机制和使用体验。\n2. 协同算法团队确定模型选型、能力边界、输入输出和优化方向，将模型能力转化为可用、可配置、可规模化复制的产品功能，提升产品使用价值和用户体验。\n3. 在产品方案设计和版本演进中，综合平衡效果、成本、时延、稳定性和可解释性，推动产品在业务价值、用户体验与工程可行性之间实现最优解。\n风险控制与安全设计\n1. 识别 AI 产品中的幻觉、误答、越权、敏感内容、安全和合规风险，设计异常处理、权限控制、人机协同与人工兜底机制，提升产品在关键场景下的稳定性与可控性。\n2. 结合业务场景建立风险分级与安全边界，明确不同场景下的适用范围、限制条件和处理策略，保障 AI 产品在不同场景下稳定、可控、合规地使用。\n效果评测\n1. 负责 AI 产品效果评估体系建设，围绕产品目标和业务场景，建立覆盖模型效果、任务完成、用户体验和业务价值的评测框架。\n2. 协同评测、算法、研发和业务团队构建评测指标体系与业务指标体系，明确评测维度、评价标准、评分机制、样本构成和权重设计，确保指标具备指导性、可衡量性和可执行性。\n3. 设计和推动标准评测集、业务测试集和典型案例库建设，覆盖核心场景、高风险场景和边界场景，为版本评估、能力比较和优化决策提供依据。\n4. 推动建立 AI 产品的线上线下评估机制，结合离线评测、灰度验证、线上行为数据、人工反馈和业务结果，综合判断产品能力和版本效果。\n5. 基于评测结果识别关键问题与优化方向，区分模型问题、知识问题、工作流问题、交互问题和场景匹配问题，推动产品、算法和工程侧形成针对性的优化方案。\n6. 负责评测结果在产品规划和版本迭代中的应用，将评测结论转化为产品能力优化、场景边界调整、配置策略优化和版本优先级判断依据，形成持续优化闭环。\n项目管理\n1. 负责跨团队沟通与项目推进，协调算法、研发、测试、运营、业务等相关团队，推动需求评审、开发、测试、上线和复盘等环节高效协同。\n2. 建立项目节奏、风险预警和关键事项跟踪机制，确保产品版本按计划推进并实现预期目标。\n产品的经营支持\n1. 协同前线团队开展产品经营分析，结合市场表现、竞品动态和业务数据，输出产品经营洞察和改进建议，为业务拓展策略和 GTM 计划提供支持。\n2. 结合产品能力、优势场景和伙伴能力图谱，参与生态合作与增长模式设计，推动基于生态的规模化增长和可持续合作机制建设。\n产品上市\n1. 制定产品上架策略制定与发布节奏规划，推动按计划上线并与市场、内部形成一致、准确的表达。\n2. 主导产品GTM材料编写，协助pdsa、销售和市场团队完成价值传递和营销推广支持。\n3. 推动标杆客户案例建设，形成可复制的行业方案、最佳实践和销售支持材料。\n4. 产品商机挖掘，负责产品的目标市场分析，商机沉淀和情报沉淀，为重点场景突破和产品迭代提供支持。\n产品持续改进\n1. 持续跟踪客户对产品的使用情况，合理安排需求优先级，推动产品改进，新产品或功能孵化，提升产品易用性、稳定性、安全性、性能和成本效率。\n2. 负责 AI 产品反馈闭环建设，沉淀高频问题、失败样本和业务评测数据，协同算法与研发团队持续优化模型效果和产品体验。\n• 5年以上商业化产品解决方案经验，在至少一个行业有深度落地：金融、教育、电商、汽车、消费、制造、互联网等。\n• 熟悉LLM、Agent相关技术优先。\n• 能独立完成重点行业/重点场景的需求洞察与机会判断，从现象中抽象出可规模化的产品机会。\n• 能判断 AI 在业务链条中的应用位置，识别对成本结构、流程分工、付费逻辑的影响。\n• 能结合竞品、技术趋势、市场空间和客户反馈，形成产品定位、竞争策略和阶段性增长判断。\n• 能参与并推动商业模式、定价逻辑、GTM节奏、标杆场景选择等关键决策。\n• 能从产品视角为经营分析、生态合作和市场拓展提供有效输入，支撑产品规模化复制。\n• 能独立完成重点场景的解决方案设计，识别适合 AI 重构的关键环节，设计 AI 原生产品形态和人机协同机制。\n• 能将模型、RAG、知识库、Agent、工作流等能力转化为可用、可配置、可复制的产品能力模块。\n• 能在客户、业务、算法、研发、销售、交付等多角色之间建立有效沟通，完成语言翻译和目标对齐。\n• 能独立推进复杂项目，识别关键依赖、冲突点和风险点，推动多团队高效协同并按目标交付。\n• 能通过低 ego、强对齐的合作方式，建立跨团队信任，提升协作效率和落地质量。\n• 能在效果、成本、时延、风险、交付复杂度、商业价值之间做结构化取舍。\n• 能解释取舍逻辑，并根据场景变化动态调整方案。"},{"id":"蚂蚁集团-8a8bd1417ee2","source":"蚂蚁集团","title":"蚂蚁集团-企业助手B端产品经理-芝麻企业信用","keywords":["AI","Agent"],"location":"上海 / 杭州","publishedAt":"2026-06-24T08:56:45.000+00:00","url":"https://talent.antgroup.com/off-campus-position/26010908319892","jd":"芝麻企业信用正在构建面向生态合作伙伴的智能体服务，致力于通过AI驱动的智能体能力，赋能SaaS合作伙伴提升企业服务能力。目前平台已推出“标讯智能体”、“拓客智能体”等核心产品，覆盖招投标信息洞察、客户发现与商机推荐等关键场景。\n我们现诚邀一位具备SaaS产品经验、AI理解力强、用户洞察敏锐的产品负责人（PD）加入，负责企业助手生态服务战场的产品战略规划与落地，深度挖掘生态合作伙伴需求，推动AI智能体与SaaS产品的融合交付，打造行业领先的智能生态解决方案。\n核心职责\n1、用户需求挖掘：运用 FED 模式等方法论，深入洞察生态伙伴在 toB 服务场景下的痛点，持续挖掘并验证高价值产品需求；\n2、智能体产品规划： 负责各类场景智能体产品的功能迭代与体验优化，设计符合企业级用户需求的AI原生解决方案；\n3、生态方案融合： 深度对接合作伙伴SaaS产品体系，将智能体能力与第三方服务无缝集成，打造可规模化交付的联合解决方案；\n4、全链路交付： 协同技术、设计、运营团队，推动产品从需求定义、方案设计到上线推广的全流程落地，对生态合作伙伴的采用率和满意度负责。\n1、本科及以上学历，计算机、数据科学等相关专业背景优先，3年以上互联网产品经理工作经验，具备完整的产品生命周期管理经验；\n2、熟悉SaaS产品逻辑，有企业级服务产品经验者优先对AI技术有深入理解和实践热情，具备AI产品落地经验或强技术动手能力；\n3、优秀的用户洞察能力，能熟练运用FED等需求分析框架出色的跨团队沟通与项目管理能力，能推动复杂生态合作落地。\n\n加分项：\n1、加分项有智能体（Agent）、RPA、CRM或营销科技产品设计经验；\n2、参与过开放平台、生态合作项目并取得可量化成果；\n3、具备基础技术能力，能使用AI工具进行快速原型验证。"},{"id":"腾讯-946399dfa437","source":"腾讯","title":"证券-AI产品经理-金融AI应用体验方向","keywords":["AI","Agent"],"location":"深圳","publishedAt":"2026年06月24日","url":"https://careers.tencent.com/jobdesc.html?postId=2052527703940313088&language=zh-cn","jd":"1.AI原生体验规划与设计：负责规划并设计证券场景下AI原生功能，深入理解新股民与老股民的差异化需求，将复杂的市场信息、金融逻辑通过智能解读、对话式交互、个性化内容等方式，转化为直观、友好、可信赖的产品体验；\n\n2.前沿技术应用与产品化：紧密跟踪AI领域（如Agent架构、RAG、SFT/RLHF等）发展趋势。评估新技术在提升信息获取、策略验证、决策辅助等环节的潜力，并主导其产品化路径设计，将技术语言转化为用户可感知的价值；\n\n3.全流程产品闭环构建：主导AI产品从需求定义、方案设计、开发协同到上线运营的全过程；特别关注构 detail/SOCIAL/5a935bc7-9fd6-4aa9-bc37-799efd3d8079","jd":"-负责IaaS异构计算产品规划与建设，包括 GPU 云服务器、AI 训练/推理算力、弹性裸金属、加速卡资源池、高性能网络与存储协同等方向\n-协同研发、架构、资源、运维、售前、销售等团队，推动异构算力从资源引入、容量规划、产品化到上线运营的全流程落地\n-负责产品竞争力分析，跟踪主流公有云厂商、GPU/AI 芯片、虚拟化、容器、调度、RDMA 网络等技术与市场趋势，形成产品策略\n-支持重点客户项目，输出解决方案、产品文档、销售材料和交付规范，提升异构计算产品在行业客户中的规模化复制能力\n-本科及以上学历，计算机、通信、电子、软件工程等相关专业优先\n-2年以上云计算、基础设施、AI 算力、GPU 服务器、容器平台或高性能计算相关产品经验\n-熟悉公有云 IaaS 产品体系，对云服务器、裸金属、虚拟化、网络计费等基础能力有系统理解\n-了解异构计算相关技术与生态，包括 GPU、RDMA、AI 框架、模型训练与推理场景等\n-具备较强的产品抽象能力和项目推动能力，能够把复杂技术能力转化为清晰的产品规格、用户流程和商业方案。具备良好的数据分析、竞品分析、文档表达和跨团队协作能力。对 AI 基础设施、公有云算力产品和大模型产业趋势有持续关注和判断力"},{"id":"腾讯-a9356a87a08c","source":"腾讯","title":"AI原生产品经理","keywords":["AI","Agent"],"location":"深圳","publishedAt":"2026年06月18日","url":"https://careers.tencent.com/jobdesc.html?postId=2034117546277498880&language=zh-cn","jd":"1.产品规划与目标定义：深入理解销售、运营、客服等内部业务流程与痛点，规划AI Agent产品的核心场景、能力矩阵与演进路线，并设定可量化的效率提升与增收目标；\n\n2.智能体体验与流程设计：主导Agent的交互逻辑、决策流程与工具调用设计。将复杂的业务规则与AI能力，转化为简单、高效、可靠的产品功能与用户体验；\n\n3.系统整合与自动化闭环：设计并推动AI Agent与现有业务系统（如经营系统、知识库等）的深度集成方案，实现从“感知-决策-执行-反馈”的业务自动化闭环；\n\n4.数据驱动与效果评估：建立AI Agent产品的核心指标体系，监控使用效果、准确率与业务影响，通过数据分析驱动产品的持续迭代与优化；\n\n5.全链路项目推动：协同算法、工程、业务与设计团队，主导产品从需求、开发、测试到上线运营的全过程，确保产品高质量落地并产生实际业务价值。\n1.业务洞察力：具备To B或云计算产品经验，深刻理解销售赋能、运营提效、客户成功等至少一个领域的业务流程、关键瓶颈与成功要素；\n\n2.AI产品思维：具备强烈的AI原生产品思维，能够运用大模型与智能体技术重构传统业务流程。善于在不确定性中定义最小可行产品，并具备出色的数据驱动决策能力；\n\n3.技术理解力：了解大语言模型、智能体框架、RAG、工具调用等核心AI技术的基本原理、能力边界与最新进展，能与技术团队进行高效沟通；\n\n4.协调与落地能力：拥有出色的跨部门沟通与资源协调能力，具备强烈的项目owner意识，能有效管理优先级、化解冲突、推动复杂项目落地；\n\n5.强烈的自驱力与好奇心：对AI技术充满热情，能快速学习并应用新的AI工具与框架，积极探索AI赋能业务的新场景。"},{"id":"淘天集团-ebfb957ee6d3","source":"淘天集团","title":"1688-AI商家经营产品经理-杭州","keywords":["AI","Agent"],"location":"杭州","publishedAt":"2026-06-17 20:02:46","url":"https://talent.taotian.com/off-campus/position-detail?positionId=100019560002","jd":"打造面向百万级中小商家的 AI驱动型自助经营平台，覆盖 tp诚信通自助新续、数字小店、商家成长与获客等核心场景，最终实现商家成功与平台增长的双赢。\n\n1、深入理解TOB中小企业在开店、获客、转化、留存等阶段的核心痛点，设计并落地 AI Native 的商家增长产品，打造“轻开店 + AI找客 + 智能运营”一体化入口，规模化吸引并沉淀高价值优质供给 入驻1688\n2、主导诚信通自助产品的AI化重构，基于大模型构建 ttps://talent.quark.cn/off-campus/position-detail?positionId=100010900011","jd":"负责千问语音/视频助手\n职位需求\n1、语音助手优化：负责千问语音场景的需求定义和产品优化。\n2、视频助手优化：负责千问视频场景的需求定义和产品优化。\n3、生活服务语音助手：对接淘宝闪购、淘宝、高德等集团核心业务，从“能对话”到“会办事”，打造行业领先的语音 AI 生活服务链路。\n4、协调资源和推进落地：拆解业务线条，协调工程、算法、设计及各业务方资源，支撑业务目标的达成。\n1、有好奇心，对大模型技术和产品有好奇心，喜欢探索新业务，做探索型产品。\n2、推动能力好，面对跨部门协作的复杂环境，能够凭专业性和韧性拿结果，不仅能发现问题，更能搞定资源解决问题。\n3、本科以上学历，1-5 年互联网产品经验，负责过独立完整业务者、有大模型效果优化经验或应用大模型独立手搓项目者优先。\n4、无需大模型语音/视频生成业务背景。"},{"id":"百度-eb44c10f3d1b","source":"百度","title":"AI产品经理（J100867）","keywords":["AI"],"location":"深圳市,新加坡","publishedAt":"2026-06-16","url":"https://talent.baidu.com/jobs/detail/SOCIAL/389a3de8-ab85-4030-9ecb-efcfc9451a83","jd":"-负责海外 AI 产品的规划、功能设计，确保产品满足市场需求和业务目标\n-深入理解AI相关的技术原理，持续跟踪前沿动态，结合国际化AI能力，确保产品从概念到实现的高效落地\n-进行市场和行业调研，分析竞品，挖掘用户需求，制定产品策略及发展计划\n-持续追踪及分析产品关键指标，通过数据驱动产品迭代\n-本科及以上学历，2年以上产品工作经验，有海外产品工作经验优先\n-具备产品规划、需求分析和项目管理的能力，能够有效地协调多个团队合作\n-有AI或相关领域经验优先，对创新业务模式有敏锐洞察\n-具备良好的英语沟通能力，能够与跨国团队合作和与海外用户进行有效的沟通"},{"id":"快手-2b434228bf04","source":"快手","title":"AIGC产品经理-【商业化】","keywords":["AI"],"location":"Beijing","publishedAt":"2026-06-15 21:42:07","url":"https://zhaopin.kuaishou.cn/recruit/e/#/official/social/job-info/27761","jd":"1、负责广告素材AIGC产品全生命周期管理，包括但不限于脚本生成、文生图片、图生视频、文生视频等方向；\n2、设计和实施创新的AIGC解决方案，以支持数字人业务发展，包括数字人口型驱动、表情驱动、动作驱动，以及文生音频、文生图片、数字人互动等功能；\n3、与研发团队紧密合作，确保产品从概念到市场落地过程中的需求准确无误地实现，进行市场调研，收集用户反馈，分析竞争对手，以指导产品优化和迭代；\n4、探索和评估新兴的人工智能技术，以识别新的应用场景，并提高现有产品的性能和用户体验，关注行业趋势，确保我们的AIGC解决方案始终保持行业领先。\n1、计算机科学、人工智能或相关领域的专业背景优先，希望你深入理解NLP、深度学习等技术框架和算法原理；\n2、至少3年互联网经验，有3年以上产品或广告素材相关领域从业经验优先；\n3、具备出色的市场分析和产品规划能力，能根据市场需求制定有效的商业策略；\n4、优秀的团队协作和项目管理能力，能够在多部门间有效沟通并推动项目进度，优先考虑成功实施前沿技术产品或商业化AIGC产品的经验者。"},{"id":"淘天集团-a1ea88e48fa1","source":"淘天集团","title":"平台及用户产品事业部-AI to C产品经理-杭州","keywords":["AI"],"location":"杭州","publishedAt":"2026-06-15 18:58:16","url":"https://talent.taotian.com/off-campus/position-detail?positionId=100009460014","jd":"1、深入了解电商业务流程和用户需求，运用 AI 技术提供创新的电商解决方案，提升用户购物体验和效率，推动电商业务的智能化发展；\n2、对AI技术充满热情，持续跟踪和研究 AI 领域的新技术和趋势，将有价值的技术应用到电商业务中；\n3、负责AI助手产品的设计和快速迭代，联动团队成员负责完整的产品周期设计和实施，并与淘宝内其他产品密切合作，进行跨部门项目组织。\n1、本科及以上学历，重点考虑计算机、人工智能等相关专业；具有 2年以上互联网产品经验，其中至少 1 年 AI 领域实践经验；\n2、在专业领域，对AI 技术底层原理有深入了解，紧跟AI新技术的迭代；且至少实操过一个toC的AI产品的落地实施（工作/非工作场景皆可），对AI可做/不可做有清晰认知，对用户需求有敏锐的洞察力；\n3、具备良好的用户洞察能力，又有较好的提炼抽象能力，做好从用户到AI的转译；对新事物充满好奇心，具有强烈的责任心、优秀的沟通能力和团队合作精神"},{"id":"淘天集团-b31daee7fb1c","source":"淘天集团","title":"淘宝平台事业部-AI产品经理-平台物流","keywords":["AI","Agent"],"location":"杭州","publishedAt":"2026-06-15 15:48:01","url":"https://talent.taotian.com/off-campus/position-detail?positionId=100000980008","jd":"1. AI 原生流程重构：基于第一性原理，运用大模型能力重新定义物流业务流程，而非在原有流程上叠加 AI 功能模块。深入物流履约全链路（仓配 / 即时履约 / 异常处置 / 商家物流服务等），识别适合通过大模型能力解决的关键环节，重新设计人机协同工作形态，明确碳基员工与硅基 Agent 的职责边界；\n2. Agent 架构设计与工作流编排：负责复杂任务的拆解逻辑（Planning）、记忆机制（Memory）、工具调用（Tool Use）设计，构建 AI Agent 或多 Agent 协作工作流。能与算法工程师就 RAG 检索策略、多轮上下文管理、工具调用顺序等议题进行深度对齐，主导从 MVP 到规模化的方案演进；\n3. 评估体系（Evals）建设：建立物流业务专属的 Benchmark 评测集（Golden Dataset），定义模型输出的质量标准。运用盲测、A/B 实验、强模型评弱模型等方法，量化驱动 Prompt 迭代或微调（Fine-tuning）方向，确保产品迭代能够带来可度量的改进，避免引入回归性问题；\n4. 数据闭环与反馈回路设计：设计 Feedback Loop，捕捉用户交互中的显性信号（点赞 / 采纳 / 修改）和隐性信号（停留时长 / 路径偏移），将其转化为模型迭代的数据资产，构建可持续优化的产品体系；\n5. 商业化与算力平衡：负责模型推理成本（Token 成本）、首字延迟（TTFT）、整体响应时延（Latency）与业务 ROI 的精算与平衡，在生成效果、用户体验、运营成本之间为不同场景找到合适的方案配置，推动 AI 产品在物流场景的提效价值落地；\n6. 组织能力沉淀与方法论建设：参与物流部 AI 案例知识库建设，将成功实践沉淀为标准化 SOP、Prompt 模板与可复用的 AI 中间件，推动 AI 工具使用能力从个体能力向组织能力转化。\n1. 本科及以上学历，计算机、人工智能、数学、统计学、工业工程、物流管理等相关专业优先；\n2. 具备模型直觉：熟悉 LLM 基本原理（注意力机制、上下文窗口、幻觉成因等），能够基于业务需求判断合适的模型方案选型（小模型 vs 大模型 / RAG vs Fine-tuning / Prompt vs Workflow）；\n3. 具备 Prompt 架构能力：熟悉 Prompt Engineering，能够编写结构化、具备一定逻辑防御性的提示词，理解 RAG（检索增强生成）的应用场景与边界；\n4. 具备技术理解深度：不要求具备编码能力，但需要理解嵌入（Embedding）、向量数据库、Token 成本、TTFT、长短期记忆等概念，能够与算法工程师进行有效沟通；\n5. 基础数据能力：熟悉 SQL 或 Python，能够独立完成数据提取、分析与可视化，基于数据评估产品迭代效果。"},{"id":"快手-0151e868d4ac","source":"快手","title":"AI产品经理（多模态方向）-【商业化】","keywords":["AI"],"location":"Beijing","publishedAt":"2026-06-15 15:21:48","url":"https://zhaopin.kuaishou.cn/recruit/e/#/official/social/job-info/30245","jd":"1、互动策略规划与设计： 负责AI数字人直播场景下的互动策略产品规划。深入挖掘直播间用户诉求，设计弹幕互动、点赞反馈、促单逼单等互动策略，提升直播间用户停留时长、互动率及转化率；\n2、AI智能问答（FAQ）落地： 主导数字人直播的智能问答与对话交互能力建设。结合NLP、大模型等前沿AI技术，设计并优化FAQ匹配逻辑与多轮对话策略，打造拟真、流畅、高情商的数字人互动体验；\n3、平台能力建设与闭环：负责将复杂的互动策略抽象为标准化的中后台平台能力。从需求调研、方案设计到PRD撰写，推动产品从概念到最终落地，完成全链路的产品闭环；\n4、跨部门协同与拿结果：作为项目的核心Owner，紧密协同算法、工程（前后端）、运营及业务团队。以数据为导向，建立科学的评估指标体系，持续追踪策略效果并迭代，为最终的业务结果（如GMV、互动指标）负责。\n1、经验背景：本科及以上学历，3-5年以上互联网产品经验，有直播互动、策略产品、AI对话/大模型应用相关经验者优先；\n2、行业认知：对直播行业（电商/本地生活/娱乐等）有深刻理解，对“AI+直播”及数字人行业发展有敏锐的洞察力和极高的热情；\n3、技术理解力：熟悉常见的AI算法逻辑（如NLP、推荐策略、大模型Prompt等），能够与算法工程师无障碍沟通，理解技术边界并能将其转化为产品方案；\n4、核心能力：\n   - 极强的学习能力：面对快速迭代的AI技术，能迅速吸收新知识并应用到业务中；\n   - 优秀的Product Sense与Business Sense：能够敏锐捕捉用户痛点，同时具备商业化视角，做有业务价值的产品决策；\n5、软性素质： 具备强大的自驱力和抗压能力，沟通协调能力极佳，能在复杂的多线并行环境中推动项目拿结果。\n【加分项】\n- 操盘过千万级GMV直播间互动策略者、电商策略者优先；\n- 有大模型（LLM）实际落地应用经验者优先；\n- 懂一点代码或数据分析能力极强者（SQL/Python）优先。"},{"id":"淘天集团-206bc1b56ec5","source":"淘天集团","title":"1688-AI应用产品经理-产业智联","keywords":["AI","Agent"],"location":"杭州","publishedAt":"2026-06-15 15:00:44","url":"https://talent.taotian.com/off-campus/position-detail?positionId=100018180002","jd":"1. 负责创新型AI Agent产品的体验优化。从真实用户场景出发，进行任务拆解与逻辑编排，设计涵盖需求解构、智能交互、方案生成、报价核算等环节的产品功能体验，打造高可用、强闭环的AI产品。\n2. 负责AI应用的效果的迭代。负责构建标准化的效果评估体系，通过定义业务核心指标、构建高价值评测数据集（Benchmark），利用数据驱动的方法论，协同算法团队进行策略演进与模型能力边界的探索，确保产品在复杂业务场景下的稳定性与准确率。\n3. 紧密追踪大模型底层演进（如Agentic架构、多模态能力、长文本处理等），探索AI时代的全新产品交互形态。负责从技术可行性分析到产品落地的全过程管理，将前沿AI技术高效转化为解决用户实际痛点的产品价值，推动产品体验的差异化竞争。\n1. 3年以上互联网产品经验，具备完整AI落地项目经历（有Agent、AIGC或垂直大模型应用落地经验者优先）；深入理解LLM及主流AIGC技术原理，对大模型、扩散模型等技术路线的能力边界有清晰认知，能判断技术在具体业务场景中的适用性。\n2. 能够将业务流程抽象为AI可理解的决策路径。熟悉评估体系建设，具备通过“评估-反馈-优化”闭环推动AI效果进化的方法论。\n3. 具备细腻的用户视角，用户导向，能够挖掘用户本质需求。关注产品细节，善于将数据转化为产品策略，具备优秀的商业敏感度，能够平衡技术创新与商业化落地目标。\n4. 具备极强的跨部门协作能力（研发、算法、业务方），能够推动复杂项目在不确定性中快速落地。具备好奇心与创新思维，对AI充满热情。"},{"id":"腾讯-84c3042bec5a","source":"腾讯","title":"腾讯会议-产品经理-AI策略方向","keywords":["AI","Agent"],"location":"深圳","publishedAt":"2026年06月15日","url":"https://careers.tencent.com/jobdesc.html?postId=1942177600126451712&language=zh-cn","jd":"1.负责腾讯会议AI Agent能力的建设，支持会议AI场景，提升用户体 ent.com/jobdesc.html?postId=1949322738699182080&language=zh-cn","jd":"1.负责构建Coding Agent评估体系，建立多行业测试用例库，通过CI/CD报告及埋点数据持续监控效果；\n\n2.主导Prompt工程优化工作，开发垂直领域动态Prompt模板，迭代提示词策略，降低幻觉率并提升需求解析精度；\n\n3.进行工具链集成与效能提升，设计工具智能调度规则，提升工具执行成功率和效果；\n\n4.设计分层记忆管理机制，构建短期记忆与长期记忆，提升智能体应答效果，降低调用成本；\n\n5.优化多智能体协同流程，提升 Plan/Design/Coding Agent 的协作效率；\n\n6.备注：base地可选深圳/北京/上海。\n1.具备技术理解深度，熟悉 Agentic Workflow设计及多智能体协作架构，掌握Prompt工程、RAG优化、联邦学习等关键技术，熟悉主流LLM，如Claude/Gemini/混元特性及局限；\n\n2.拥有垂直领域经验，1年以上AI开发者工具产品经验，主导过智能体调优项目；\n\n3.具备数据驱动能力，熟练通过A/B测试验证优化效果，运用漏斗分析定位失效根因；\n\n4.具备复杂场景抽象力，能将金融风控、高并发支付等业务需求拆解为原子化任务，转化为Agent可执行的逻辑链，如“购物车结算分步流程”的语义化回退机制；\n\n5.具备跨职能协同素养，高效联动算法团队，如模型微调、开发者体验组，如交互设计、企业解决方案专家，如私有化部署，推动调优策略快速落地。"},{"id":"腾讯-b1d622d9e8fd","source":"腾讯","title":"智能体-商业化产品经理-CodeBuddy/WorkBuddy","keywords":["AI","Agent"],"location":"深圳","publishedAt":"2026年06月10日","url":"https://careers.tencent.com/jobdesc.html?postId=2059816924258414592&language=zh-cn","jd":"1.负责CodeBuddy/WorkBuddy等AI智能体商业化产品设计，主导计费规则、交易链路、支付等大交易类产品的完整落地流程；\n2.深入理解AI大模型海内外产品的商业化策略，结合市场动态制定差异化产品方案；\n3.针对智能体行业落地场景，通过用户路径分析优化订阅权益体系、用户分层模型及付费功能体验；\n4.设计并迭代转化漏斗关键节点，提升付费转化率与用户LTV；\n5.协同研发、运营、数据团队推动商业化方案落地，通过AB测试验证效果并持续优化；\n6.构建高可用、可扩展的商业化产品架构，建立数据监控体系驱动产品迭代。\n1.本科及以上学历，3年以上SaaS/会员/AI大模型领域商业化产品经验，有完整产品从0到1落地案例；\n\n2.熟悉大模型技术边界与应用场景，保持对Agent、代码生成等垂直领域的持续研究；\n\n3.具备强逻辑思维与系统设计能力，能抽象复杂业务场景为可执行的产品方案；\n\n4.数据分析的洞察力强，通过数据洞察驱动决策；\n\n5.优秀的跨团队沟通能力，能协调多方资源达成目标。"},{"id":"百度-9e41dbecb79b","source":"百度","title":"AI产品经理（J100616）","keywords":["AI"],"location":"深圳市,新加坡","publishedAt":"2026-06-10","url":"https://talent.baidu.com/jobs/detail/SOCIAL/ceb7d9ad-295e-4a9f-a53d-7cb856e720dc","jd":"-负责参与国际化各产品的AIGC产品能力落地，以及AI 语音输入法核心能力建设，市场调研，跟进产品开发迭代，协同设计、研发、运营等团队推动方案落地\n-深度了解并挖掘AI产品所重点深耕国家用户需求，构建市场差异化竞争优势，探索新的增长点，牵引产品体验升级，提升产品数据指标\n-紧密协调并推动投放、技术、市场等部门成员，完成产品设计、开发、运营全流程管理，为产品目标负责\n-根据市场反馈和产品运营数据，持续改善优化产品，提升产品数据指标\n-本科及以上学历，有日本或美国留学/生活经验优先\n-3年以上AI产品经验，有海外C 端产品经验，熟悉欧美 / 日本市场用户习惯者优先\n-熟悉 AI 语音输入相关技术，能够和算法团队高效对齐方案优先\n-对AI技术前沿有敏锐的洞察力，熟悉AIGC，人工智能大模型，喜欢挑战和尝试，逻辑思维严谨，对用户体验 为清晰的产品路径；\n\n4.有社交类产品或Agent相关项目从0到1落地经验优先。"},{"id":"字节跳动-c95fe1e48817","source":"字节跳动","title":"模型训练产品经理-AI数据与安全","keywords":["AI","Agent"],"location":"北京","publishedAt":"2026-06-05 11:44:19","url":"https://jobs.bytedance.com/experienced/position/7647752087343073589/detail","jd":"1、数据策略制定：基于模型训练方法与需求，制定并迭代含合成数据在内的整体数据构建策略，同步调研市场数据新趋势，为策略优化提供支撑；\n2、数据产线搭建：立足模型训练目标，设计数据生产链路及核心步骤，发起项目并主导全流程设计、优先级判定及项目管理，保障高效产出高质量数据；\n3、质量与效果评估：建立可量化数据质量验收标准，优化验收流程；开展模型效果评估与深度分析，联动技术团队定位模型改进点；\n4、模式创新：用好大模型赋能生产，搭建自动化的数据生产系统，以实现提效与规模化。\n1、3年及以上AI产品相关工作经验，具备LLM/VLM训练数据生产、评估经验；\n2、对AI行业有好奇心，能主动追踪前沿技术动态、大模型产品动态；\n3、具备系统思维和抽象能力，能结合复杂的规则设计数据生产、评估和处理链路；\n4、英语听说读写熟练，可与国际化供应商、国际化团队沟通；\n5、强跨团队协作与项目推进力，重数据质量，兼具责任心与大局观。\n\n加分项\n1、计算机专业+Coding能力，有编程经验优先；\n2、擅长使用Claude Code/Codex/OpenClaw等平台工具，具备丰富的Workflow、Agent搭建经验；\n3、有多模态数据策略经验、合成数据经验、Coding Agent产品经验。"},{"id":"阿里云-64beb2fd87a4","source":"阿里云","title":"ATH事业群-AI 产品经理/专家-AI视频生成-杭州","keywords":["AI","Agent"],"location":"杭州","publishedAt":"2026-06-04 21:11:31","url":"https://careers.aliyun.com/off-campus/position-detail?positionId=100012503001","jd":"岗位描述\n● 产品规划与设计，负责AI视频生产平台的核心功能及创作模式规划、产品架构设计与迭代。结合业务发展目标，制定所负责板块的产品路线图。\n● 深挖产品行业化：深入洞察短剧制作、数字营销等垂直领域的业务逻辑与商业化诉求，梳理并优化生产链路各环节的内容生产工作流。\n● AI能力落地，实时跟进生成式大模型技术（如文生视频、图生视频、视频风格化等），寻找技术与商业场景的最佳结合点，结合模型发展趋势向易用、高效的用户侧产品转化。\n● 数据驱动与商业化，关注企业/创作者使用体验及平台整体商业转化效率。通过数据分析（如内容产出效率、ROI等）验证产品价值，持续驱动产品优化与商业模式跑通。\n● 跨部门协同，紧密联动算法、开发、运营及商业化团队，确保产品快速迭代、高质量交付与市场推广。\n职位要求\n● 本科及以上学历，5年以上产品经理经验，有独立主导SaaS平台/工具产品/海外产品从0到1或从1到10经验者优先\n● 行业Know-how ，有以下经验者优先：1）短剧/营销经验： 熟悉短剧行业的投流逻辑、ROI评估及制作全链路；或拥有丰富的数字营销、广告创意产出平台的产品经验，了解内容创作者的痛点。2）AI创作平台经验： 曾参与过AI图像/视频生成、智能剪辑、云端视频处理、Agent应用等相关工具或平台产品的设计。\n● 强烈的好奇心与创新意识，是主流生成式AI工具的重度用户，了解底层模型能力边界及行业发展趋势。\n● 具备优秀的逻辑思维能力和业务抽象能力，能够将复杂的非标业务场景标准化、系统化。\n● 目标导向，具备极强的自驱力和抗压能力，拥有出色的跨团队沟通与协作能力，能够推动多角色高效运转。"},{"id":"腾讯-8fc642da49c4","source":"腾讯","title":"混元大模型数据策略产品经理-AI Agent / Coding方向（深圳/北京）","keywords":["AI","Agent"],"location":"北京","publishedAt":"2026年06月04日","url":"https://careers.tencent.com/jobdesc.html?postId=2059832165742592000&language=zh-cn","jd":"1.Agent与代码数据策略：负责大模型 Coding 与 AI Agent 方向的数据需求设计与配比策略，针对代码生成、代码补全、复杂任务规划、工具调用等核心能力，制定数据分布、采样及难度分级策略；\n\n2.优化数据生产链路：设计并推进高效、高质量的数据生产方案，制定针对复杂模型任务的数据标准，打通数据流转与模型迭代的闭环链路；\n\n3.评测体系与场景验证：基于复杂交互场景构建科学的动态评测集，参与搭建前沿模型训练所需的底层验证与交互环境，持续驱动模型能力上限的突破。\n1.教育与背景：本科及以上学历（计算机、数学等理工科专业优先），具备 AI Agent、代码生成大模型或高难度逻辑推理数据/评测集构建相关经验；\n\n2.工程编程能力：具备扎实的工程开发能力，熟练掌握 Python 等主流编程语言，能独立编写代码完成数据清洗、流水线搭建及自动化脚本开发，深入理解软件工程体系与规范；\n\n3.底层认知与综合素养：具备良好的产品思维和极客精神，对 SFT/RLHF 等模型训练机制有深入认知，英语可作为工作语言。"},{"id":"腾讯-1bb9e750dc22","source":"腾讯","title":"智能体-商业化产品经理-CodeBuddy/WorkBuddy","keywords":["AI","Agent"],"location":"上海","publishedAt":"2026年06月04日","url":"https://careers.tencent.com/jobdesc.html?postId=2059816926359764992&language=zh-cn","jd":"1.负责CodeBuddy/WorkBuddy等AI智能体商业化产品设计，主导计费规则、交易链路、支付等大交易类产品的完整落地流程；\n2.深入理解AI大模型海内外产品的商业化策略，结合市场动态制定差异化产品方案；\n3.针对智能体行业落地场景，通过用户路径分析优化订阅权益体系、用户分层模型及付费功能体验；\n4.设计并迭代转化漏斗关键节点，提升付费转化率与用户LTV；\n5.协同研发、运营、数据团队推动商业化方案落地，通过AB测试验证效果并持续优化；\n6.构建高可用、可扩展的商业化产品架构，建立数据监控体系驱动产品迭代。\n1.本科及以上学历，3年以上SaaS/会员/AI大模型领域商业化产品经验，有完整产品从0到1落地案例；\n2.熟悉大模型技术边界与应用场景，保持对Agent、代码生成等垂直领域的持续研究；\n3.具备强逻辑思维与系统设计能力，能抽象复杂业务场景为可执行的产品方案；\n4.数据分析的洞察力强，通过数据洞察驱动决策；\n5.优秀的跨团队沟通能力，能协调多方资源达成目标。"},{"id":"腾讯-2375a7d6b311","source":"腾讯","title":"微信基础-大模型评测产品经理","keywords":["AI","Agent"],"location":"广州","publishedAt":"2026年06月04日","url":"https://careers.tencent.com/jobdesc.html?postId=2059948192291799040&language=zh-cn","jd":"1.评测体系设计：主导 AI 产品的评测体系搭建，定义评测维度、指标、标准和流程，确保评测的科学性和全面性；\n2.评测方法论制定：设计适配不同场景（对话、工具调用、多轮交互、创意生成等）的评测方案，包括自动评测、人工评测、众包评测、竞品对比等；\n3.评测平台产品设计：规划评测平台的产品架构和功能模块，输出 PRD，驱动研发团队落地；\n4.评测洞察与决策支持：深度分析评测数据，发现产品体验问题和模型能力短板，输出有洞察力的评测报告，推动产品和算法团队优化；\n5.竞品评测与行业跟踪：持续跟踪业界竞品的能力变化，建立常态化竞品评测机制；\n6.标注体系管理：设计标注规范和质量控制流程，确保评测数据质量。\n1.本科及以上学历，计算机、统计学、心理学、语言学或相关专业优先，3 年以上产品经理经验；\n2.具备 AI/NLP/对话系统相关评测工作经验，有评测体系从 0 到 1 搭建经验者优先；\n3.熟悉 AI 产品评测的科学方法，包括评测指标设计、统计显著性检验、评分者一致性（Kappa/ICC）、A/B 实验设计等；\n4.具备评测平台或数据平台的产品设计经验，能独立输出完整的产品方案；\n5.对 LLM / AI Agent 产品有深刻理解，熟悉主流 AI 产品的能力边界和用 术保持敏感，并能从实际业务价值出发推动落地。"},{"id":"淘天集团-1b19305a273c","source":"淘天集团","title":"营销平台及市场部-营销平台产品经理（AI方向）-杭州","keywords":["AI","Agent"],"location":"杭州","publishedAt":"2026-05-28 12:47:09","url":"https://talent.taotian.com/off-campus/position-detail?positionId=100017580001","jd":"1、负责平台大促或重点营销活动的供给组织能力建设，含平台的增长策略承接/运营提效、商家活动运营牵引与权益组织；\n2、独立负责AI能力在营销组织场景下的产品设计与落地，探索可落地的AI化营销创新场景（如活动策略建议、问题诊断、平台联动等），带来关键链路的效率与优质供给跃迁；\n3、探索AI时代营销能力交付的新形态，包括但不限于Agents/Skill/MCP服务，推动现有营销能力和流程的AI化升级；\n4、与营销业务及上下游团队深度协同，快速推进重点项目落地，在复杂协作中实现业务突破。\n1、本科及以上学历，2年以上电商营销中后台产品经验，对平台营销产品体系有一定理解，具备场景抽象和通用能力沉淀意识；\n2、具备基础的AI认知，熟悉大模型原理和基本落地方法，有至少1个AI产品或AI应用项目的深度落地经验；能判断AI在业务场景中的适用边界，避免\"为AI而AI\"；\n3、了解主流AI Agent架构及在策略/营销场景的应用，能独立完成Agent搭建或与技术团队协同定义模型优化与评估指标；\n4、好奇心强、自驱力强，持续关注前沿AI进展并有深度的自驱实践经历，已将AI工具嵌入核心工作流，能推动团队层面的AI实践落地；\n5、具备数据分析与用户洞察能力，目标导向，抗压性强，能在快节奏环境中保持深度思考与业务创新。"},{"id":"淘天集团-f46d28ba5671","source":"淘天集团","title":"天猫事业部-商家平台AI内容产品经理-杭州","keywords":["AI"],"location":"杭州","publishedAt":"2026-05-27 19:50:46","url":"https://talent.taotian.com/off-campus/position-detail?positionId=100017500001","jd":"1、负责AI Native内容生产体系建设：围绕淘内用户消费意图搭建AI Native内容生产链路，包括用户意图识别、内容选题、图文/视频内容生产\n2、负责建立AI内容生成质量评估标准，结合评测/标注、前台分发反馈数据与AI算法团队协同提升内容供给质量\n3、负责关注场域下 AI内容用户侧表达和互动产品设计，协同相关技术团队和用研团队推进持续提升用户内容消费体验\n1、内容背景： 1年以上内容产品或内容运营经验，有电商平台、社交媒体或资讯类产品经验者优先\n2、内容审美： 具备优秀的内容taste，能够准确判断内容质量，对图文/视频内容有敏锐的洞察力和鉴赏力\n3、AI Builder： 熟悉AIGC内容生产工作流，熟悉模型效果评测和后训练优化基础流程，有搭建AI内容体系的实战项目经验\n4、加分项：做过推荐信息流产品，或者有做过生成式推荐（AIGR）项目"},{"id":"阿里云-cbd96b7c29b4","source":"阿里云","title":"ATH事业群-AI Agent产品经理-杭州/北京","keywords":["AI","Agent"],"location":"北京 / 杭州","publishedAt":"2026-05-27 15:57:57","url":"https://careers.aliyun.com/off-campus/position-detail?positionId=100014423005","jd":"1. 产品规划\n● 洞察AI Native智能客服与AI语音交互领域热门趋势，包括但不限于大语言模型、语音识别与合成、多模态交互、智能路由等基础设施及典型应用场景，指导产品创新方向\n● 熟练使用AI工具进行客户需求挖掘、市场动态分析，输出AI Native智能客服领域市场机会和技术发展趋势、市场容量与竞争格局，定义细分市场\n● 通过竞对分析，识别产品在功能架构、技术能力、价格策略等方面的优劣势，制定差异化竞争策略\n● 通过调研深入洞察金融、零售、政企、互联网等行业客户在AI Native客服场景中的核心诉求与痛点\n2. 产品设计\n● 深入理解LLM、ASR/TTS、知识图谱、RAG等AI技术基本原理，具备AI Native Application设计能力，能够将其应用于智能对话、语音交互、智能质检等场景\n● 理解并抽象客户需求，分析客户业务场景，负责产品定义、功能规划和用户体验设计，输出高质量PRD\n● 协调研发、算法、测试团队完成产品开发与测试，推动产品功能按期上线\n● 基于对产品价值和成本的理解，参与价格策略制定和产品定价建议\n3. 产品经营支持\n● 制定AI Native智能客服业务拓展策略，设定关键GTM指标，与PdSA团队、运营团队共同制定拓展计划，跟踪产品市场表现和竞品动态，通过数据化经营分析提出产品经营改进建议\n● 制定生态发展规划，结合产品力、优势场景及合作伙伴能力图谱，设计基于生态的规模化增长策略，促进生态各参与者健康发展\n● 建立产品经营数据看板，持续监控核心指标（接通率、解决率、转化率、质检覆盖率等），驱动产品迭代优化\n4. 产品上市\n● 制定产品上架策略，实现产品从开发到商用的完整上架流程\n● 主导产品GTM材料编写，协助PdSA完成内部赋能培训，深度参与产品营销推广活动\n● 负责标杆客户建设，推动新产品、新能力在重点行业的落地，沉淀为可复制的行业解决方案\n● 负责产品目标市场分析与商机盘点，输出市场情报，支撑销售团队打单\n1. 学历背景\n● 统招本科及以上学历\n● 具备良好的职业素养与抗压能力\n2. 经验要求\n● 5 年以上互联网AI应用/Agent商业化产品经验\n● 拥有独立操盘从 0-1 自研产品并成功实现规模化商业变现的完整案例\n3. 技术能力\n● 熟练使用业界领先的AIGC工具，熟悉LLM基本原理、Agent工作原理，具备Agentic系统设计经验\n● 了解ASR（自动语音识别）、TTS（语音合成）、知识图谱、RAG等核心技术原理\n4. 综合素质\n● 出色的逻辑思维和结构化表达能力，能够将复杂业务场景抽象为清晰的产品方案，优秀的跨团队协作与推动能力，能够有效协调研发、算法、销售、售前等多方资源\n● 结果导向，具备独立解决复杂问题和承担最终责任的能力"},{"id":"淘天集团-15ef718945c3","source":"淘天集团","title":"淘宝平台事业部-AI产品经理-阿里资产","keywords":["AI","Agent"],"location":"杭州","publishedAt":"2026-05-26 17:59:52","url":"https://talent.taotian.com/off-campus/position-detail?positionId=100013680001","jd":"1. 场景洞察与价值定义\n● 深入业务一线（如区域运营团队、策略中心），识别高价值、可标准化的 AI 落地场景（如资产信息智能化处理、营销自动化）；\n● 定义清晰的业务成功指标（如净收入提升、效率倍增、错误率降低），并与业务方达成共识；\n2. AI Agent 系统设计与流程再造\n● 主导 AI Native 业务流程设计，拆解复杂任务为可被 Agent 执行的子任务，定义人机协同边界；\n● 与技术团队共同设计 Agent 的工作流、提示词策略、工具调用逻辑及异常处理机制；\n● 构建数据飞轮：设计用户反馈闭环，确保业务使用产生的数据能反哺模型优化；\n3. 端到端交付与项目管理\n● 在业务专项制下，担任或协同专项 PM，驱动产品、技术、运营接口人高效协作；\n● 建立敏捷迭代机制，通过 A/B 测试、灰度发布等方式快速验证效果，基于数据果断调整方向；\n4. 技术理解与能力共建\n● 保持对前沿 AI 技术（LLM、RAG、Agent 框架、多模态）的敏感度，评估其在资产业务中的适用性；\n● 参与技术选型讨论，从产品视角提供关于用户体验、可扩展性、维护成本的输入；\n● 沉淀 AI 产品方法论，通过案例分享、内部培训等方式，提升团队整体的 AI 认知和产品能力；\n5. 跨部门协同与沟通\n● 在矩阵式组织中，有效协调区域运营团队（执行侧）与策略中心/行业专家组（能力侧）的资源与期望；\n● 以清晰的书面和口头沟通，向不同背景的利益相关者（业务、技术、管理层）传达产品愿景、进展和权衡。\n1. 本科及以上学历，计算机科学、信息管理、数学、统计等相关专业，有技术背景（曾从事开发、数据分析）转做产品的候选人优先；\n2. 一年以上AI、数据平台、B 端复杂系统或金融科技领域经验，有成功的 AI 产品从 0 到 1 落地并产生显著业务价值的案例（需提供具体数据和场景描述），能在模糊环境中独立发现问题、定义问题并推动解；\n3. 深刻理解 LLM 的能力边界、幻觉问题、成本结构；熟悉 Agent 设计范式、RAG 架构、提示工程基本原理，能熟练运用 SQL 或数据分析工具进行自助式数据探索；能定义清晰的数据指标体系和实验方案；\n4. 能与工程师流畅讨论技术可行性、架构取舍、性能瓶颈，理解 API、微服务、云基础设施的基本概念；\n5. 擅长梳理复杂业务流，识别痛点和不合理环节，并能设计出兼顾效率与风控的新流程；\n6. 适应快节奏、高不确定性的创业氛围，能在资源受限情况下找到突破口，对新技术保持好奇，能快速学习并应用到实际工作中，愿意接受失败，从中快速复盘成长。\n\n【加分项】\n1. 有不良资产管理、金融科技、供应链金融等行业背景：\n2. 有搭建过 AI 中台、数据中台或大型 B 端 SaaS 平台的经验；\n3. 熟悉 Azure、AWS 等云平台及其 AI 服务；\n4. 有开源社区贡献或个人 AI 项目作品；\n5. 具备基本的 Python 或 SQL 编程能力，能独立完成简单数据验证或原型开发。"},{"id":"淘天集团-e03193e7970c","source":"淘天集团","title":"业务技术-产品经理-交易平台产品（AI）","keywords":["AI","Agent"],"location":"杭州","publishedAt":"2026-05-26 17:43:50","url":"https://talent.taotian.com/off-campus/position-detail?positionId=100009920051","jd":"负责覆盖购物车、下单、支付、逆向全链路的交易平台能力建设与交易业务诉求承接。基于海量交易数据，结合大模型（LLM）、知识图谱等技术，探索订单可解释性，推动交易体验提升与电商导购效率提升。\n1.交易平台能力建设与业务承接\n● 负责集团交易平台核心能力设计与迭代，涵盖导购、下单、支付、履约等关键链路，保障交易流程稳定性、资金安全与高可用。\n● 承接并落地集团内各业务交易诉求与重点项目，确保方案设计合理、交付准确，支撑多业务形态的电商交易业务。\n2.交易数据与AI结合探索\n● 基于海量交易数据资产，构建订单知识图谱、交易领域本体模型等基础数据能力。结合大模型（LLM）及AI Agent技术，提升交易数据可解释性、并与智能导购、运营提效，用户体验提升等创新场景结合做AI数据服务应用。\n3. 趋势洞察与规划\n● 持续关注内外部业务变化与技术趋势（如电商业务模式升级， AI Native、数据可观测性，KG- RAG等），推进交易平台能力与AI服务能力的持续迭代，为集团业务提供稳定、高效、智能化的交易支撑。\n1、教育背景及经验：本科及以上学历，计算机背景及理工科背景优先。1年以上电商业务经验，有AI项目经验；\n2、专业技能：对电商交易流程、资金链路有深刻理解，有技术背景者优先；了解AI产品及流行的AI技术能力；\n3、能力要求：擅长逻辑分析与产品架构设计，具备高度自驱力与责任感；善于跨团队协作，能高效推动复杂项目落地；具备良好动手能力，能自行进行AI应用实践；\n4、加分项：有知识图谱数据建模（Ontology）、数据检索（RAG）、数据评测，自然语言处理、特征工程经验加分。"},{"id":"淘天集团-4abbba561d4f","source":"淘天集团","title":"智能算法产品事业部-AI 搜索评测 · 产品经理-杭州","keywords":["AI"],"location":"杭州","publishedAt":"2026-05-26 14:40:12","url":"https://talent.taotian.com/off-campus/position-detail?positionId=100017080003","jd":"岗位介绍：\nAI 正在重塑搜索的底层逻辑——从意图理解到 AIO 聚合生成，从图文检索到多模态体验。但所有这些变化能不能真正发生、能不能持续迭代，取决于一件事：我们是否有能力把\"搜得好不好\"变成可量化、可追踪、可驱动决策的评估体系。评测不是搜索的附属环节，而是这一切迭代的地基。这个岗位的核心，是搭建并运营这块地基。\n\n岗位职责：\n1、设计 AI 搜索的评测产品体系，覆盖搜索大盘评估、策略迭代评估、RL 训练数据支持三类场景，建设自动化评估能力，让评估本身可规模化。\n2、与模型和算法团队深度协作，把\"搜索质量\"这种模糊的体感问题，拆解为可量化的指标体系与可执行的标注方案。\n3、探索多模态场景下的评测方法，针对不同模态的特性设计差异化的评估框架。\n4、推动评测结论真正落地——影响策略方向、影响产品决策、影响下一轮模型迭代。\n岗位要求：\n1、5 年以内工作经验，有过完整的评测体系设计或搜索/推荐产品经验，理解搜索作为产品的核心逻辑与北极星。\n2、理解 LLM 的能力边界与失败模式，对 AI 评测的三个关键命题——标注质量保障、自动化评估（含 LLM-as-a-Judge）、人机协同流程——有自己的判断和实践认知。\n3、结构化思维强，能把含糊的质量诉求拆成可执行的指标树；具备跨团队协作的推动力，能让算法、标注、产品三方在同一套语言下对齐。\n\n加分项\n1、有过AI精标语料撰写和标注经验\n2、有过 RLHF / RLAIF 数据流程或评估闭环的设计经验。\n3、对多模态模型评估有过实际探索，有数据分析能力，能独立完成评估结果的统计显著性判断与归因分析。"},{"id":"阿里云-90fb5b725d66","source":"阿里云","title":"ATH事业群-金融AI产品经理-杭州","keywords":["AI","Agent"],"location":"杭州","publishedAt":"2026-05-26 14:38:43","url":"https://careers.aliyun.com/off-campus/position-detail?positionId=100013763007","jd":"1. 基于模型与 MaaS 平台能力，设计金融行业智能 Agent、企业知识库、任务自动化 Workflow、多Agent协同等产品方案，推动模型能力在金融场景中的落地应用。\n2. 理解金融机构核心业务流程，围绕智能投研、智能风控、智能营销、金融知识库、投顾助手等场景，设计 AI 产品方案并推动商业化落地。\n3. 能够抽象行业共性需求，沉淀标准化组件与行业解决方案，推动金融AI产品从0-1建设及规模化复制。\n4. 联动算法、工程、解决方案、销售及生态伙伴团队，推动产品能力建设与客户交付上线，持续跟踪业务效果与客户反馈，驱动产品迭代。\n5. 关注行业前沿技术与产品趋势，跟踪国内外Agent、AI  Workflow等行业趋势，形成产品演进路线判断。\n1. 本科及以上学历，计算机、金融、金融工程、数学、统计等相关专业优先，3年以上产品经理经验。\n2. 对大模型技术有较深理解，熟悉 RAG、Agent、Fine-tuning、Workflow 等概念及其能力边界，能与算法、工程团队高效协作。\n3. 具备B端或平台型产品设计经验，能独立完成需求分析、PRD及项目推进，有复杂项目协同经验。\n4. 对 AI 行业有强烈兴趣，对金融AI方向有长期判断与热情。\n5. 有AI Infra、大模型平台、企业知识库、Low-Code/No-Code、AI Workflow产品经验者优先。有金融科技项目经验者优先，非必须。"},{"id":"淘天集团-05c38007e0bc","source":"淘天集团","title":"智能算法产品事业部-AI标注/评测产品经理-杭州","keywords":["AI","Agent"],"location":"杭州","publishedAt":"2026-05-25 09:52:20","url":"https://talent.taotian.com/off-campus/position-detail?positionId=100012060008","jd":"1、负责 AI 标注、审核、评测平台的产品规划与能力建设，面向不同业务形态、任务类型和角色，设计通用化的业务接入、作业管理、人员&数据管理能力，提升平台复用性和业务接入效率。\n2、基于大模型、Agent、Workflow 等 AI 能力，重构标注、审核、评测生产流程，设计 AI 预标注、智能审核、自动质检、人机协同、结果回流等能力，推动平台从人工密集型作业升级为智能化生产体系，提升生产效率与交付质量。\n3、深入理解审核、标注、评测等业务场景和生产链路，结合业务诉求、运营数据和作业效率，持续优化任务流转、质量控制、人员协同和数据闭环机制。\n4、善用 AI Coding、低代码/无代码、Workflow 编排等工具进行原型验证、流程搭建和效率工具开发，快速验证产品方案，提升产品交付和业务落地效率。\n1、熟悉主流 AI 工具和大模型应用方式，有 Workflow / Agent 搭建经验，能够结合业务场景设计 AI 化解决方案。\n2、具备出色的需求分析和业务抽象能力，能够识别用户行为模式，定位需求背后的本质问题，并沉淀为通用化产品能力。\n3、责任心强，执行力佳，具备较强的项目推进能力；沟通协作能力佳，具有良正向心态和抗压能力。"},{"id":"淘天集团-31197813fb9b","source":"淘 etail/SOCIAL/e8e1904a-f6a7-4053-b630-c91f7e1d5269","jd":"-用户研究：扎进用户真实使用场景，识别\"AI 应用蓝海\"机会，用一手用户研究为团队决策提供依据，验证 PMF\n-方案洞察：围绕文库和网盘，把前沿模型能力（多模、Agent、skill等）翻译成普通用户会用的功能，对用户体验结果负责\n-Vibe Coding ：用 Cursor / Claude Code 自己搭原型、跑实验，把想法快速变成可演示的Demo\n-端到端落地：从用户调研、 原型、PRD、用户体验评测、灰度发布到归因分析，每一步自己走完\n-数据分析：建立北极星指标、漏斗与渠道分析体系，识别结构性增量并量化每一次产品决策\n-团队共创：与算法、工程、设计、增长紧密协作，做团队的“催化剂”而非“传话筒”\n-产品热爱：把做产品本身当作热爱的事，坚信AI，对“必须做出来”有不可抑制的冲动，能在不确定中前行，有创业精神优先\n-全栈视野：2年以上独立AI产品经验，对 AI 有持续输入思考，有全栈产品视野，擅长端到端落地，能讲清楚 Claude / GPT / Gemini / 国内主流模型各自的适用场景，简历里能看到自己亲手做成的事\n- Vibe Coding：熟练使用 Cursor / Claude Code /  Lovable 等工具，写得出可运行的原型，不依赖工程也能验证一个想法\n-用户体验：对用户体验交互细节敏锐，能从一个微小卡点反推出整条流程的设计问题\n-极大加分项：有开发或脚本能力，能自己跑 prompt 实验、搭原型，熟悉 MCP、Agent、Skills、RAG、Function Calling 等 AI 工程架构，极大加分\n-不必满足上面每一条，如果你相信“AI + 应用”的价值，并觉得自己能创造独特贡献，也辛苦请您把简历发给我们"},{"id":"淘天集团-afdfad7c88be","source":"淘天集团","title":"智能算法产品事业部-AI产品经理-杭州","keywords":["AI"],"location":"杭州","publishedAt":"2026-05-20 09:55:09","url":"https://talent.taotian.com/off-campus/position-detail?positionId=100010080005","jd":"1、围绕淘宝推荐业务让用户逛起来的目标，通过AI生成的能力，创造优质素材、搭配关系、导购理由等，提高用户种草转化率，帮助核心商家和优质商品在推荐场域或许更优质的流量。\n2、重点围绕服饰大行业，包括猜你喜欢和穿搭独立频道在内的场域内，通过AI能力做好服饰的导购。\n3、负责AI生成全链路，与算法团队和运营团队紧密合作，负责包括模型选择和调校、高效工作流搭建、产出质量判定等环节的产品工作，为优质和规模化的素材产出、提升商品售卖效果直接负责。\n1. 本科及以上学历，计算机、信息管理、统计学等相关专业优先。\n2. 喜欢专研前沿技术，对AI与AIGC算法有深度了解与丰富经验； 有AI助手、Bot、AI插件、GPTs训练等AI产品经验优先。\n3.喜欢逛电商，对图片视频有不错的审美能力，生活上服饰穿搭有较高审美者。\n4.从事过电商或者服饰行业的图片&视频生成工作优先。"},{"id":"百度-9be0237e2e52","source":"百度","title":"伐谋-OPC创新产品经理（J97230）","keywords":["AI","Agent"],"location":"北京市","publishedAt":"2026-05-20","url":"https://talent.baidu.com/jobs/detail/SOCIAL/5bde3fde-54d6-4901-9929-3a736edc1299","jd":"-负责产品前沿探索项目，完成基于特定领域的产品专项，跑通「vibe coding + 产品验证 -> 合并进入主线产品」全流程\n-面向快销、零售、制造、地图等行业领域，基于伐谋自我演化Agent探索高价值业务场景\n-通过 vibe coding + 快速实验 的方式，高效完成 Demo / MVP构建，验证技术方案的业务可行性与价值空间\n-带领专项研发团队，完成包括产品设计、评估体系、工程实现的路径，并推动进入产品主线\n-对vibe coding有积极实践，完成过扎实的OPC项目实践，有明确的用户指标或商业化收入\n-拥有AGI理想，积极拥抱使用最新的AI能力解决高难高价值长程任务，能够从复杂业务中提炼核心问题\n-具备较强的自驱力与探索精神，具备处理高度不确定性创新问题的能力\n-有非共识的观点，有创新创业、风险投资、商业咨询等经验者优先"},{"id":"千问事业部-aab220a9e3f3","source":"千问事业部","title":"千问事业部-AI产品经理-杭州","keywords":["AI","Agent"],"location":"杭州","publishedAt":"2026-05-19 10:35:13","url":"https://talent.quark.cn/off-campus/position-detail?positionId=7000025002","jd":"1、​负责AI驱动的用户产品的规划与设计，重点关注用户在家庭、生活场景中的需求，设计智能化、场景化的AI产品解决方案；\n2、​通过用户调研、行为数据分析等方式，深入理解用户在AI产品使用中的痛点和需求，并将其转化为产品功能与体验优化点；\n​3、与AI算法、工程团队紧密合作，推动AI技术在用户产品中的落地，包括但不限于自然语言处理、语音交互、图像识别等领域；\n4、​关注AI产品的交互体验与用户反馈，持续优化产品设计，提升用户满意度和产品易用性；\n​5、跟踪AI用户产品领域的行业动态，分析竞品及市场趋势，为产品策略提供数据支持与创新方向。\n1、本科及以上学历，计算机科学、人工智能、用户体验设计等相关专业优先；\n2、熟悉大模型在用户产品中的应用，了解Agent产品的开发流程与技术框架，具备3年以上相关工作经验；\n3、具备强烈的用户思维，能够从用户角度出发，设计符合用户需求的AI产品，对用户体验有深刻理解；\n4、具备完整的产品规划与设计能力，能够独立完成从需求分析到产品落地的全流程工作，熟悉敏捷开发流程；\n​5、对AI技术（如自然语言处理、语音交互、大模型应用等）有基本的了解，能够与技术团队高效沟通，推动技术落地；\n6、具备优秀的沟通与协作能力，能够高效推动跨部门合作，确保项目顺利推进；\n​7、对AI用户产品领域有敏锐的洞察力，具备创新意识，能够提出具有前瞻性的产品解决方案。\n加分项：\n1、熟悉智能语音助手、智能家居或其他AI相关产品；\n2、具备数据分析能力，能够通过数据驱动产品优化。"},{"id":"阿里云-82bd7ccecba9","source":"阿里云","title":"阿里云智能-AI解决方案产品经理（Agent /AIGC/CV/多模态模型/LLM方向）-杭州","keywords":["AI","Agent"],"location":"杭州","publishedAt":"2026-05-18 11:03:43","url":"https://careers.aliyun.com/off-campus/position-detail?positionId=100012883001","jd":"产品规划\n1. 负责 AI 产品的中长期规划与版本路线设计，持续跟踪大模型、Agent、多模态等技术演进趋势，评估其对产品方向、功能边界、商业模式及竞争格局的影响，动态调整产品策略与优先级，确保产品方向与技术可行性、市场窗口和商业价值保持一致。\n2. 深入理解用户任务、业务流程和使用场景中的痛点，抽象出高价值、可标准化、可规模化的 AI 应用场景，形成清晰的产品定义、场景边界和优先级判断。\n3. 持续跟踪 AI 领域竞品、基础模型能力变化及生态格局，分析市场机会、潜在替代风险和能力空心化风险，识别新的增长机会，并为产品定位、竞争策略和能力布局提供输入。\n4. 规划产品从0-1 到 1-N 的演进路线，结合市场验证、客户反馈和商业化目标，推动产品能力持续完善与规模化复制。\nAI能力产品化\n1. 深入分析客户任务链路和业务流程，识别适合被 AI 重构与优化的关键环节，设计 AI 原生的产品形态、交互模式、配置机制和使用体验。\n2. 协同算法团队确定模型选型、能力边界、输入输出和优化方向，将模型能力转化为可用、可配置、可规模化复制的产品功能，提升产品使用价值和用户体验。\n3. 在产品方案设计和版本演进中，综合平衡效果、成本、时延、稳定性和可解释性，推动产品在业务价值、用户体验与工程可行性之间实现最优解。\n风险控制与安全设计\n1. 识别 AI 产品中的幻觉、误答、越权、敏感内容、安全和合规风险，设计异常处理、权限控制、人机协同与人工兜底机制，提升产品在关键场景下的稳定性与可控性。\n2. 结合业务场景建立风险分级与安全边界，明确不同场景下的适用范围、限制条件和处理策略，保障 AI 产品在不同场景下稳定、可控、合规地使用。\n效果评测\n1. 负责 AI 产品效果评估体系建设，围绕产品目标和业务场景，建立覆盖模型效果、任务完成、用户体验和业务价值的评测框架。\n2. 协同评测、算法、研发和业务团队构建评测指标体系与业务指标体系，明确评测维度、评价标准、评分机制、样本构成和权重设计，确保指标具备指导性、可衡量性和可执行性。\n3. 设计和推动标准评测集、业务测试集和典型案例库建设，覆盖核心场景、高风险场景和边界场景，为版本评估、能力比较和优化决策提供依据。\n4. 推动建立 AI 产品的线上线下评估机制，结合离线评测、灰度验证、线上行为数据、人工反馈和业务结果，综合判断产品能力和版本效果。\n5. 基于评测结果识别关键问题与优化方向，区分模型问题、知识问题、工作流问题、交互问题和场景匹配问题，推动产品、算法和工程侧形成针对性的优化方案。\n6. 负责评测结果在产品规划和版本迭代中的应用，将评测结论转化为产品能力优化、场景边界调整、配置策略优化和版本优先级判断依据，形成持续优化闭环。\n项目管理\n1. 负责跨团队沟通与项目推进，协调算法、研发、测试、运营、业务等相关团队，推动需求评审、开发、测试、上线和复盘等环节高效协同。\n2. 建立项目节奏、风险预警和关键事项跟踪机制，确保产品版本按计划推进并实现预期目标。\n产品的经营支持\n1. 协同前线团队开展产品经营分析，结合市场表现、竞品动态和业务数据，输出产品经营洞察和改进建议，为业务拓展策略和 GTM 计划提供支持。\n2. 结合产品能力、优势场景和伙伴能力图谱，参与生态合作与增长模式设计，推动基于生态的规模化增长和可持续合作机制建设。\n产品上市\n1. 制定产品上架策略制定与发布节奏规划，推动按计划上线并与市场、内部形成一致、准确的表达。\n2. 主导产品GTM材料编写，协助pdsa、销售和市场团队完成价值传递和营销推广支持。\n3. 推动标杆客户案例建设，形成可复制的行业方案、最佳实践和销售支持材料。\n4. 产品商机挖掘，负责产品的目标市场分析，商机沉淀和情报沉淀，为重点场景突破和产品迭代提供支持。\n产品持续改进\n1. 持续跟踪客户对产品的使用情况，合理安排需求优先级，推动产品改进，新产品或功能孵化，提升产品易用性、稳定性、安全性、性能和成本效率。\n2. 负责 AI 产品反馈闭环建设，沉淀高频问题、失败样本和业务评测数据，协同算法与研发团队持续优化模型效果和产品体验。\n• 工作5年以上\n• 1.能独立完成重点场景的解决方案设计，识别适合 AI 重构的关键环节，设计 AI 原生产品形态和人机协同机制。\n• 2.能将模型、RAG、知识库、Agent、多模态、工作流等能力转化为可用、可配置、可复制的产品能力模块。\n• 3.能清晰定义能力边界、输入输出、适用条件和场景边界，推动标准化、模板化和规模化复制。\n• 4.能独立构建某一方向的 benchmark 和评测框架，设计指标、标准、案例库、样本集和优化闭环。\n• 5.能针对产品中的风险、稳定性和可控性要求设计系统化机制，而不是停留在临时补丁层面。\n• 6.能在效果、成本、时延、稳定性、可解释性、安全性之间做较成熟的结构化取舍。"},{"id":"阿里云-34679e519d17","source":"阿里云","title":"ATH事业群-AI原生应用产品经理-杭州","keywords":["AI","Agent"],"location":"杭州","publishedAt":"2026-05-18 10:55:03","url":"https://careers.aliyun.com/off-campus/position-detail?positionId=100011383005","jd":"1.负责基于大模型能力的AI应用产品规划与设计，深入理解企业客户需求特性，围绕各类业务场景推动产品持续演进与规模化落地；\n2.基于对AI技术现状和趋势的深刻理解，设计有行业竞争力的AI原生应用或智能体产品；\n3. 联合算法、工程及解决方案等团队，推动产品从需求洞察、方案设计到行业场景落地，并持续优化产品能力；\n4. 持续关注 AI 技术与产品形态的发展趋势，结合业务需求探索新的 AI 产品机会。\n1. 本科及以上学历，3年及以上产品经理经验，有企业产品或云计算产品经验优先；\n2. 具备优秀的产品思维与系统化产品设计能力，能够从复杂业务场景中识别高价值产品机会；\n3. 对大模型、Agent、AI Search、RAG等AI技术体系有系统性理解，关注AI前沿技术及产品发展；\n4. 具备AI产品实际落地经验，参与或主导过AI应用产品设计与上线；熟练掌握市面主流的AI生产力工具，具备AI原型构建工具及VibeCoding成熟能力；\n5. 具备良好的跨团队沟通与项目推进能力，能够在不确定环境中推动产品持续落地。\n\n加分项\n有 AI 搜索、知识管理、或 AI 应用平台相关产品经验；\n有大模型应用、RAG、知识工程等相关背景。"},{"id":"字节跳动-3ecc69aabab6","source":"字节跳动","title":"高级AI产品经理（AI垂直场景）-集团信息系统","keywords":["AI","Agent"],"location":"上海","publishedAt":"2026-05-15 14:37:11","url":"https://jobs.bytedance.com/experienced/position/7640003873964427573/detail","jd":"1、AI场景挖掘与产品规划\n1）深度调研集团信息系统覆盖的全流程业务痛点，联合业务方挖掘财务、人力、采购、法务等AI应用场景，输出结构化需求文档与用户故事地图；\n2）负责AI Agent在集团信息系统各业务场景的产品规划与路线图制定，独立完成从0到1的产品设计与迭代；\n3）跟踪LLM、Agent、NLP、RAG等前沿技术动态，定义产品智能化方向与核心价值；\n2、Agent架构设计与产品落地\n1）主导Agent的产品设计，包括知识问答(RAG)、工具调用链、MCP/Skill扩展等核心模块的规划与优化；\n2）输出原型设计及技术实现路径，推动Agent/Skill在业务场景的部署与落地，确保方案兼顾技术可行性与业务实用性；\n3、项目推进与跨团队协作\n1）制定产品路线图与迭代计划，明确各阶段目标与交付物；\n2）协调算法、研发、测试、业务等跨职能团队，推动AI能力在不同业务板块的复用与落地；\n3）建立与业务方的需求对接机制，组织评审与验收会议，保障项目按时高质量交付；\n4、效果评估与持续优化\n1）搭建完善的效果评估体系(测评集构建、准出标准定义)，跟踪产品上线后的关键指标(如成本降低率、效率提升、风险识别准确率)与用户反馈；\n2）通过数据分析定位问题，制定迭代优化策略；\n3）沉淀AI产品设计方法论、需求模板、Skill资产等，形成产品持续优化闭环。\n1、本科及以上学历，计算机科学、人工智能、信息管理、供应链管理或相关专业优先；\n2、年限暂不设限，具备B端产品经理经验、AI/LLM相关产品经验，具备完整AI产品从设计到落地的项目案例，具备扎实的产品设计能力及从0到1的产品落地经验；\n3、深入理解LLM、NLP、Agent等核心技术原理，熟悉Agent能力边界、产品架构、技术实现与评测方法，熟悉Prompt、Context、Harness、CLI、RAG、MCP/Skill等应用技术路径，能与研发团队高效沟通技术方案的可行性；\n4、掌握常用数据分析工具，具备通过数据评估产品效果的能力，有A/B测试设计与解读经验者优先；\n5、熟悉集团信息系统相关业务领域（财务、人力、采购、法务等）业务逻辑与合规要求者优先，能将复杂业务需求转化为清晰的产品方案，具备FDE（业务部署）相关能力者优先；\n6、优秀的跨部门沟通、表达、逻辑思维与项目管理能力，能独立对接业务方需求并推动产品落地。"},{"id":"百度-4685b2f11e1c","source":"百度","title":"用户增长产品经理（J99913）","keywords":["AI"],"location":"北京市,上海市","publishedAt":"2026-05-15","url":"https://talent.baidu.com/jobs/detail/SOCIAL/791c588e-7d23-4fe3-b37e-9c9a805d977d","jd":"- 负责产品用户增长体系建设，围绕新用户获取、激活、留存及转化等关键环节，持续提升用户规模与增长效率\n- 负责新用户增长相关能力设计，包括但不限于新用户 Onboarding 流程、用户激励与留存机制、分享裂变与邀请机制、Push / EDM / 消息触达体系等\n- 负责 SEO 增长策略制定与产品能力建设，包括关键词策略、Landing Page 优化、内容结构优化及自然流量增长\n- 结合用户行为数据与漏斗分析，持续优化注册转化、次留、活跃及付费转化等核心指标\n- 与运营、市场、设计、研发等团队协同，推动增长实验（A/B Test）与策略落地，建立可复用的增长方法论\n- 本科及以上学历，3 年以上互联网/AI/工具类产品经验，有用户增长相关经验优先\n- 熟悉用户增长核心方法论，对用户生命周期、留存与转化优化有系统理解\n- 熟悉 SEO 基础逻辑及自然流量增长策略，有内容平台、Web 产品或海外增长经验优先\n- 数据敏感度高，熟悉 Google Analytics、Mixpanel、Am
