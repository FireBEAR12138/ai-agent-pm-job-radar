company": "阿里云", "title": "ATH事业群-产品经理-AI解决方案（北京/杭州/深圳）", "url": "https://careers.aliyun.com/off-campus/position-detail?positionId=100015463013&track_id=SSP1782837437227zoEsLuydrv3401", "publishedAt": "2026-06-24 10:26:15"}]}, "jobs": [{"company": "腾讯", "title": "腾讯视频-多模态策略产品经理", "keywords": "AI", "location": "北京", "publishedAt": "2026年06月30日", "url": "https://careers.tencent.com/jobdesc.html?postId=2034185578328784896", "jd": "岗位职责：\n1.视频大模型数据质量管控与评估标准制定：参与视频在美学、叙事描述、影视制作手法等维度的评估标准制定与落地，协助建立科学、系统的评估指标体系及评估方式；负责标注结果的质量审核与抽检验收，把控标注产出质量；推动质检工具与数据看板的产品化建设；通过数据分析追踪标注质量趋势与 badcase，驱动持续优化闭环；\n2.标注规则与规范管理：参与标注规则体系的设计与迭代，涵盖视频美学评估、叙事描述、场景交互等多维度标注标准，协助推动规则落地；将业务需求转化为可执行的标注指南与 SOP，确保标注团队能够高效、一致地执行；根据一线标注反馈持续迭代规则，解决边界场景与歧义问题；\n3.跨团队协同与项目管理：配合核心团队与算法团队的协作，协助执行标注策略与优先级安排；统筹标注执行团队的任务分配、进度跟踪与验收；协助搭建培训体系与考核机制，赋能供应商/子公司团队持续提升产出质量；参与标注平台与工具的产品优化，提升标注流程效率与使用体验。\n\n岗位要求：\n1.教育背景： 本科及以上学历，影视制作、数字媒体艺术、视觉传达设计、动画、计算机图形学等相关专业，具备扎实的艺术理论基础和影视专业知识；\n2.专业技能： 对影视美学、艺术风格有敏锐的洞察力和深刻的理解，熟悉不同类型影视作品的制作手法；了解 AI 视频处理相关技术，熟悉数据标注流程和工具；\n3.综合素质： 工作认真负责，具备较强的耐心和细致度，对细节有严格要求；拥有出色的沟通能力和团队协作精神，能与艺术创作、技术开发等不同背景的团队高效合作；具备良好的学习能力和适应能力，能快速掌握新技术、新工具，紧跟行业发展趋势；\n4.有视频生成、文生视频、视频理解等相关大模型（如Sora, Stable Video Diffusion, Lumiere等）数据构建与处理经验者优先；\n5.在多模态大模型（VLMs）数据工作（如视觉-语言对齐数据）方面有实践经验者优先。"}, {"company": "腾讯", "title": "产品经理（人-Agent 协作编辑器方向）", "keywords": "AI/Agent", "location": "深圳", "publishedAt": "2026年06月30日", "url": "https://careers.tencent.com/jobdesc.html?postId=2061646301208162304", "jd": "岗位职责：\n1.负责下一代 AI 协作编辑器的产品规划与从 0 到 1 设计，主导产品定位、路线图与关键版本落地；\n2.定义\"人-Agent 协作范式\"：设计 Agent 在AI协作工具中的唤起、接管、回退与信任机制，让 AI 成为协作工具的原生参与者而非侧边栏附属；\n3.与工程团队深度协作，理解富文本、协同、渲染管线与插件架构的工程约束，共同打磨编辑体验、性能与稳定性；\n4.主导大模型在编辑场景的应用：Agent 能力拆解、工作流设计、Prompt 与 Function Call 编排、评测集建设与效果调优，对产品智能化效果负责；\n5.面向个人与企业场景开展用户研究与市场洞察，识别高价值落地机会，结合核心指标与用户反馈驱动产品持续迭代。\n\n岗位要求：\n1.一年以上互联网产品经验，有从 0 到 1 打造核心产品模块并成功上线的完整经历；\n2.具备文档 / 协同办公 / 生产力软件产品背景，深入使用并理解过办公协同工具等至少一类产品的设计逻辑；\n3.有 AI / Agent 产品规划与落地经验，熟悉 RAG、Function Call、多轮交互、多 Agent 编排与大模型评测方法论，能独立设计 Agent 能力边界并主导效果调优；\n4.对编辑器技术有体系化理解：富文本模型、CRDT/OT 协同算法、渲染管线、插件与扩展架构；不要求亲自编码，但能以工程视角与研发同学对齐方案；\n5.对产品体验有近乎苛刻的追求，具备优秀的交互判断力与设计品味，能在复杂场景下做出清晰的体验取舍；\n6.自驱力强、学习能力突出，具备跨团队协作与向上沟通能力，对 AI 与未来工作方式有独立思考与前瞻洞察。"}, {"company": "腾讯", "title": "魔方高级 AIGC产品经理（大模型方向）", "keywords": "AI", "location": "深圳", "publishedAt": "2026年06月29日", "url": "https://careers.tencent.com/jobdesc.html?postId=2071610936929730560", "jd": "岗位职责：\n1.负责大模型研发项目的目标对齐、计划拟定、过程管理、风险控制；与算法、产品、工程、数据等多个团队深度合作，确保目标得到精准理解并高效实现；\n2.成为产品设计和技术链路的桥接，负责需求撰写、拆解与优先级管理，输出清晰的PRD/技术规格，推动产品技术方案实施；\n3.搭建数据管线的采集、标注、清洗、蒸馏等质量评估流程与机制，确保模型团队开发顺利；\n4.对大模型产品进行评估体系的搭建和执行，能够从模型效果、任务完成度、稳定性等维度设计评估方法，推动产品持续迭代。\n\n岗位要求：\n1.年以上产品经理经验，有 AI / 大模型产品的完整落地经历；\n2.熟悉大模型（LLM/多模态）技术原理，能与算法团队进行实质性技术讨论；\n3.具备扎实的项目管理能力（版本管理、风险管理、资源协调），有 PO/PM 双重角色经验者优先；\n4.优秀的沟通能力和抗压能力。"}, {"company": "腾讯", "title": "营销与交易产品部-云Mall 高级产品经理（电商交易平台方向）", "keywords": "AI/Agent", "location": "深圳", "publishedAt": "2026年06月29日", "url": "https://careers.tencent.com/jobdesc.html?postId=2043480582519947264", "jd": "岗位职责：\n1.负责云Mall产品线的整体产品规划，包括版本路线图、优先级决策，从电商交易全链路（商品发现→决策转化→交易履约→售后服务）出发定义产品核心能力和差异化打法；\n2.主导交易核心模块的产品架构设计，包括商品管理、订单管理、结算引擎、库存管理、营销活动、售后服务等，设计可复用的产品化底座，支撑私有化部署与SaaS双模式交付；\n3.从AI原生视角重新定义交易平台的产品形态，思考当AI Agent成为交易参与者时，交易平台的产品架构、交互模式、数据开放方式需要发生怎样的根本性变化，而非在现有产品上叠加AI功能；\n4.前瞻性规划面向AI Agent时代的交易基建，定义交易平台如何适配\"人+Agent\"混合交易场景——商品如何被机器理解、交易流程如何被协议化调用、履约能力如何对外开放；\n5.深度洞察品牌客户需求，区分大品牌与中腰部客户的差异化诉求，将客户需求转化为可落地的产品方案；\n6.持续跟踪行业趋势与竞品动态（如业内头部标杆产品的AI化演进，AI Agent/MCP等新范式对电商交易场的重塑），转化为产品策略输入。\n\n岗位要求：\n1.5年以上电商交易平台/电商SaaS产品经验，对交易全链路（商品、订单、库存、结算、营销、售后）有系统性理解，做过或深度参与过电商建站平台/交易平台型产品（如同类电商SaaS/PaaS）；\n2.深刻理解交易场的核心指标和优化逻辑，熟悉转化漏斗、加购率、结算转化率、客单价、复购率等关键指标，有实际的交易转化率优化经验；\n3.有大客户/品牌客户的产品服务经验，理解大品牌的定制化、数据安全、私有化部署需求，能在产品化和项目化之间找到平衡；\n4.具备AI原生的产品思维：能跳出\"在现有电商产品上加AI功能\"的惯性，从交易形态变革的角度思考产品——当交易的发起者从人变成Agent，产品该长什么样；\n5.对AI Agent时代的电商变革有独立思考，理解AI Agent、MCP协议、自然语言交互等新范式对电商交易场的潜在冲击，能提出面向未来的产品架构储备方案；\n6.务实且有前瞻性，能把在产品基础优化的过程中，同时保持对AI和行业趋势的敏感度，为产品下一个阶段做准备。"}, {"company": "腾讯", "title": "腾讯安全-AI代码安全产品经理", "keywords": "AI", "location": " 化能力建设。\n3. 设计政策核算规则与结算对账流程，包括核算发起、政策对账确认、结算管理等环节，提升政策发放自动化率与对账效率。\n4. 构建政策分析体系，设计政策使用看板、效果归因、政策关联分析等产品能力，为业务决策提供数据支撑。\n5. 跟踪政策模块产品运营数据，定位政策产品卡点、政策执行偏差等问题并驱动产品迭代优化。\n\n职位要求：\n1.至少3年以上的互联网B端产品经验，有CRM、政策平台、品牌广告、广告投放等产品经验优先\n2. 熟悉并掌握广告政策的核心产品逻辑，具备程序化广告的基础知识\n3. 能独立完成需求调研、产品规划、项目推进；具备化繁为简的问题解决能力\n4. 对数据敏感，善于分析数据，能高效协助业务解决实际问题\n5. 自驱、负责，具备良好的协作与沟通能力，能在多线程的工作中合理管理进度并如期交付\n6. 主动拥抱AI，推进政策平台的智能化建设，主动牵引业务发展"}, {"company": "蚂蚁集团", "title": "蚂蚁集团-出行行业产品经理-出行酒旅", "keywords": "AI", "location": "杭州", "publishedAt": "2026年06月25日", "url": "https://talent.antgroup.com/off-campus-position/260625010629468", "jd": "职位描述：\n1、负责研究出行行业市场趋势、消费者行为及竞品分析，定义和搭建行业产品体系，为细分行业与品类提供定制化能力；\n2、深度理解客户、行业、模式差异，基于行业观察和用户需求洞察，通过AI技术应用，不断探索和孵化具备差异性和符合业务特色的服务产品或策略，为业务规模性发展奠定先行基础；\n3、模式探索，发掘符合行业特征的经营模式，并提供配套体系。\n\n职位要求：\n1、具有3年及以上互联网产品经验，有出行行业经验优先，有AI技术应用产品经验优先；\n2、良好自驱力，责任心强，具备优秀的跨部门协作能力，在处理复杂多团队协同作业方面具备丰富经验；\n3、能够推陈出新，对创新抱有持续热情，对最前沿的消费模式和行业有理解；\n4、良好的抗压能力，坚持以结果为导向。"}, {"company": "腾讯", "title": "腾讯会议-AI产品经理-企业应用方向", "keywords": "AI/Agent", "location": "深圳", "publishedAt": "2026年06月25日", "url": "https://careers.tencent.com/jobdesc.html?postId=2036620119203020800", "jd": "岗位职责：\n1.负责腾讯会议内 AI 在企业场景相关的产品策划工作；\n2.结合AI技术，搭建腾讯会议企业管理体系、身份体系，使Agent在企业内便捷、安全的使用；\n3.与腾讯内部SaaS产品线合作，整合面向AI的开放能力，形成拓展性强、高可用的开放体系；\n4.持续分析竞品动态及行业趋势，了解企业客户需求，定义产品差异化能力，规划产品功能迭代。\n\n岗位要求：\n1.本科及以上学历，2年以上互联网产品工作经验，有toB产品经验优先考虑；\n2.对AI行业趋势和大模型技术与应用边界有深刻的理解，对AI产品有热情；\n3.具备较强的用户思维、产品体验敏感度和出色的团队协作与沟通能力；\n4.善于系统化思考，对行业有深入的洞察、清晰的业务逻辑和产品判断。"}, {"company": "腾讯", "title": "腾讯会议-AI产品经理-ASR方向", "keywords": "AI", "location": "深圳", "publishedAt": "2026年06月25日", "url": "https://careers.tencent.com/jobdesc.html?postId=2036621556322562048", "jd": "岗位职责：\n1.负责AI语音相关产品的规划、设计与迭代；\n2.联动算法/工程/数据团队，推进AI语音能力在业务中的落地，持续优化识别准确率、响应速度等关键指标；\n3.建立语音产品质量评估体系，负责效果评测集构建、竞品分析和数据驱动的产品迭代。\n\n岗位要求：\n1.本科及以上学历，3年以上智能语音、自然语言处理或其他AI相关领域的产品经验；\n2.熟悉语音识别、语义理解、语音合成等语音交互相关技术，掌握语音产品性能评估方法；\n3.具备敏锐的用户感知力，对产品体验有极致追求，能够主动发现并解决问题。"}, {"company": "腾讯", "title": "腾讯云文字识别高级产品经理", "keywords": "A 15783.html", "jd": "岗位职责：\n完成下一代自动驾驶产品设计和交付，负责模型能力训练、人机交互方案设计、功能体验提升等。\n与研发团队紧密合作制定自动驾驶产品的训练策略，包括但不限于数据准备、模型微调、强化学习等，确保模型在各应用场景下的性能和效率。\n负责自动驾驶产品的评测和对标，指导自动驾驶能力的提升和迭代。\n跟踪最新的人工智能技术和行业趋势，评估其对产品的影响，并提出相应的产品改进建议。\n\n岗位要求：\n了解大模型基本知识，包括LLM、E2E、VLA等大模型基础架构，并熟悉架构演化的趋势、关键差异\n有参与过模型预训练、强化训练的实践经验，有在后训练、数据管理和模型评测方面的实践经验\n至少3年在大模型产品/自动驾驶产品管理或相关领域的工作经验\n计算机科学、人工智能、数据科学或相关领域的学士或硕士学位。\n具备出色的项目管理能力和跨团队协作能力。\n具备良好的数据分析能力和问题解决能力。"}, {"company": "理想", "title": "具身Agent安全产品经理 (Safety PM)", "keywords": "AI/Agent", "location": "北京顺义区", "publishedAt": "2026-06-28 11:14:22", "url": "https://www.lixiang.com/employ/detail/18788.html", "jd": "岗位职责：\n岗位定位：【我们的战场】AI正从“数字对话”走向“物理控制”。你的任务是为栖身在车机、眼镜等终端的具身Agent制定“安全度量衡”。我们需要精通硬件领域的Agent安全专家，不仅关注2D数字安全，更需要关注3D物理交互安全。\n【核心职责】\n1. 定义标准： 搭建横跨端云的安全评估矩阵，将模糊的“安全感”转化为硬核的量化指标（如：本体执行安全率等）。\n2. 边界仲裁： 设计端云协同的安全博弈机制，牵引上下游落地安全策略，在指令冲突或环境突变时，确保系统能“优雅降级”。\n3. 全域风险管控： 统筹Agent在“3D物理交互”与“多模态数据流转”中的双重风险。既要保障驾驶安全与车辆控制底线，也要构建端侧传感器（视觉/语音等）的隐私保护机制，确保产品符合行业严苛的数据安全合规标准。\n\n岗位要求：\n【我们寻找的你】\n1. 硬核背景： 1年以上具身Agent安全实战经验，深谙 OpenCLAW 及 Agent底层逻辑，技术审美在线。\n2. 边界思维： 能一眼看穿“安全成功率”与“任务完成率”的本质区别（前者是生死线，后者是及格线）。\n3. 具身与合规基因： 对物理世界有敬畏心，对数据隐私有敏感度。不仅追求不出事，更追求Agent业务上限、物理风险控制与数据合规的完美平衡。\n4. 收敛能力： 能够把上下游对于风险的模糊顾虑（包括安全漏洞与合规红线），收敛成一套可执行的规划、方案和策略。\n【加分项】\n1. 擅长在混沌中建模，有定义行业级“具身智能安全准则”的野心。\n2. 精通车、懂行驶类终端。"}, {"company": "理想", "title": "充电体验产品经理", "keywords": "AI", "location": "北京顺义区", "publishedAt": "2026-06-28 11:14:22", "url": "https://www.lixiang.com/employ/detail/19251.html", "jd": "岗位职责：\n职位描述\n- 负责充电体验方向的需求分析、方案设计和迭代落地；\n- 负责 App、小程序等 C 端产品能力建设，优化用户在充电全流程中的关键体验。结合业务场景，探索 AI 能力在充电体验中的应用，推动相关方案设计与落地；\n- 参与或主导支撑前台体验落地的后台系统建设，包括配置能力、规则逻辑、状态流转、运营支撑等；\n- 协同研发、设计、测试、运营、数据等团队，推动复杂业务场景下的产品方案落地；\n- 基于用户反馈、数据分析和场景走查，持续发现问题并推动体验优化。\n\n岗位要求：\n任职要求\n- 本科及以上学历，3 年以上产品经理工作经验，有移动端经验，同时参与过中后台系统建设；\n- 有较强的产品方案设计能力，能够独立完成需求分析、流程设计、原型输出和项目推进；\n- 有良好的用户体验意识和场景洞察能力，能够从用户角度发现问题并提出解决方案；\n- 具备基础数据分析能力，能够结合数据和用户反馈进行产品判断与迭代；\n- 具备良好的跨团队沟通协同能力和结果导向意识；\n- 有新能源汽车使用经验、AI项目经验优先。"}, {"company": "理想", "title": "【人形机器人】商业化产品经理", "keywords": "AI", "location": "北京顺义区", "publishedAt": "2026-06-28 11:14:22", "url": "https://www.lixiang.com/employ/detail/19219.html", "jd": "岗位职责：\n【人形机器人】商业化产品经理\n【岗位职责】\n1. 场景洞察与需求挖掘：深耕对应赛道，开展人形机器人行业趋势、竞品动态、客户/用户需求的深度调研，输出场景分析与痛点洞察报告，挖掘产品创新机会。打造具备行业竞争力的软件系统，支撑双足人形机器人商业场景下的解决方案开发及市场拓展；\n2. 体系化的产品规划与定义：结合公司战略制定产品中长期发展路线图，完成商业可行性分析、成本测算与商业模式设计；输出标准化PRD与产品原型，明确功能定义、技术指标、交互逻辑与体验标准；\n3. 数据驱动与产品迭代：负责跟进项目中的需求，设计相关功能（包括不限于wms、rms、操作UI、机器人软件功能等相关功能需求），出具需求文档，搭建产品性能与体验评估体系，出具测试用例，跟进功能测试验收，跟进项目实施过程中的问题和闭环；通过场景测试、用户/客户反馈、运行数据分析驱动产品持续优化，提升产品场景适配性与可靠性；\n4. 技术跟进与合规管控：跟踪对应领域前沿技术与行业标准，探索技术落地场景；在产品设计阶段前置规避合规、安全与认证风险。\n\n【任职要求】\n1. 学历背景：本科及以上学历，自动化、计算机、机械工程、人工智能、产品设计、电子信息等相关专业；\n2. 经验要求：５年以上人形机器人、工业机器人、智能硬件、AI产品或相关领域产品经理经验，有产品从0到1落地案例优先；\n3. 专业能力：\n(1)熟悉智能硬件/机器人产品全生命周期管理，掌握标准化产品品设计方法论，能独立完成需求拆解、PRD撰写与原型设计；\n(2)了解机器人相关技术原理（运动控制、SLAM、计算机视觉、大模型、硬件结构等至少一类），能与研发团队高效沟通，独立评估技术可行性与落地成本；\n(3)具备良好的项目管理能力，能统筹多团队协同推进项目，识别并管控项目风险；\n(4)具有出色的洞察力和逻辑思维能力，思维敏捷，并能承受较强的工作压力；\n4. 综合素质：逻辑清晰，结果导向，具备较强的问题解决能力、跨部门沟通能力与抗压能力，能适配创业公司快速迭代的工作节奏；\n5. 有良好的审美设计能力，优先考虑。\n\n岗位要求：\n"}, {"company": "理想", "title": "AI应用主交互产品经理", "keywords": "AI/Agent", "location": "北京顺义区", "publishedAt": "2026-06-28 11:14:22", "url": "https://www.lixiang.com/employ/detail/18741.html", "jd": "岗位职责：\n核心定位： 打造智能眼镜在手机端的“指挥中心”与“记忆外脑”，确保软硬连接的流畅性与AI交互的连续性。\n岗位职责：\n1. AI Agent交互： 将“理想同学”在App端实体化，设计多模态交互界面（文字/语音/图片输入），用于查看眼镜端的对话历史、管理AI记忆、以及处理眼镜无法展示的富媒体回复（如地图卡片、购物链接）。\n2. 连接与设备管理： 定义眼镜与App的首次配对、重连及多设备切换流程，确保连接的稳定性与无感体验；负责电量显示、固件升级提醒及隐私权限管理。\n3. 媒体流转中心： 设计眼镜拍摄内容（照片/视频）导入手机的体验，优化传输速度（Wi-Fi Aware/蓝牙协同）与自动同步策略；提供基于AI的快速剪辑、美化及一键分享到主流社交平台的功能。\n4. 互联互通 ： 定义眼镜与智能设备之间的任务流转机制。\n\n岗位要求：\n1. 本科及以上学历，3年以上移动端App（iOS/Android）产品经理经验，有IoT配套App或工具类App经验者优先。\n2. 懂硬件通信： 理解蓝牙（BLE/Classic）与Wi-Fi直连的技术原理与限制，能与嵌入式开发团队协作解决连接不稳定、传输慢等痛点。\n3. AI交互设计感： 熟悉CUI（对话式交互）设计规范，对大模型App（如ChatGPT、豆包、千问）的交互形态有深入研究。\n4. 具备极强的用户同理心，能平衡“工具属性（用完即走）”与“内容属性（相册回顾/AI对话）”的关系。"}, {"company": "淘天集团", "title": "阿里妈妈-内容广告产品经理-北京/杭州", "keywords": "AI、AIGC", "location": "北京、杭州", "publishedAt": "20 ument.getElementById('generatedAt').textContent=payload.generatedAt;document.getElementById('totalCount').textContent=payload.jobs.length;document.getElementById('ksCount').textContent=countSource('快手');document.getElementById('bdCount').textContent=countSource('字节跳动');document.getElementById('txCount').textContent=countSource('腾讯');document.getElementById('xmCount').textContent=countSource('小米');document.getElementById('baiduCount').textContent=countSource('百度');document.getElementById('lxCount').textContent=countSource('理想');document.getElementById('aliyunCount').textContent=countSource('阿里云');document.getElementById('taotianCount').textContent=countSource('淘天集团');document.getElementById('antCount').textContent=countSource('蚂蚁集团');document.getElementById('qianwenCount').textContent=countSource('千问事业部');document.getElementById('tongyiCount').textContent=countSource('通义');function setView(view){document.querySelectorAll('.view-tab').forEach(b=>b.classList.toggle('is-active',b.dataset.view===view));document.querySelectorAll('[data-view-section]').forEach(s=>s.classList.toggle('is-active',s.dataset.viewSection===view));window.scrollTo({top:0,behavior:'smooth'});}document.querySelectorAll('.view-tab').forEach(b=>b.addEventListener('click',()=>setView(b.dataset.view)));document.querySelectorAll('[data-view-link]').forEach(a=>a.addEventListener('click',e=>{e.preventDefault();setView(a.dataset.viewLink)}));function renderJobChanges(){const changes=(payload.dashboard&&payload.dashboard.jobChanges)||[];const sourceText=item=>(item.sources||[]).filter(s=>s.count>0).map(s=>escapeHtml(s.source)+': '+s.count).join(' / ')||'各来源 0';const detailRows=item=>{const jobs=item.jobs||[];if(!jobs.length)return Number(item.count||0)>0?'<div class="change-empty">暂无岗位明细</div>':'';return '<div class="change-detail-list">'+jobs.map(job=>'<a class="change-detail-row" target="_blank" rel="noreferrer" href="'+escapeHtml(job.url||'#')+'"><span>'+escapeHtml(job.source||'')+'</span><strong title="'+escapeHtml(job.title||'')+'">'+escapeHtml(job.title||'未命名岗位')+'</strong><span>'+escapeHtml(job.publishedAt||'发布时间未标注')+'</span><em>官网详情</em></a>').join('')+'</div>'};const rows=changes.length?changes.map((item,index)=>'<details class="change-group" '+(index===0?'open':'')+'><summary class="change-item"><span>'+escapeHtml(item.date||'')+'</span><span class="change-type '+(item.type==='下架'?'down':'')+'">'+escapeHtml(item.type||'')+'</span><strong>'+escapeHtml(String(item.count??0))+' 个岗位</strong><em class="change-sources">'+sourceText(item)+'</em></summary>'+detailRows(item)+'</details>').join(''):'<div class="change-empty">近 7 个发布时间暂无岗位变动</div>';return '<div class="card wide"><h2>岗位变动</h2><div class="change-list"><h3>近 7 个发布时间</h3>'+rows+'</div></div>'}function renderDashboard(){const d=payload.dashboard;const maxCompany=Math.max(...Object.values(d.sourceCounts),1);const company='<div class="company-grid">'+sourceOptions.filter(x=>x!=='全部').sort((a,b)=>((d.sourceCounts&&d.sourceCounts[b])||0)-((d.sourceCounts&&d.sourceCounts[a])||0)).map(name=>'<div class="company-tile"><div class="company-tile-head"><strong title="'+escapeHtml(name)+'">'+escapeHtml(name)+'</strong><span>'+((d.sourceCounts&&d.sourceCounts[name])||0)+'</span></div><div class="company-mini"><i style="width:'+(((d.sourceCounts&&d.sourceCounts[name])||0)/maxCompany*100)+'%"></i></div></div>').join('')+'</div>';const cities=d.cityTop.map(x=>'<div class="rank-row"><span>'+escapeHtml(x.name)+'</span><strong>'+x.count+'</strong></div>').join('');const maxMonth=Math.max(...d.monthTrend.map(x=>x.count),1);const months=d.monthTrend.map(x=>'<div class="hbar-row"><strong>'+escapeHtml(x.month)+'</strong><div class="hbar"><i style="width:'+(x.count/maxMonth*100)+'%"></i></div><span>'+x.count+'</span></div>').join('');const dates=d.dateTrend.map(x=>'<div class="vbar" data-tip-date="'+escapeHtml(x.date)+'" data-tip-count="'+x.count+'"><i class="vbar-fill" style="height:'+Math.max(3,x.pct)+'%"></i><span>'+escapeHtml(x.date.slice(5))+'</span></div>').join('');const cloud=d.wordCloud.map(x=>'<span style="font-size:'+x.weight+'px" title="'+x.count+'">'+escapeHtml(x.name)+'</span>').join('');document.getElementById('dashboard').innerHTML='<div class="card"><h2>公司分布</h2>'+company+'</div><div class="card"><h2>JD 关键词词云</h2><div class="cloud">'+cloud+'</div></div><div class="card"><h2>城市 Top 12</h2>'+cities+'</div><div class="card"><h2>月份趋势</h2>'+months+'</div><div class="card wide"><h2>最近发布时间分布</h2><div class="date-bars">'+dates+'</div></div>'+renderJobChanges();setupChartTooltip()}function setupChartTooltip(){let tip=document.querySelector('.chart-tip');if(!tip){tip=document.createElement('div');tip.className='chart-tip';document.body.appendChild(tip)}document.querySelectorAll('.vbar').forEach(bar=>{bar.addEventListener('mouseenter',()=>{tip.innerHTML='<strong>'+bar.dataset.tipDate+'</strong><span>'+bar.dataset.tipCount+' 个岗位</span>';tip.style.opacity='1'});bar.addEventListener('mousemove',e=>{tip.style.left=e.clientX+'px';tip.style.top=(e.clientY-12)+'px'});bar.addEventListener('mouseleave',()=>{tip.style.opacity='0'})})}function makeFilters(){document.getElementById('sourceFilters').innerHTML=sourceOptions.map(v=>'<button class="source-filter" data-value="'+v+'">'+v+'</button>').join('');document.getElementById('keywordFilters').innerHTML=keywordOptions.map(v=>'<button class="keyword-filter" data-value="'+v+'">'+v+'</button>').join('');document.querySelectorAll('.source-filter').forEach(b=>b.addEventListener('click',()=>{state.source=b.dataset.value;render()}));document.querySelectorAll('.keyword-filter').forEach(b=>b.addEventListener('click',()=>{state.keyword=b.dataset.value;render()}));document.getElementById('query').addEventListener('input',e=>{state.query=e.target.value.trim();render()})}function filteredJobs(){const q=state.query.toLowerCase();return payload.jobs.filter(j=>(state.source==='全部'||j.source===state.source)&&(state.keyword==='全部'||j.keywords.includes(state.keyword))&&(!q||[j.title,j.location,j.jd,j.source].some(v=>String(v||'').toLowerCase().includes(q))))}function renderList(jobs){document.getElementById('matchCount').textContent='匹配 '+jobs.length+' 个岗位';document.querySelectorAll('.source-filter').forEach(b=>b.classList.toggle('active',b.dataset.value===state.source));document.querySelectorAll('.keyword-filter').forEach(b=>b.classList.toggle('active',b.dataset.value===state.keyword));const list=document.getElementById('jobList');if(!jobs.length){list.innerHTML='<div class="empty">没有匹配岗位<br>换一个关键词、来源或命中词试试。</div>';return}list.innerHTML=jobs.map(j=>'<button class="job '+(j.id===state.selectedId?'active':'')+'" data-id="'+escapeHtml(j.id)+'"><div class="job-title">'+escapeHtml(j.title)+'</div><div class="job-meta">'+j.keywords.map(kw=>'<span class="tag">'+escapeHtml(kw)+'</span>').join('')+'<span>'+escapeHtml(j.location||'地点未标注')+'</span><span>'+escapeHtml(j.publishedAt||'发布时间未标注')+'</span><span class="source">'+escapeHtml(j.source)+'</span><a class="job-link" target="_blank" rel="noreferrer" href="'+escapeHtml(j.url)+'">官网详情</a></div></button>').join('');list.querySelectorAll('.job').forEach(b=>b.addEventListener('click',(event)=>{if(event.target.closest("a"))return;state.selectedId=b.dataset.id;render()}))}function renderDetail(job){const detail=document.getElementById('detail');if(!job){detail.innerHTML='<div class="empty">没有可展示的岗位详情</div>';return}detail.innerHTML='<article><div class="detail-head"><div class="badges"><span class="badge">'+escapeHtml(job.source)+'</span>'+job.keywords.map(kw=>'<span class="badge green">'+escapeHtml(kw)+'</span>').join('')+'</div><div class="detail-title-row"><div><h2>'+escapeHtml(job.title)+'</h2><div class="detail-meta"><span>地点：'+escapeHtml(job.location||'未标注')+'</span><span>发布时间：'+escapeHtml(job.publishedAt||'未标注')+'</span></div></div><a class="open" target="_blank" rel="noreferrer" href="'+escapeHtml(job.url)+'">官网详情</a></div></div><div class="jd-wrap"><div class="jd"><strong>JD</strong>'+String.fromCharCode(10,10)+escapeHtml(job.jd||'暂无 JD 内容')+'</div></div></article>'}function render(){const jobs=filteredJobs();if(!jobs.some(j=>j.id===state.selectedId))state.selectedId=jobs[0]?.id||null;renderList(jobs);renderDetail(byId.get(state.selectedId)||jobs[0])}renderDashboard();makeFilters();render();</script></body></html>
