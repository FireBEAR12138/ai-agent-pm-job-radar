mpany*100)+'%"></i></div></div>').join('')+'</div>';const cities=d.cityTop.map(x=>'<div class="rank-row"><span>'+escapeHtml(x.name)+'</span><strong>'+x.count+'</strong></div>').join('');const maxMonth=Math.max(...d.monthTrend.map(x=>x.count),1);const months=d.monthTrend.map(x=>'<div class="hbar-row"><strong>'+escapeHtml(x.month)+'</strong><div class="hbar"><i style="width:'+(x.count/maxMonth*100)+'%"></i></div><span>'+x.count+'</span></div>').join('');const dates=d.dateTrend.map(x=>'<div class="vbar" data-tip-date="'+escapeHtml(x.date)+'" data-tip-count="'+x.count+'"><i class="vbar-fill" style="height:'+Math.max(3,x.pct)+'%"></i><span>'+escapeHtml(x.date.slice(5))+'</span></div>').join('');const cloud=d.wordCloud.map(x=>'<span style="font-size:'+x.weight+'px" title="'+x.count+'">'+escapeHtml(x.name)+'</span>').join('');document.getElementById('dashboard').innerHTML='<div class="card"><h2>公司分布</h2>'+company+'</div><div class="card"><h2>JD 关键词词云</h2><div class="cloud">'+cloud+'</div></div><div class="card"><h2>城市 Top 12</h2>'+cities+'</div><div class="card"><h2>月份趋势</h2>'+months+'</div><div class="card wide"><h2>最近发布时间分布</h2><div class="date-bars">'+dates+'</div></div>'+renderJobChanges();setupChartTooltip()}function setupChartTooltip(){let tip=document.querySelector('.chart-tip');if(!tip){tip=document.createElement('div');tip.className='chart-tip';document.body.appendChild(tip)}document.querySelectorAll('.vbar').forEach(bar=>{bar.addEventListener('mouseenter',()=>{tip.innerHTML='<strong>'+bar.dataset.tipDate+'</strong><span>'+bar.dataset.tipCount+' 个岗位</span>';tip.style.opacity='1'});bar.addEventListener('mousemove',e=>{tip.style.left=e.clientX+'px';tip.style.top=(e.clientY-12)+'px'});bar.addEventListener('mouseleave',()=>{tip.style.opacity='0'})})}function makeFilters(){document.getElementById('sourceFilters').innerHTML=sourceOptions.map(v=>'<button class="source-filter" data-value="'+v+'">'+v+'</button>').join('');document.getElementById('keywordFilters').innerHTML=keywordOptions.map(v=>'<button class="keyword-filter" data-value="'+v+'">'+v+'</button>').join('');document.querySelectorAll('.source-filter').forEach(b=>b.addEventListener('click',()=>{state.source=b.dataset.value;render()}));document.querySelectorAll('.keyword-filter').forEach(b=>b.addEventListener('click',()=>{state.keyword=b.dataset.value;render()}));document.getElementById('query').addEventListener('input',e=>{state.query=e.target.value.trim();render()})}function filteredJobs(){const q=state.query.toLowerCase();return payload.jobs.filter(j=>(state.source==='全部'||j.source===state.source)&&(state.keyword==='全部'||j.keywords.includes(state.keyword))&&(!q||[j.title,j.location,j.jd,j.source].some(v=>String(v||'').toLowerCase().includes(q))))}function renderList(jobs){document.getElementById('matchCount').textContent='匹配 '+jobs.length+' 个岗位';document.querySelectorAll('.source-filter').forEach(b=>b.classList.toggle('active',b.dataset.value===state.source));document.querySelectorAll('.keyword-filter').forEach(b=>b.classList.toggle('active',b.dataset.value===state.keyword));const list=document.getElementById('jobList');if(!jobs.length){list.innerHTML='<div class="empty">没有匹配岗位<br>换一个关键词、来源或命中词试试。</div>';return}list.innerHTML=jobs.map(j=>'<button class="job '+(j.id===state.selectedId?'active':'')+'" data-id="'+escapeHtml(j.id)+'"><div class="job-title">'+escapeHtml(j.title)+'</div><div class="job-meta">'+j.keywords.map(kw=>'<span class="tag">'+escapeHtml(kw)+'</span>').join('')+'<span>'+escapeHtml(j.location||'地点未标注')+'</span><span>'+escapeHtml(j.publishedAt||'发布时间未标注')+'</span><span class="source">'+escapeHtml(j.source)+'</span><a class="job-link" target="_blank" rel="noreferrer" href="'+escapeHtml(j.url)+'">官网详情</a></div></button>').join('');list.querySelectorAll('.job').forEach(b=>b.addEventListener('click',(event)=>{if(event.target.closest("a"))return;state.selectedId=b.dataset.id;render()}))}function renderDetail(job){const detail=document.getElementById('detail');if(!job){detail.innerHTML='<div class="empty">没有可展示的岗位详情</div>';return}detail.innerHTML='<article><div class="detail-head"><div class="badges"><span class="badge">'+escapeHtml(job.source)+'</span>'+job.keywords.map(kw=>'<span class="badge green">'+escapeHtml(kw)+'</span>').join('')+'</div><div class="detail-title-row"><div><h2>'+escapeHtml(job.title)+'</h2><div class="detail-meta"><span>地点：'+escapeHtml(job.location||'未标注')+'</span><span>发布时间：'+escapeHtml(job.publishedAt||'未标注')+'</span></div></div><a class="open" target="_blank" rel="noreferrer" href="'+escapeHtml(job.url)+'">官网详情</a></div></div><div class="jd-wrap"><div class="jd"><strong>JD</strong>'+String.fromCharCode(10,10)+escapeHtml(job.jd||'暂无 JD 内容')+'</div></div></article>'}function render(){const jobs=filteredJobs();if(!jobs.some(j=>j.id===state.selectedId))state.selectedId=jobs[0]?.id||null;renderList(jobs);renderDetail(byId.get(state.selectedId)||jobs[0])}renderDashboard();makeFilters();render();</script></body></html>
